variables:
  # ── Pipeline gates ──
  auth_verified:
    type: bool
    description: "Phase 2: authorization scope + SC evidence types + traceability verified"
  plan_audited:
    type: bool
    description: "Phase 4: plan-fidelity + concern-separation audits PASS"
  completeness_checked:
    type: bool
    description: "Phase 6: completeness gate — all items present, no scope creep"
  impl_audited:
    type: bool
    description: "Phase 7: adversarial audit of implementation — spec-audit + coherence-maintenance"
  vbc_complete:
    type: bool
    description: "Phase 8: verification-before-completion — per-SC evidence table"
  finishing_checked:
    type: bool
    description: "Phase 9: finishing checklist — no uncommitted, branch ahead, commit message"
  review_ready:
    type: bool
    description: "Phase 10: review prep — compare URL, PR body format, squash"

  # ── Item A phases ──
  A_red:
    type: bool
    description: "RED: session-init lacks ## Agent Tools"
  A_green:
    type: bool
    description: "GREEN: get_agent_tools_help() + emit block"
  A_verify:
    type: bool
    description: "VERIFY: grep + lint + typecheck"
  A_done:
    type: bool
    description: "Item A complete"

  # ── Item B phases ──
  B_red:
    type: bool
    description: "RED: session-init-tools-section absent from test-enforcement.sh"
  B_green:
    type: bool
    description: "GREEN: SCENARIOS + FILE_SCENARIO_MAP entries"
  B_verify:
    type: bool
    description: "VERIFY: grep 2+ matches"
  B_done:
    type: bool
    description: "Item B complete"

  # ── Item C phases ──
  C_red:
    type: bool
    description: "RED: tool-injection-red.sh does not exist"
  C_green:
    type: bool
    description: "GREEN: create behavioral test script"
  C_verify:
    type: bool
    description: "VERIFY: grep prompt + behavior_run + headers"
  C_done:
    type: bool
    description: "Item C complete"

  # ── SC verifications ──
  sc_1_verified:
    type: bool
    description: "SC-1: session-init stdout contains ## Agent Tools"
  sc_3_verified:
    type: bool
    description: "SC-3: content-verification assertion passes"
  sc_2_verified:
    type: bool
    description: "SC-2: behavioral test stdout shows .opencode/tools/* names"

invariants:
  # ── Pipeline gate ordering ──
  # 1. Auth before any implementation
  - "z3.Implies(A_red, auth_verified)"
  # 2. Plan audit before implementation
  - "z3.Implies(A_red, plan_audited)"
  # 3. Completeness gate after implementation, before VbC
  - "z3.Implies(completeness_checked, A_done)"
  - "z3.Implies(completeness_checked, B_done)"
  - "z3.Implies(completeness_checked, C_done)"
  - "z3.Implies(vbc_complete, completeness_checked)"
  # 4. Implementation audit after VbC
  - "z3.Implies(impl_audited, vbc_complete)"
  # 5. Finishing checklist after impl audit
  - "z3.Implies(finishing_checked, impl_audited)"
  # 6. Review prep is final pipeline gate
  - "z3.Implies(review_ready, finishing_checked)"

  # ── Per-item phase ordering: RED → GREEN → VERIFY → done ──
  - "z3.Implies(A_green, A_red)"
  - "z3.Implies(A_verify, A_green)"
  - "z3.Implies(A_done, A_verify)"
  - "z3.Implies(B_green, B_red)"
  - "z3.Implies(B_verify, B_green)"
  - "z3.Implies(B_done, B_verify)"

  # ── Per-item phase ordering: RED → GREEN → VERIFY → done ──
  - "z3.Implies(C_green, C_red)"
  - "z3.Implies(C_verify, C_green)"
  - "z3.Implies(C_done, C_verify)"

  # ── Cross-item ordering: B and C require A done; C is independent of B ──
  - "z3.Implies(B_red, A_done)"
  - "z3.Implies(C_red, A_done)"

  # ── SCs require enabling items ──
  - "z3.Implies(sc_1_verified, A_done)"
  - "z3.Implies(sc_3_verified, z3.And(A_done, B_done))"
  - "z3.Implies(sc_2_verified, z3.And(A_done, C_done))"
  - "z3.Implies(sc_3_verified, sc_1_verified)"

  # ── SC verification is part of VbC ──
  - "z3.Implies(sc_1_verified, vbc_complete)"
  - "z3.Implies(sc_3_verified, vbc_complete)"
  - "z3.Implies(sc_2_verified, vbc_complete)"

  # ── All items done before VbC ──
  - "z3.Implies(vbc_complete, z3.And(A_done, B_done, C_done))"