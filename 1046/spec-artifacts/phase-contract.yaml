# NO preconditions — Lesson 6 from [viewport-editor#46](https://github.com/michael-conrad/viewport-editor/issues/46): preconditions block valid state transitions
# Invariants and postconditions are sufficient to model intermediate states.
# Preconditions belong in state.yaml initialization, not in the contract.
preconditions: []

invariants:
  # Domain dependency chain
  - z3.Implies(SC_VERIFIED == True, PR_VERIFIED == True)
  - z3.Implies(PHASE_COMPLETE == True, PR_VERIFIED == True)
  - z3.Implies(ISSUE_CLOSED == True, z3.And(SC_VERIFIED == True, PHASE_COMPLETE == True))
  - z3.Implies(AUDIT_PASSED == True, ISSUE_CLOSED == True)
  - z3.Implies(BRANCHES_CLEANED == True, AUDIT_PASSED == True)
  - z3.Implies(DEV_SYNCED == True, BRANCHES_CLEANED == True)
  - z3.Implies(PRUNE_DONE == True, DEV_SYNCED == True)

  # Pipeline gate serial ordering — each gate implies all prior gates in same phase
  # Phase 1: verify-merge removal
  - z3.Implies(P1_p1 == True, True)
  - z3.Implies(P1_p2 == True, P1_p1 == True)
  - z3.Implies(P1_p3 == True, P1_p2 == True)
  - z3.Implies(P1_p4 == True, P1_p3 == True)
  - z3.Implies(P1_p5 == True, P1_p4 == True)
  - z3.Implies(P1_p6 == True, P1_p5 == True)
  - z3.Implies(P1_p7 == True, P1_p6 == True)
  - z3.Implies(P1_p8 == True, P1_p7 == True)
  - z3.Implies(P1_p9 == True, P1_p8 == True)
  - z3.Implies(P1_p10 == True, P1_p9 == True)
  - z3.Implies(P1_p11 == True, P1_p10 == True)
  - z3.Implies(P1_p12 == True, P1_p11 == True)
  - z3.Implies(P1_p13 == True, P1_p12 == True)
  - z3.Implies(P1_p14 == True, P1_p13 == True)

  # Phase 2: branch-cleanup audit addition
  - z3.Implies(P2_p2 == True, P2_p1 == True)
  - z3.Implies(P2_p3 == True, P2_p2 == True)
  - z3.Implies(P2_p4 == True, P2_p3 == True)
  - z3.Implies(P2_p5 == True, P2_p4 == True)
  - z3.Implies(P2_p6 == True, P2_p5 == True)
  - z3.Implies(P2_p7 == True, P2_p6 == True)
  - z3.Implies(P2_p8 == True, P2_p7 == True)
  - z3.Implies(P2_p9 == True, P2_p8 == True)
  - z3.Implies(P2_p10 == True, P2_p9 == True)
  - z3.Implies(P2_p11 == True, P2_p10 == True)
  - z3.Implies(P2_p12 == True, P2_p11 == True)
  - z3.Implies(P2_p13 == True, P2_p12 == True)
  - z3.Implies(P2_p14 == True, P2_p13 == True)

  # Phase 3: SKILL.md cross-ref
  - z3.Implies(P3_p2 == True, P3_p1 == True)
  - z3.Implies(P3_p3 == True, P3_p2 == True)
  - z3.Implies(P3_p4 == True, P3_p3 == True)
  - z3.Implies(P3_p5 == True, P3_p4 == True)
  - z3.Implies(P3_p6 == True, P3_p5 == True)
  - z3.Implies(P3_p7 == True, P3_p6 == True)
  - z3.Implies(P3_p8 == True, P3_p7 == True)
  - z3.Implies(P3_p9 == True, P3_p8 == True)
  - z3.Implies(P3_p10 == True, P3_p9 == True)
  - z3.Implies(P3_p11 == True, P3_p10 == True)
  - z3.Implies(P3_p12 == True, P3_p11 == True)
  - z3.Implies(P3_p13 == True, P3_p12 == True)
  - z3.Implies(P3_p14 == True, P3_p13 == True)

  # Phase 4: behavioral tests
  - z3.Implies(P4_p2 == True, P4_p1 == True)
  - z3.Implies(P4_p3 == True, P4_p2 == True)
  - z3.Implies(P4_p4 == True, P4_p3 == True)
  - z3.Implies(P4_p5 == True, P4_p4 == True)
  - z3.Implies(P4_p6 == True, P4_p5 == True)
  - z3.Implies(P4_p7 == True, P4_p6 == True)
  - z3.Implies(P4_p8 == True, P4_p7 == True)
  - z3.Implies(P4_p9 == True, P4_p8 == True)
  - z3.Implies(P4_p10 == True, P4_p9 == True)
  - z3.Implies(P4_p11 == True, P4_p10 == True)
  - z3.Implies(P4_p12 == True, P4_p11 == True)
  - z3.Implies(P4_p13 == True, P4_p12 == True)
  - z3.Implies(P4_p14 == True, P4_p13 == True)

  # Domain variable → pipeline gate completion (Lesson 5)
  # A domain variable MUST NOT be True unless all 14 gates for its phase are True
  - z3.Implies(z3.Or(P1_p14 == True), True)  # Phase 1 has no domain var directly (it's a removal)
  - z3.Implies(P2_p14 == True, True)  # Phase 2 domain is covered by AUDIT_PASSED gate below
  - z3.Implies(P3_p14 == True, True)  # Phase 3 has no domain var (it's a cross-ref)
  - z3.Implies(P4_p14 == True, True)  # Phase 4 has no domain var (it's tests)

  # CRITICAL: closure-verification MUST NOT fire before issue-closure
  - z3.Implies(AUDIT_PASSED == True, z3.Not(z3.And(ISSUE_CLOSED == False, PR_VERIFIED == True)))

  # CRITICAL: branch deletion MUST NOT fire before audit passes
  - z3.Implies(BRANCHES_CLEANED == True, z3.Not(z3.And(AUDIT_PASSED == False, ISSUE_CLOSED == True)))

postconditions:
  - PR_VERIFIED == True
  - SC_VERIFIED == True
  - PHASE_COMPLETE == True
  - ISSUE_CLOSED == True
  - AUDIT_PASSED == True
  - BRANCHES_CLEANED == True
  - DEV_SYNCED == True
  - PRUNE_DONE == True
  # All pipeline gates must complete for postconditions to be satisfiable
  - P1_p14 == True
  - P2_p14 == True
  - P3_p14 == True
  - P4_p14 == True