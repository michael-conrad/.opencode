    nullable: false
    description: "All SCs verified against live codebase"
  PHASE_COMPLETE:
    type: bool
    nullable: false
    description: "All phases/sub-issues have merged PRs"
  ISSUE_CLOSED:
    type: bool
    nullable: false
    description: "Issue closed with state_reason=completed"
  AUDIT_PASSED:
    type: bool
    nullable: false
    description: "closure-verification adversarial audit PASS (both auditors + cross-validate)"
  BRANCHES_CLEANED:
    type: bool
    nullable: false
    description: "Feature branches deleted (local + remote)"
  DEV_SYNCED:
    type: bool
    nullable: false
    description: "Dev branch synced with remote via ff-only, hash match"
  PRUNE_DONE:
    type: bool
    nullable: false
    description: "Stale remote refs pruned, worktree cleaned, working tree clean"

