# Z3 Contract: [#1107](https://github.com/michael-conrad/.opencode/issues/1107) — solve tool: model precondition fix + skill card + behavioral tests
schema_version: "1.0"
created: "2026-06-11"
description: "4-phase spec: fix solve model precondition assertion (P1), create solve skill card (P2), behavioral test for solve prove (P3), integration (P4)."

