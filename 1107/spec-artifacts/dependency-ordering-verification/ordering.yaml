invariants:
  # Phase dependencies:
  #   P1 (model fix) and P3 (prove tests) are independent — P3 uses solve prove, not solve model
  #   P2 (skill card) independent of P1 — skill documents existing tool behavior
  #   P4 (integration: task files + AGENTS.md) depends on P2 (skill card must exist)
  #   P4 also depends on P3 (behavioral tests must be committed)
