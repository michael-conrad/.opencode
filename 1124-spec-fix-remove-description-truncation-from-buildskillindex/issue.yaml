title: '[SPEC-FIX] Remove description truncation from buildSkillIndex() and all plugin/tool
  outputs'
status: open
labels:
- SPEC-FIX
body: '> Full spec and plan artifacts: https://github.com/michael-conrad/.opencode/tree/issues-data/1124


  ## Exec Summary


  The `buildSkillIndex()` function in `plugins/session-enforcement.ts:568` truncates
  all skill descriptions to the first sentence only via `s.description.split(".")[0].trim()
  + "."`. This silently removes the routing mandate and procedural instructions from
  skill descriptions in the `available_skills` index that the system prompt shows to
  AI agents, causing them to bypass mandatory routing gates like `issue-operations`.


  ### Fix


  1. Remove the truncation line at `session-enforcement.ts:568`
  2. Use the full `s.description` instead of `shortDesc`
  3. Search and eliminate any similar truncation patterns in `plugins/` and `tools/`


  ### Success Criteria


  | ID | Criterion | Evidence Type |
  |----|-----------|---------------|
  | SC-1 | No `split(".")[0]` or equivalent first-sentence truncation exists in any `.ts` plugin file | `string` |
  | SC-2 | No first-sentence truncation exists in any `tools/` script output | `string` |
  | SC-3 | `buildSkillIndex()` uses full `s.description` instead of `shortDesc` | `string` |


  ## AI Agent Instructions


  This issue is an executive summary for human stakeholders. The authoritative spec
  and plan artifacts are at 1124. AI agents MUST read the local spec/plan files for
  implementation and MUST NOT base implementation on this summary.

  '
