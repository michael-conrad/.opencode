title: '[SPEC-FIX] Move Platform Routing Mandate from 060-tool-usage.md into 000-critical-rules.md'
status: open
labels:
- SPEC-FIX
body: '> Full spec and plan artifacts: https://github.com/michael-conrad/.opencode/tree/issues-data/1125


  ## Exec Summary


  The Platform Routing Mandate ("ALL `github_*`/`gitbucket-api` issue calls MUST route
  through `issue-operations` dispatcher") lives in `060-tool-usage.md`, whose trigger
  pattern is file operations. When an agent makes `github_*` API calls, the file-operations
  trigger never fires, so the mandate is never loaded into context. The same rule already
  exists in `000-critical-rules.md` as Tier 1 and Tier 2 entries. The duplication creates
  confusion about which is authoritative.


  ### Fix


  1. Delete the Platform Routing Mandate section from `060-tool-usage.md`
  2. Delete `tool-usage-010`/`tool-usage-011` symbolic rules from `060-tool-usage.md`
  3. Verify `critical-rules-platform-routing-bypass` (Tier 1) and `critical-rules-platform-api-deliberation`
  (Tier 2) exist in `000-critical-rules.md`


  ### Success Criteria


  | ID | Criterion | Evidence Type |
  |----|-----------|---------------|
  | SC-1 | No Platform Routing Mandate section in `060-tool-usage.md` | `string` |
  | SC-2 | No `tool-usage-010`/`tool-usage-011` in `060-tool-usage.md` | `string` |
  | SC-3 | `critical-rules-platform-routing-bypass` exists in `000-critical-rules.md` as Tier 1 | `string` |
  | SC-4 | `critical-rules-platform-api-deliberation` exists in `000-critical-rules.md` as Tier 2 | `string` |


  ## AI Agent Instructions


  This issue is an executive summary for human stakeholders. The authoritative spec
  and plan artifacts are at 1125. AI agents MUST read the local spec/plan files for
  implementation and MUST NOT base implementation on this summary.

  '
