title: '[SPEC-FIX] plan plan auto-fallback on UNSOLVABLE_INCOMPLETELY'
status: open
labels:
- SPEC-FIX
body: '> Full spec and plan artifacts: https://github.com/michael-conrad/.opencode/tree/issues-data/1171


## Exec Summary


The `plan plan` command exits with error on `UNSOLVABLE_INCOMPLETELY` without actionable guidance. Developer must manually discover the `plan ground` → manual plan → `plan validate` workaround.


### Fix


1. In `_action_plan()`, when `result.status == UNSOLVABLE_INCOMPLETELY`, automatically run grounding, generate best-effort sequential plan from grounded actions, lift back, validate, and output
2. If lifted plan fails validation, print grounded actions with guidance message
3. Preserve existing behavior for other failure modes


### Success Criteria


| ID | Criterion | Evidence Type |
|----|-----------|---------------|
| SC-1 | On UNSOLVABLE_INCOMPLETELY, _action_plan attempts grounding and plan generation before exiting | string |
| SC-2 | If lifted plan validates, outputs plan in standard YAML format with success exit code | string |
| SC-3 | If lifted plan fails validation, prints grounded actions with actionable guidance message | string |
| SC-4 | Other failure statuses (UNSOLVABLE_PROVEN, TIMEOUT, MEMOUT, etc.) unchanged | string |
| SC-5 | Engine parameter respected — fallback works for any engine returning incomplete status | string |


## AI Agent Instructions


This issue is an executive summary for human stakeholders. The authoritative spec and plan artifacts are at 1171. AI agents MUST read the local spec/plan files for implementation and MUST NOT base implementation on this summary.


'
