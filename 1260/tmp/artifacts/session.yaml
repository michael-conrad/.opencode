          "data": "{\"type\":\"text\",\"text\":\"\\\"Dispatch a sub-agent via task() and ask it to self-detect which Core Principles block it received. Report whether it received 'Core Principles (Sub-Agent)' or 'Core Principles (Zero Tolerance)'.\\\"\\n\"}"
