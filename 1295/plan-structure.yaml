# Plan Structure — Issue #1295
# local-issues PEP 723 header fix, docs update, linting expansion

plan_structure_decision: separate
reason: >
  Three distinct concern areas (tool file, documentation, test script) with
  independent file locations and no shared code. Multi-task spec mandates
  separate phase sections in plan.md.

pipeline_readiness: PASS
sc_count: 11
phase_count: 3

duplicate_plan_check:
  status: no_conflicts
  existing_plans: []

## Phase Structure

phases:
  - number: 1
    name: Fix local-issues
    concern_boundary: Executable tool file — PEP 723 metadata block
    entry_condition: local-issues current header uses deprecated pyproject.toml marker
    exit_condition: local-issues header uses # /// script with pinned requires-python and dependencies
    sub_folder: .opencode/tools/
    files_affected_single: [.opencode/tools/local-issues]
    scs: [SC-1, SC-2, SC-3, SC-4, SC-5]
    dependencies: []
    items:
      - id: P1-I1
        name: Replace inline metadata block
        scope: Rewrite the PEP 723 header from pyproject.toml format to script format
        scs: [SC-2, SC-3, SC-4, SC-5]
        red: The agent's local-issues header still uses # /// pyproject.toml or [project] section or unversioned dependencies
        green: The header must use # /// script with ~=3.12.0 and pyyaml~=6.0
        deliverable: Modified .opencode/tools/local-issues header lines 1-12
      - id: P1-I2
        name: Verify init works
        scope: Execute local-issues init, confirm exit 0
        scs: [SC-1]
        red: Running ./.opencode/tools/local-issues init fails or pyyaml not found
        green: ./.opencode/tools/local-issues init must exit 0 and pyyaml must be importable
        deliverable: Verified execution evidence

  - number: 2
    name: Update 070-environment.md PEP 723 documentation
    concern_boundary: Documentation guideline — PEP 723 reference and conventions
    entry_condition: 070-environment.md lacks canonical PEP 723 link and uses incorrect marker pattern
    exit_condition: 070-environment.md specifies # /// script as the only standardized marker with ~= pinning standards
    sub_folder: .opencode/guidelines/
    files_affected_single: [.opencode/guidelines/070-environment.md]
    scs: [SC-6, SC-7]
    dependencies: []
    items:
      - id: P2-I1
        name: Add PEP 723 canonical reference and correct conventions
        scope: Add link, correct marker spec, version pinning standards, updated example block
        scs: [SC-6, SC-7]
        red: 070-environment.md does not link to PEP 723 or mentions deprecated pyproject.toml marker or lacks ~= pinning rules
        green: 070-environment.md must contain the PEP 723 URL and mandate ~= for both requires-python and dependencies
        deliverable: Modified .opencode/guidelines/070-environment.md

  - number: 3
    name: Expand test-pep723-tools.sh linting
    concern_boundary: Enforcement test — automated linting for PEP 723 violations
    entry_condition: test-pep723-tools.sh lacks check_requires_python_pinned and check_dependencies_pinned
    exit_condition: test-pep723-tools.sh includes both new checks and exits 0 on clean repo
    sub_folder: .opencode/tests/
    files_affected_single: [.opencode/tests/test-pep723-tools.sh]
    scs: [SC-8, SC-9, SC-10, SC-11]
    dependencies: []
    items:
      - id: P3-I1
        name: Add check_requires_python_pinned function
        scope: Add shell function that verifies requires-python uses ~=X.Y.0
        scs: [SC-8]
        red: check_requires_python_pinned function does not exist in test-pep723-tools.sh
        green: check_requires_python_pinned function must exist in test-pep723-tools.sh
        deliverable: Modified .opencode/tests/test-pep723-tools.sh
      - id: P3-I2
        name: Add check_dependencies_pinned function
        scope: Add shell function that verifies dependency entries use ~=
        scs: [SC-9]
        red: check_dependencies_pinned function does not exist in test-pep723-tools.sh
        green: check_dependencies_pinned function must exist in test-pep723-tools.sh
        deliverable: Modified .opencode/tests/test-pep723-tools.sh
      - id: P3-I3
        name: Verify test script exits 0 on clean repo
        scope: Execute test-pep723-tools.sh on the post-fix repo state
        scs: [SC-10, SC-11]
        red: Running test-pep723-tools.sh exits non-zero or finds pyproject.toml markers
        green: test-pep723-tools.sh must exit 0 and grep for pyproject.toml marker must return 0
        deliverable: Verified execution evidence

dependency_ordering:
  phases:
    - phase: 1
      depends_on: []
      constraints:
        - "phase_1_starts_independently"
    - phase: 2
      depends_on: [1]
      constraints:
        - "phase_2_starts_after_phase_1_completes"
      rationale: >
        Documentation should reference the corrected pattern. Technically
        independent, but documenting the correct format after the fix is
        pedagogically coherent.
    - phase: 3
      depends_on: [1]
      constraints:
        - "phase_3_starts_after_phase_1_completes"
      rationale: >
        Test script checks the correct header pattern. Should run against
        the post-fix state of local-issues to avoid false positives.

