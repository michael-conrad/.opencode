# phase-to-skill-mapping.yaml — Issue #1370
# Generated by structure task from writing-plans
# Combined (single-task spec): all phases in one feature branch, one commit per item

spec_issue_number: 1370
decision: combined
rationality: "Single-task spec — all phases are tightly coupled (env-loader.ts fix, session-enforcement.ts TS fixes, AGENTS.md doc). No sub-issues needed."

file_mapping:
  - path: .opencode/plugins/env-loader.ts
    phases: [1]
    concern: "Plugin export fix — default→named export, import updates, context mapping"
  - path: .opencode/plugins/session-enforcement.ts
    phases: [2]
    concern: "TypeScript fixes — event hook discrimination, part.synthetic narrowing"
  - path: .opencode/plugins/AGENTS.md
    phases: [3]
    concern: "New file — plugin development documentation"

phases:
  - phase: 1
    concern: "Plugin export fix — env-loader.ts"
    scs: [SC-1, SC-2, SC-3, SC-4]
    dependencies: []
    items:
      - id: 1.1
        description: "Change export from default to named export (EnvLoaderPlugin: Plugin)"
        red_condition: "grep 'export default' .opencode/plugins/env-loader.ts → match found"
        green_condition: "grep 'export const EnvLoaderPlugin' .opencode/plugins/env-loader.ts → match found"
        scs: [SC-1, SC-3]
      - id: 1.2
        description: "Update imports — Plugin type, remove PluginInput/Hooks"
        red_condition: "grep 'PluginInput' .opencode/plugins/env-loader.ts → match found"
        green_condition: "grep 'import type { Plugin }' .opencode/plugins/env-loader.ts → match found"
        scs: [SC-1, SC-4]
      - id: 1.3
        description: "Map context object properties (input?.directory→directory, input?.worktree→worktree, input.$.nothrow→$.nothrow)"
        red_condition: "grep 'input\\.' .opencode/plugins/env-loader.ts → matches found"
        green_condition: "grep 'input\\.' .opencode/plugins/env-loader.ts → no matches (except gitCmd wrapper)"
        scs: [SC-1, SC-2]
      - id: 1.4
        description: "Behavioral test — plugin loads without 'Plugin export is not a function' error"
        red_condition: "opencode-cli run with plugin → stderr contains 'Plugin export is not a function'"
        green_condition: "opencode-cli run with plugin → stderr does NOT contain error"
        scs: [SC-1, SC-2]
        behavioral: true

  - phase: 2
    concern: "session-enforcement.ts TypeScript fixes"
    scs: [SC-4]
    dependencies: [Phase 1]
    items:
      - id: 2.1
        description: "Fix 'session.created' hook key → event hook with event.type discrimination"
        red_condition: "grep '\"session\\.created\"' .opencode/plugins/session-enforcement.ts → match found"
        green_condition: "grep 'event\\.type' .opencode/plugins/session-enforcement.ts → match found; grep '\"session\\.created\"' → no match"
        scs: [SC-4]
      - id: 2.2
        description: "Fix part.synthetic access on non-TextPart variants → narrow to part.type === 'text' first"
        red_condition: "grep 'part\\.synthetic' .opencode/plugins/session-enforcement.ts → match found without type guard"
        green_condition: "grep 'part\\.type ===' .opencode/plugins/session-enforcement.ts → match found before part.synthetic access"
        scs: [SC-4]

  - phase: 3
    concern: "AGENTS.md documentation"
    scs: [SC-5]
    dependencies: [Phase 1, Phase 2]
    items:
      - id: 3.1
        description: "Create .opencode/plugins/AGENTS.md documenting plugin development requirements"
        red_condition: "ls .opencode/plugins/AGENTS.md → file does not exist"
        green_condition: "ls .opencode/plugins/AGENTS.md → file exists"
        scs: [SC-5]

dependency_contract:
  phases:
    - id: 1
      depends_on: []
    - id: 2
      depends_on: [1]
    - id: 3
      depends_on: [1, 2]
  constraints:
    - "Phase 1 has no dependencies — can be scheduled first"
    - "Phase 2 depends on Phase 1 — must be scheduled after Phase 1"
    - "Phase 3 depends on Phase 1 and Phase 2 — must be scheduled after both"
    - "All phases must be scheduled exactly once"
    - "No cycles in dependency graph"
  verification:
    - "Linear chain: 1 → 2 → 3"
    - "Total ordering is the only valid schedule"
    - "No parallel execution possible (Phase 2 depends on Phase 1, Phase 3 depends on both)"
