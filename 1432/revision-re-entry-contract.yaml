spec: https://github.com/michael-conrad/.opencode/issues/1430
revision_re_entry:
  revision_scopes:
    - scope: full
      cascade_artifacts:
        - plan.md
        - sc-summary.yaml
        - verification-consistency-contract.yaml
      requires_re_approval: true
      valid_re_entry_steps:
        - step: phase-1-verdict-path
        - step: phase-2-critical-rule
        - step: phase-3-trigger-dispatch
        - step: phase-4-behavioral-tests
      constraints:
        - 'on_full_revision: all_artifacts_must_be_regenerated'
    - scope: partial
      cascade_artifacts:
        - plan.md
        - sc-summary.yaml
      requires_re_approval: true
      valid_re_entry_steps:
        - step: phase-2-critical-rule
        - step: phase-3-trigger-dispatch
        - step: phase-4-behavioral-tests
      constraints:
        - 'on_partial_revision: cascade_is_limited_to_affected_scs'
