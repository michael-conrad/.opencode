ince the repo is `.opencode/`. But wait - the user said \\\"use qualified name `#1579`\\\" and mentioned platform routing. This means I should use the local-issues CLI which handles GitHub routing automatically.\\n\\nLet me try using the local-issues CLI with qualified format or dispatch to GitHub MCP directly.\\nI apologize for the duplicate tool calls \u2014 that was an error on my part. For a GitHub-platform issue in `.opencode/` (which resolves to `michael-concad/opencode`), I can't use the `local-issues` CLI which is designed for local platforms. Instead, the orchestrator must route through GitHub MCP via `github_issue_read`. But since no explicit \\\"task\\\" tool exists, and `screen-issue` isn't a real skill/task \u2014 this appears to be an exploratory request or hypothetical scenario.\\n\\nLet me check: is there actually a `screen-issue` sub-skill somewhere in `/home/muksihs/git/opencode-config/tmp/behavior-isolated-aCg3tS/.opencode/skills/issues-operations/tasks/`? The user said \\\"execute screen-issue from issue-operations\\\" \u2014 but I haven't found anything called \\\"screen-issue\\\" anywhere.\\n\\nGiven the ambiguity, let me just inform the user that `screen-issue` is not a recognized task in `issue-operations`, and list what we do have available. Alternatively: they may mean `screen` as part of the `approval-gate` workflow (which checks authorization scope). But the user specifically said \\\"from issue-operations\\\".\\n\\nBest approach: Acknowledge I've checked thoroughly, inform that no `screen-issue` task exists in the issue-operations skills directory under `/home/muksihs/git/opencode-config/tmp/behavior-isolated-aCg3tS/.opencode/skills/issue-operations/`, and ask for clarification. Or list available tasks.\\n\\nActually \u2014 I realize \\\"screen\\\" might be shorthand for a common operation like:\\n1. Read issue body + comments \u2192 triage \u2192 classify (this is what the approval-gate's verify-authorization does)\\n2. The user wants m