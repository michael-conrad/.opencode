          "time_updated": 1782862588548,
          "data": "{\"type\":\"reasoning\",\"text\":\"The user has authorized \\\"for PR\\\" scope on issue #1579 in the .opencode repo. This triggers authorization cascade to all sub-issues, auto-gap-fill (spec \u2192 plan \u2192 approve \u2192 PR), and `pr_strategy: stacked`.\\n\\nLet me load the approval-gate skill first since this is an authorization event.\",\"time\":{\"start\":1782862586345,\"end\":1782862588547}}"
        },
        {
          "id": "prt_f1ae42a85001PzIiDxc5oSZZV6",
          "message_id": "msg_f1ae20bff001o7GfdQkUb11JI4",
          "session_id": "ses_0e51df4beffe7kjv5ns35WYKLm",
          "time_created": 1782862588549,
          "time_updated": 1782862588565,
          "data": "{\"type\":\"tool\",\"tool\":\"skill\",\"callID\":\"call_i0uxj6wa\",\"state\":{\"status\":\"completed\",\"input\":{\"name\":\"approval-gate\"},\"output\":\"<skill_content name=\\\"approval-gate\\\">\\n# Skill: approval-gate\\n\\n## Persona\\n\\nAuthorization gatekeeper. Verifies scope, cascade, and halt boundaries by dispatching to sub-agents that independently read issue state and comments. An orchestrator that checks authorization inline instead of dispatching to a verification sub-agent has produced a self-certification, not an independent gate \u2014 every authorization claim carries the orchestrator's cached context, and the separation between the agent seeking approval and the agent verifying it is collapsed. Professional gatekeepers dispatch to independent verifiers. Inlining means the gate was never independent.\\n\\n## Worktree Mode\\n\\nThis skill operates in the main repo directory (direct-branch mode). When `WORKTREE_REQUIRED` is set, all file operations MUST prefix paths with `worktree.path`.\\n\\n## Mandatory Task Discipline\\n\\n- [ ] 1. Every task and sub-task in this skill is mandatory\\n- [ ] 2. Skipping, combining, optimizing out, or performing inline work that should be delegated to a sub-agent produces defective deliverables that must be discarded\\n- [ ] 3. Each step must be dispatched to a sub-agent via `task()` unless explicitly marked as inline/orchestrator in this skill\\n- [ ] 4. Sub-agents must not dispatch sub-agents\\n- [ ] 5. Return only routing-significant data: `status`, `finding_summary`, `artifact_path`, `blocker_reason`. Full evidence goes to disk.\\n\\nSub-Agent Task Context Audit\\n\\nAll tasks run via `task(subagent_type=\\\"general\\\")`. Standard context: `{ issue_number, worktree.path, github.owner, github.repo, authorization_scope, halt_at, pr_strategy, pipeline_phase }`. Auditor tasks use subagent_type from resolve-models result contract (auditor_1/auditor_2) \u2014 NOT `general`. Include audit_phase in task context when routing auditors. See adversarial-audit SKILL.md \u00a7DISPATCH_GATE. `screen-issue` receives issue body + authorization context + pipeline_phase. `pre-implementation-analysis` receives all issue numbers + authorization context + pipeline_phase. `pre-analysis` receives only `{ issue_number, task_description, pipeline_phase, authorization_scope, halt_at, pr_strategy, github.owner, github.repo }` with zero file paths. No inline work \u2014 all tasks use sub-agents. If a sub-agent returns empty, re-task with original scoped context only (max 2 retries). Result contracts return `status` (DONE/BLOCKED/OVERFLOW) + task-specific fields per `enforcement/` result contract schemas. `DONE_WITH_CONCERNS` is coerced to FAIL per the bright-line coercion rule in `implementation-pipeline/tasks/pipeline-executor.md`.\\n\\n### Authorization Context Template\\n```\\nauthorization_scope: <for_analysis|for_spec|for_plan|for_implementation|for_review_prep|for_pr|for_pr_only|for_review_only>\\nhalt_at: <analysis_complete|spec_created|plan_created|verification_complete|review_prep|pr_created>\\npr_strategy: <none|stacked>\\npipeline_phase: <current_phase_name>\\nauthorization_source: \\\"User approved #N on YYYY-MM-DD\\\"\\n```\\n\\n### Routing Rules\\n- Missing `authorization_scope` in task context \u2192 return `status: BLOCKED`\\n- Instructed to exceed `halt_at` \u2192 return `status: BLOCKED`\\n- The `pipeline_phase` field is NEW \u2014 it tracks which phase of a multi-phase plan is currently executing\\n\\n### Column Validation Rules (Pre-Approval Gate Expansion)\\n\\nThe pre-approval gate validates the following columns in the spec's SC table. Each rule produces PASS or BLOCK with reason.\\n\\n| Column | Validation Rule | Block On | Apply To |\\n|--------|----------------|----------|----------|\\n| Pipeline Step Binding | Every SC MUST have a valid pipeline step binding matching a step in `implementation-pipeline` dispatch table | Missing, invalid, or misspelled step name | All specs |\\n| Re-Entry Step | Every SC MUST declare a re-entry step. For single-task specs, may be `null`. For multi-phase, MUST reference a valid step within the bound phase | Missing for multi-phase, or references step outside phase scope | All specs |\\n| Verification Gate | Every SC's Verification Gate MUST be consistent with its Evidence Type per the Evidence Type Taxonomy: `behavioral` \u2192 pre-commit, `semantic` \u2192 pre-PR, `string` \u2192 CI, `structural` \u2192 none | EVIDENCE_TYPE_MISMATCH \u2014 behavioral SC with CI gate, etc. | All specs |\\n| Artifact Path | Every SC with a non-structural evidence type MUST declare an artifact path. Structural SCs MAY omit | Missing when evidence type is behavioral/semantic/string | All specs |\\n| Phase Binding | Every SC MUST declare a phase binding matching a phase in the spec's Phase section. Cross-cutting SCs use `common` | Phase name not found in spec phases, or `common` used for non-cross-cutting SC | Multi-phase specs only |\\n\\n### Pre-Approval Gate Column Validation\\n\\nWhen running the pre-approval gate for standard/complex specs, validate the following columns in the SC table:\\n\\n| Column | Validation Rule | Error on Violation |\\n|--------|----------------|---------------------|\\n| Pipeline Step Binding | MUST specify which pipeline step validates this SC | BLOCK |\\n| Re-Entry Step | MUST specify re-entry point on verification failure | BLOCK |\\n| Verification Gate | MUST be one of: red-green, pre-commit, ci | BLOCK |\\n| Artifact Path | MUST use `./tmp/{issue-N}/` convention | BLOCK |\\n| Phase Binding | MUST annotate phase for multi-phase specs | FLAG (conditional) |\\n\\nFor `for_spec` scope, only minimal-tier requirements enforced (Pipeline Step Binding, Re-Entry Step).\\n\\n### DISPATCH_GATE \u2014 Orchestrator task() Prompt Protocol\\n\\n> **Context cost frame:** These are internal operational bookkeeping notes describing how context flows through the pipeline \u2014 they are NOT implementation complexity measures. Implementation work is measured ONLY by whether tested verified correct code operations pass with 100% clean PASS.\\n> This cost frame applies to orchestrator context only \u2014 it does NOT mean the agent should minimize message count, pipeline steps, or user-facing output.\\n\\nThe orchestrator MUST NOT preload execution context into `task()` prompts.\\nEvery sub-agent MUST independently discover scope and produce its own result contract.\\n\\n#### Forbidden in task() Prompts\\n\\n| Violation | Forbidden Pattern | Correct Pattern |\\n|-----------|-------------------|-----------------|\\n| Preloaded file paths | \\\"Read cleanup/branch-cleanup.md then execute step 1\\\" | \\\"execute cleanup task from git-workflow\\\" |\\n| Preloaded step sequences | \\\"Step 1: sync dev. Step 2: delete branch.\\\" | \\\"execute cleanup task from git-workflow\\\" |\\n| Preloaded expected outcomes | \\\"Return { cleanup_status, branch_deleted }\\\" | Let sub-agent define its own result contract |\\n| Preloaded orchestrator reasoning | \\\"The merge was just completed so we need to...\\\" | Pure objective, no narrative |\\n| Missing task file discovery directive | \\\"execute verify-authorization from approval-gate\\\" without task file path | \\\"execute verify-authorization from approval-gate. Read `approval-gate/tasks/verify-authorization.md` first\\\" |\\n\\n## Required: Sub-agent Task File Discovery Directive\\n\\nEvery `task()` prompt that dispatches a named task MUST include a discovery directive in the format:\\n\\n```\\nexecute <task> from <skill>. Read `<skill>/tasks/<task>.md` first\\n```\\n\\nThis directive tells the sub-agent which task file to load independently \u2014 it is NOT preloading the file content. The sub-agent opens and reads the task file in its own clean-room context, discovers the procedure, and executes autonomously. Without this directive, the sub-agent must search for the correct task file, which is wasted context and routing ambiguity.\\n\\nThis is NOT a violation of the preloading prohibition. The task file path is routing metadata (which file to load), not execution context (what the file contains). The sub-agent still reads the file independently and discovers scope on its own.\\n\\n#### Dispatch Context Contract\\n\\nEvery `task()` call MUST include only:\\n\\n- `worktree.path`\\n- `github.owner`\\n- `github.repo`\\n- `authorization_scope`\\n- `halt_at`\\n- `pr_strategy`\\n- `pipeline_phase`\\n\\nPlus skill-specific fields per the `## Sub-Agent Routing` section above.\\n\\nExclusions (MUST NOT be in prompt):\\n- `orchestrator_reasoning`\\n- `expected_outcomes`\\n- `inline_file_paths`\\n- `agent_memory`\\n- `cached_verification_results`\\n\\n#### Sub-Agent Entry Criteria\\n\\nA sub-agent receiving a `task()` prompt MUST reject it if the prompt contains:\\n- Inline file paths to task files\\n- Inline step or procedure definitions\\n- Expected outcome structures or schema constraints\\n- Pre-loaded evidence or orchestrator-derived conclusions\\n\\nReturn `status: BLOCKED` with `reason: PRELOADED_CONTEXT_REJECTED`.\\n\\n#### Orchestrator Entry Criteria\\n\\nAfter loading this skill and reading the Trigger Dispatch Table, the orchestrator MUST:\\n- Use the exact `task(..., prompt: \\\"...\\\")` string from the table\\n- NOT write a custom prompt with preloaded context\\n- NOT add orchestrator reasoning, file paths, step sequences, or expected outcomes\\n- If the canonical dispatch produces an empty result: re-task clean-room with the same canonical string (max 2 retries)\\n\\n## Cross-References\\n\\n\\n## Trigger Dispatch Table\\n\\n| User says / Context | Task | Dispatch | Context passed |\\n|---------------------|------|----------|----------------|\\n| \\\"verify authorization\\\" / \\\"check approval\\\" | `verify-authorization` | `sub-task` | {issue_number, authorization_scope} |\\n| \\\"screen issue\\\" / \\\"triage\\\" | `screen-issue` | `sub-task` | {issue_number} |\\n| \\\"pre-implementation analysis\\\" | `pre-implementation-analysis` | `sub-task` | {issue_numbers} |\\n| \\\"verify blockers\\\" | `verify-blockers` | `sub-task` | {issue_number} |\\n| \\\"verify closed issue\\\" | `verify-closed-issue` | `sub-task` | {issue_number} |\\n| \\\"spec-to-plan cascade\\\" | `spec-to-plan-cascade` | `sub-task` | {spec_issue, plan_issue} |\\n| \\\"item decomposition check\\\" | `item-decomposition-check` | `sub-task` | {plan_issue} |\\n| \\\"auto-dispatch\\\" | `auto-dispatch` | `sub-task` | {authorization_scope} |\\n| \\\"verify already implemented\\\" | `verify-already-implemented` | `sub-task` | {issue_number} |\\n| \\\"approval cascade\\\" / \\\"cascade authorization\\\" | `approval-cascade` | `sub-task` | {parent_issue, sub_issues} |\\n| \\\"pipeline halt boundary\\\" / \\\"check halt_at\\\" | `check-halt-boundary` | `sub-task` | {authorization_scope, halt_at, pipeline_phase} |\\n| \\\"apply label\\\" / \\\"set approval label\\\" | `apply-label` | `sub-task` | {issue_number, authorization_scope} |\\n| \\\"revision revocation\\\" / \\\"spec revised\\\" | `revision-revocation` | `sub-task` | {spec_issue, plan_issue} |\\n| \\\"bug discovery\\\" / \\\"bug found during implementation\\\" | `bug-discovery-protocol` | `sub-task` | {issue_number, bug_description} |\\n| completion / workflow end | `completion` | `sub-task` | {workflow_state} |\\n\\nSkills: `git-workflow`, `pr-creation-workflow`, `issue-review`, `implementation-pipeline`, `writing-plans`, `executing-plans`, `pre-analysis`. Guidelines: `010-approval-gate.md`, `000-critical-rules.md`, `065-verification-honesty.md`.\\n\\n```yaml+symbolic\\nschema_version: \\\"2.0\\\"\\nlast_updated: \\\"2026-05-01T00:00:00Z\\\"\\nrules:\\n  - id: approval-gate-skill-001\\n    title: \\\"Pre-implementation authorization verification required\\\"\\n    conditions:\\n      all: [\\\"spec_exists == true\\\", \\\"user_authorized == false\\\"]\\n    actions: [HALT]\\n    triggers: [git-workflow]\\n    source: \\\"approval-gate/SKILL.md\\\"\\n\\n  - id: approval-gate-skill-002\\n    title: \\\"Multi-task cascade extends authorization from plan to all sub-issues\\\"\\n    conditions:\\n      all: [\\\"plan_has_sub_issues == true\\\", \\\"user_authorized == true\\\"]\\n    actions: [PROCEED]\\n    triggers: [implementation-pipeline, executing-plans]\\n    source: \\\"approval-gate/SKILL.md\\\"\\n\\n  - id: approval-gate-skill-005\\n    title: \\\"Spec-to-plan approval cascade \u2014 spec approves existing plan\\\"\\n    conditions:\\n      all: [\\\"spec_approved == true\\\", \\\"spec_has_existing_plan == true\\\"]\\n    actions: [APPLY_LABEL(approved-for-*, plan), ADD_COMMENT(cascade docs), PROCEED_TO(plan-approved run)]\\n    triggers: [writing-plans]\\n    source: \\\"approval-gate/SKILL.md\\\"\\n\\n  - id: approval-gate-skill-006\\n    title: \\\"PR merge boundary check \u2014 block if required PR not merged\\\"\\n    conditions:\\n      all: [\\\"plan_has_pr_boundaries == true\\\", \\\"required_pr_not_merged == true\\\"]\\n    actions: [HALT, REPORT(CRITICAL: required PR not merged)]\\n    triggers: [implementation-pipeline, git-workflow]\\n    source: \\\"approval-gate/SKILL.md\\\"\\n\\nBase directory for this skill: file:///home/muksihs/git/opencode-config/tmp/behavior-isolated-Dfx2EW/.opencode/skills/approval-gate\\nRelative paths in this skill (e.g., scripts/, reference/) are relative to this base directory.\\nNote: file list is sampled.\\n\\n<skill_files>\\n<file>/home/muksihs/git/opencode-config/tmp/behavior-isolated-Dfx2EW/.opencode/skills/approval-gate/tasks/verify-blockers.md</file>\\n<file>/home/muksihs/git/opencode-config/tmp/behavior-isolated-Dfx2EW/.opencode/skills/approval-gate/tasks/pre-implementation-analysis.md</file>\\n<file>/home/muksihs/git/opencode-config/tmp/behavior-isolated-Dfx2EW/.opencode/skills/approval-gate/tasks/completion.md</file>\\n<file>/home/muksihs/git/opencode-config/tmp/behavior-isolated-Dfx2EW/.opencode/skills/approval-gate/tasks/verify-authorization/verify-blockers.md</file>\\n<file>/home/muksihs/git/opencode-config/tmp/behavior-isolated-Dfx2EW/.opencode/skills/approval-gate/tasks/verify-authorization/sub-issue-verification.md</file>\\n<file>/home/muksihs/git/opencode-config/tmp/behavior-isolated-Dfx2EW/.opencode/skills/approval-gate/tasks/verify-authorization/verify-closed-issue-main.md</file>\\n<file>/home/muksihs/git/opencode-config/tmp/behavior-isolated-Dfx2EW/.opencode/skills/approval-gate/tasks/verify-authorization/spec-to-plan-cascade.md</file>\\n<file>/home/muksihs/git/opencode-config/tmp/behavior-isolated-Dfx2EW/.opencode/skills/approval-gate/tasks/verify-authorization/item-decomposition-check.md</file>\\n<file>/home/muksihs/git/opencode-config/tmp/behavior-isolated-Dfx2EW/.opencode/skills/approval-gate/tasks/verify-authorization/auto-dispatch.md</file>\\n<file>/home/muksihs/git/opencode-config/tmp/behavior-isolated-Dfx2EW/.opencode/skills/approval-gate/tasks/verify-authorization/verify-already-implemented.md</file>\\n</skill_files>\\n</skill_content>\",\"metadata\":{\"name\":\"approval-gate\",\"dir\":\"/home/muksihs/git/opencode-config/tmp/behavior-isolated-Dfx2EW/.opencode/skills/approval-gate\",\"truncated\":false},\"title\":\"Loaded skill: approval-gate\",\"time\":{\"start\":1782862588555,\"end\":1782862588565}}}"
