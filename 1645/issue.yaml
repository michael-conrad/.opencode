body: "---\ntype: SPEC\nstatus: DRAFT\nversion: 3.0\ncreated: 2026-07-01\nupdated:\
  \ 2026-07-09\nlabels: [SPEC, audit, baseline, drift-detection]\npriority: medium\n\
  ---\n\n# [SPEC] Baseline generation for audit — first-run audit snapshots with schema\
  \ and lifecycle\n\n## Problem\n\nWhen `audit` runs for a resource without an existing\
  \ comparison baseline, there is no snapshot of the initial audit state. Subsequent\
  \ runs (drift-detection, coherence-maintenance) have no reference point to compare\
  \ against. This means:\n\n1. First-run audits produce findings with no historical\
  \ context\n2. Drift-detection has no baseline to compare against\n3. Coherence-maintenance\
  \ cannot detect regressions without a prior snapshot\n4. Evidence authenticity checks\
  \ have no prior artifact to compare against for staleness detection\n\nThis was\
  \ originally proposed in `.opencode#483` (SC-6) but that spec was a consolidation\
  \ mega-spec that is now partially superseded. This spec extracts baseline generation\
  \ as a focused, standalone concern.\n\n## Existing Baseline Infrastructure\n\nThe\
  \ codebase already has two baseline concepts that this spec must coexist with:\n\
  \n| Baseline | Location | What It Captures |\n|---|---|---|\n| Coherence baseline\
  \ | `audit/tasks/coherence-extraction.md` | Guideline rules, skill behaviors, cross-references,\
  \ coherence metrics |\n| Pipeline pre-red baseline | `implementation-pipeline/tasks/pre-red-baseline.md`\
  \ | Pipeline state init, document currency, SC-ID traceability |\n\nThe coherence\
  \ baseline captures **static structural alignment** (rule-to-behavior relationships).\
  \ This spec proposes a **dynamic claim-verification baseline** (reality checks against\
  \ live codebase and external sources). These are orthogonal — different data, different\
  \ purpose, different task files. Both baselines share the same artifact directory\
  \ (`{project_root}/tmp/{issue-N}/artifacts/`) but are generated by separate tasks.\n\
  \n## SC Integrity Mandate\n\n**No SC may be weakened, removed, deferred, or blocked.**\
  \ Any attempt to bypass an SC (by changing its evidence type, removing it from the\
  \ spec, deferring it to a future issue, or marking it as \"blocked\") is a CRITICAL\
  \ VIOLATION and marks ALL SCs as FAIL. The PR must be immediately rejected and trashed\
  \ as defective and unusable.\n\n**All SCs must achieve 100% clean PASS.** A single\
  \ SC failure is a total failure of the implementation. There is no partial credit,\
  \ no \"PASS with caveats\", no \"functionally equivalent\" rationalization. Every\
  \ SC must be verified with evidence matching its declared evidence type per the\
  \ Evidence Type Enforcement Matrix in `080-code-standards.md`.\n\n**Any attempt\
  \ to skip, defer, or bypass an SC marks ALL SCs as FAIL.** No single-SC carveouts.\
  \ No \"deferred to follow-up\" exceptions. No \"blocked by external dependency\"\
  \ rationalizations. If an SC cannot be implemented, the entire spec fails.\n\n##\
  \ Success Criteria\n\n| ID | Criterion | Evidence Type | Verification Method |\n\
  |----|-----------|---------------|---------------------|\n| SC-1 | New `audit/tasks/baseline-generation.md`\
  \ task file exists with baseline generation step | `string` | `grep \"baseline\"\
  \ .opencode/skills/audit/tasks/baseline-generation.md` returns matches |\n| SC-2\
  \ | Baseline generation creates YAML file in `{project_root}/tmp/{issue-N}/artifacts/`\
  \ | `structural` | Run audit on a resource; verify `ls {project_root}/tmp/{issue-N}/artifacts/audit-baseline-*.yaml`\
  \ returns a file |\n| SC-3 | Baseline follows defined schema with `meta`, `reality_checks.codebase`,\
  \ `reality_checks.external` sections | `string` | `grep \"reality_checks\\|baseline_snapshot\"\
  \ .opencode/skills/audit/tasks/baseline-generation.md` returns matches |\n| SC-4\
  \ | Subsequent runs compare against baseline | `behavioral` | Clean-room semantic\
  \ inspector: second audit run references baseline from first run |\n| SC-5 | Baseline\
  \ includes `branch_checked` field | `string` | `grep \"branch_checked\" .opencode/skills/audit/tasks/baseline-generation.md`\
  \ returns match |\n| SC-6 | Baseline reality-checks separated into codebase and\
  \ external categories | `string` | `grep \"codebase\\|external\" .opencode/skills/audit/tasks/baseline-generation.md`\
  \ in baseline context returns matches |\n| SC-7 | Each reality-check record includes\
  \ `result: PASS|FAIL` for deterministic comparison | `string` | `grep \"result:.*PASS\\\
  |result:.*FAIL\" .opencode/skills/audit/tasks/baseline-generation.md` in baseline\
  \ context returns matches |\n| SC-8 | Baseline cleanup step exists in `git-workflow/tasks/cleanup.md`\
  \ | `string` | `grep \"baseline.*cleanup\\|cleanup.*baseline\" .opencode/skills/git-workflow/tasks/cleanup.md`\
  \ returns match |\n| SC-9 | `baseline-generation` entry exists in audit SKILL.md\
  \ Trigger Dispatch Table and Tasks table | `string` | `grep \"baseline-generation\"\
  \ .opencode/skills/audit/SKILL.md` returns matches in both Trigger Dispatch Table\
  \ and Tasks table |\n| SC-10 | Baseline comparison step exists in `drift-detection.md`\
  \ | `string` | `grep \"baseline\" .opencode/skills/audit/tasks/drift-detection.md`\
  \ returns match in baseline comparison context |\n\n## Baseline Schema\n\n```yaml\n\
  baseline_snapshot:\n  meta:\n    resource_identifier: \"\"\n    resource_content_hash:\
  \ \"sha256:\"\n    audit_type: \"spec | plan-fidelity | ...\"\n    created_at: \"\
  \"\n    initial_verdict: \"PASS\"\n    branch_checked: \"\"\n  reality_checks:\n\
  \    codebase:\n      - claim: \"process_record() exists in upload_service.py\"\n\
  \        tool: \"grep\"\n        query: \"def process_record\"\n        location:\
  \ \"upload_service.py\"\n        result: \"PASS|FAIL\"\n        evidence: \"upload_service.py:42\"\
  \n    external:\n      - claim: \"GitHub API v3 issues endpoint\"\n        tool:\
  \ \"webfetch\"\n        url: \"https://api.github.com\"\n        result: \"PASS|FAIL\"\
  \n        status_code: 200\n```\n\n## Files Affected\n\n| File | Change |\n|------|--------|\n\
  | `.opencode/skills/audit/tasks/baseline-generation.md` | **New file** — baseline\
  \ generation task with reality-checks schema |\n| `.opencode/skills/audit/SKILL.md`\
  \ | Add `baseline-generation` to Trigger Dispatch Table and Tasks table |\n| `.opencode/skills/audit/tasks/drift-detection.md`\
  \ | Add baseline comparison step (load baseline, diff reality-checks) |\n| `.opencode/skills/git-workflow/tasks/cleanup.md`\
  \ | Add baseline cleanup step (follow existing behavioral-evidence cleanup pattern\
  \ at Step 2.9) |\n| `.opencode/tests/behaviors/` | New behavioral test for baseline\
  \ generation (SC-4) |\n\n## Constraints\n\n- Baseline files stored in `{project_root}/tmp/{issue-N}/artifacts/audit-baseline-{timestamp}.yaml`\
  \ (gitignored via `{project_root}/tmp/`)\n- Baseline generation is automatic on\
  \ first audit of a resource\n- Baseline comparison is integrated into drift-detection\
  \ task\n- Cleanup via `git-workflow/tasks/cleanup.md` (following the existing behavioral-evidence\
  \ artifact cleanup pattern at Step 2.9)\n- Baseline format is YAML (per Contract\
  \ Format Standardization #582 — YAML for all LLM-consumed content)\n- Coherence\
  \ baselines (`coherence-extraction.md`) and audit baselines (`baseline-generation.md`)\
  \ are separate task files sharing the same artifact directory\n\n## Dependencies\n\
  \n- **Existing coherence-extraction baseline** — this spec does NOT replace or modify\
  \ it. The two baselines serve different purposes (structural alignment vs. claim\
  \ verification) and coexist in the same artifact directory.\n- **Existing pre-red-baseline\
  \ pipeline step** — this spec does NOT modify it. Pipeline state baselines and audit\
  \ baselines are separate concerns.\n- **Contract Format Standardization #582** —\
  \ baseline files use YAML, consistent with the project standard.\n\n## Interdependencies\n\
  \nThis spec shares cross-cutting concerns with the following open issues. Each MUST\
  \ be marked with a reciprocal interdependency reference:\n\n| Issue | Concern |\
  \ Action |\n|-------|---------|--------|\n| `.opencode#1644` — Branch-Verification\
  \ Mandate | SC-5 `branch_checked` field overlaps with #1644's branch verification\
  \ mechanism. The baseline schema's `branch_checked` field should consume #1644's\
  \ branch check output, not define its own. | Add interdependency marker in both\
  \ specs. Coordinate: baseline-generation consumes branch-verification output. |\n\
  | `.opencode#1641` — Semantic Audit Depth (Nine Evaluation Dimensions) | The reality-checks\
  \ schema (codebase + external categories) may overlap with #1641's 9 evaluation\
  \ dimensions. Reality-checks are a subset of semantic audit dimensions. | Add interdependency\
  \ marker. Ensure reality-checks schema aligns with #1641's dimension taxonomy. |\n\
  | `.opencode#912` — SC Coherence Gate + Remediation Routing | Baseline snapshots\
  \ from this spec would feed #912's coherence gate as input data for drift detection.\
  \ | Add interdependency marker. Baseline generation is a prerequisite data source\
  \ for coherence gate. |\n| `.opencode#492` — Stale-Branch Detection Before PR Creation\
  \ | Both carry the `drift-detection` label. Different scope (branch staleness vs.\
  \ audit claim drift) but share the drift-detection concern area. | Add interdependency\
  \ marker. No direct coupling — monitor for scope overlap during implementation.\
  \ |\n| `.opencode#795` — Adversarial Auditor Artifact Pre-Check | Both deal with\
  \ audit artifact lifecycle. #795 checks for missing artifacts; this spec creates\
  \ baseline artifacts. | Add interdependency marker. Baseline artifacts must be included\
  \ in #795's artifact pre-check scope. |\n\n## Origin\n\nExtracted from `.opencode#483`\
  \ (closed as partially superseded). The consolidation work from #483 is complete;\
  \ this spec addresses the remaining baseline-generation gap.\n"
