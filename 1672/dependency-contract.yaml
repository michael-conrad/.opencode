    files:
      - ".opencode/agents/auditor-deepseek-flash.md"
      - ".opencode/agents/auditor-gemma4.md"
      - ".opencode/agents/auditor-mistral-large.md"
      - ".opencode/agents/auditor-qwen3.5.md"
