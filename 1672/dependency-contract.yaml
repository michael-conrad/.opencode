      - ".opencode/skills/adversarial-audit/SKILL.md"
    scs: ["SC-5"]
  - id: 5
    name: "Behavioral Tests"
    concern: "Write behavioral enforcement tests for SC-13 and SC-14"
    depends_on: [1, 2, 3, 4]
    files:
      - ".opencode/tests/behaviors/"
    scs: ["SC-13", "SC-14"]
