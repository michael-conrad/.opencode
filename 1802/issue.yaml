title: '[SPEC] PR body VbC results table — standard 4-column format with test-type
  annotation'
status: open
labels:
- spec
body: '## Problem


  PR bodies from opencode agents list test results inconsistently — sometimes just
  PASS/FAIL counts, sometimes test names. Reviewers can''t tell at a glance what was
  tested, against what infrastructure, or whether it maps to spec success criteria.


  ## Required Format


  Every PR body that includes test results MUST use this VbC table format:


  | ID | Criterion | Test | Result |

  |----|-----------|------|--------|

  | SC-1 | Creates `{output}/db/` directory | `test_creates_db_dir` | ✅ PASS (live
  DB) |

  | SC-3 | Inserts rows with `status=''pending''` | `test_inserts_pending_rows` |
  ✅ PASS (live DB) |

  | SC-7 | Sunday → previous Monday | `test_issueweek_sunday` | ✅ PASS (unit) |

  | SC-11 | Unreachable DB raises RuntimeError | `test_db_unreachable` | ✅ PASS (live
  DB) |


  ### Result Column Annotations


  | Annotation | Meaning |

  |------------|---------|

  | `(live DB)` | Test runs against a real database (testcontainer or real instance)
  |

  | `(unit)` | Standalone unit test, no infrastructure needed |

  | `(mock)` | Test uses mocked/stubbed dependencies |

  | `(integration)` | Test hits real infrastructure beyond core (filesystem, network,
  external API) |


  ### Requirements


  1. PR body generation in `git-workflow` `pr-creation` task or `verification-before-completion`
  must produce this table format

  2. The `finishing-a-development-branch` checklist must verify the table is present
  in the PR body

  3. Test-type annotations must be auto-detected from test infrastructure usage (e.g.,
  testcontainers fixture → `(live DB)`, no fixtures → `(unit)`, `unittest.mock` →
  `(mock)`)

  4. The table must be populated from VbC output, not hand-written

  '
