title: '[SPEC] Holistic Fix Spec for spec-creation Skill'
status: open
labels: []
body: "**STATUS:** DRAFT\n\n**CREATED:** 2026-07-09\n\n> **Compliance Requirement:**\
  \ All steps and sub-steps in this document MUST be followed in order. Failure to\
  \ comply with any step — including but not limited to verification gates, test phases,\
  \ audit checkpoints, and review steps — will result in the feature branch being\
  \ rejected and discarded, requiring a full rework from scratch and loss of all prior\
  \ work. There is no valid reason to skip, compress, reorder, or omit any step. If\
  \ a step appears redundant or unnecessary, follow it anyway — the cost of following\
  \ an extra step is negligible compared to the cost of rework from a skipped step.\n\
  \n## Intent and Executive Summary\n\n| Field | Value |\n|-------|-------|\n| Problem\
  \ Statement | The spec-creation skill and its task files are missing several critical\
  \ quality mandates that cause downstream defects: no research card consultation\
  \ mandate, no live documentation URL verification, no interdependency checking,\
  \ weak SC-fail cascading language, no anti-lobotomization language in the spec body\
  \ template, a \"simple specs may skip\" escape hatch, contract file naming drift,\
  \ and missing #1063 pipeline enforcement gates. |\n| Root Cause / Motivation | These\
  \ gaps were introduced incrementally as the spec-creation skill evolved. Each gap\
  \ represents a quality gate that was never formalized as a mandatory pipeline step.\
  \ The cumulative effect is that agents produce specs with unverified claims, conflicting\
  \ interdependencies, and no protection against test lobotomization. |\n| Approach\
  \ Chosen | Mandate all nine fixes as mandatory pipeline gates with behavioral enforcement.\
  \ Each fix is a discrete phase with its own success criteria. The spec body template\
  \ in create.md is the primary target — it receives new mandatory preamble sections,\
  \ a mandatory interdependency section, and mandatory live documentation URL verification.\
  \ |\n| Alternatives Considered & Why Discarded | (1) Fix only the escape hatch and\
  \ defer the rest — discarded because the gaps are interdependent; fixing one without\
  \ the others leaves quality holes. (2) Create separate specs for each gap — discarded\
  \ because the changes all touch the same files and would create merge conflicts\
  \ if implemented independently. |\n| Key Design Decisions | All sections mandatory\
  \ (no tier-based skipping). Research card consultation is a pipeline gate. Live\
  \ documentation URLs are verified. Interdependency marking is bidirectional. SC-fail\
  \ cascading and anti-lobotomization are preamble sections in every generated spec.\
  \ Contract files renamed to match task name. |\n\n## Problem\n\nThe spec-creation\
  \ skill and its task files are missing several critical quality mandates that cause\
  \ downstream defects:\n\n1. **No research card consultation mandate** — Agents write\
  \ specs without checking existing research findings, producing specs that duplicate\
  \ or contradict known information\n2. **No live documentation URL verification**\
  \ — \"Documentation Sources\" is a template, not a mandatory verification step;\
  \ URLs may be stale or broken\n3. **No interdependency checking** — Agents don't\
  \ check for overlapping/conflicting open specs before writing, producing specs that\
  \ conflict with in-flight work\n4. **SC-fail cascading statement is too weak** —\
  \ Current \"all-or-nothing gate\" lacks the strong language needed to prevent agents\
  \ from soft-passing failures\n5. **No anti-lobotomization language in spec body\
  \ template** — Agents can weaken tests without the spec explicitly forbidding it\n\
  6. **\"Simple specs may skip\" escape hatch still present (issue #1552)** — Allows\
  \ agents to skip quality gates\n7. **Contract file naming drift** — Task renamed\
  \ to `create` but contract files still use `write-` prefix (issue #1703 gap)\n8.\
  \ **Missing #1063 pipeline enforcement gates** — Anti-merge gates, doc-source-currency\
  \ check, SC-ID traceability not implemented\n9. **Issues #1229 and #1064 appear\
  \ fully implemented but remain OPEN** — Need verification and closure\n\n## Scope\n\
  \n**In scope:**\n- Remove \"simple specs may skip\" language from create.md and\
  \ replace with mandatory-all-sections\n- Add research card consultation step to\
  \ operating-protocol.md and requirements.md\n- Add live documentation URL verification\
  \ to create.md\n- Add interdependency checking and marking to operating-protocol.md\
  \ and create.md\n- Strengthen SC-fail cascading statement in create.md spec body\
  \ template\n- Add anti-lobotomization language to create.md spec body template\n\
  - Rename contract files from write-* to create-* and update all references\n- Add\
  \ anti-merge gate, doc-source-currency check, and SC-ID traceability to create.md\n\
  - Verify and close #1229 and #1064\n- Create research card for spec-creation skill\
  \ state\n\n**Out of scope:**\n- Changes to other skills' task files\n- Changes to\
  \ guideline files outside the spec-creation skill\n- New behavioral enforcement\
  \ tests (these are written during implementation, per the post-approval spec mandate)\n\
  \n## Approach\n\nThis spec mandates nine fixes to the spec-creation skill as mandatory\
  \ pipeline gates. Each fix is a discrete phase with its own success criteria. The\
  \ fixes are applied to the task files (create.md, operating-protocol.md, requirements.md),\
  \ contract files, and SKILL.md. The spec body template in create.md is the primary\
  \ target — it receives new mandatory preamble sections (SC-fail cascading, anti-lobotomization),\
  \ a mandatory interdependency section, and mandatory live documentation URL verification.\
  \ The \"simple specs may skip\" escape hatch is removed entirely. Contract files\
  \ are renamed to match the task name. Stale open issues are verified and closed.\n\
  \n## Affected Files\n\n| File | Change |\n|------|--------|\n| `.opencode/skills/spec-creation/tasks/create.md`\
  \ | Primary target — remove escape hatch, add preamble sections, add interdependency\
  \ section, add live URL verification, add #1063 gates |\n| `.opencode/skills/spec-creation/tasks/operating-protocol.md`\
  \ | Add research card consultation step, add interdependency checking step, update\
  \ contract references |\n| `.opencode/skills/spec-creation/tasks/requirements.md`\
  \ | Add research card check |\n| `.opencode/skills/spec-creation/contracts/write-input-template.yaml`\
  \ | Rename to create-input-template.yaml |\n| `.opencode/skills/spec-creation/contracts/write-output-template.yaml`\
  \ | Rename to create-output-template.yaml |\n| `.opencode/skills/spec-creation/SKILL.md`\
  \ | Update contract references |\n| `.opencode/.issues/research-cards/spec-creation-state.md`\
  \ | Create new research card |\n\n## Interdependency\n\n| Issue | Classification\
  \ | Description |\n|-------|---------------|-------------|\n| [#1552](https://github.com/michael-conrad/.opencode/issues/1552)\
  \ | SUPERSEDES | Remove 'simple specs may skip' complexity classification escape\
  \ hatch — subsumed by Phase 1 |\n| [#1229](https://github.com/michael-conrad/.opencode/issues/1229)\
  \ | SUPERSEDES | Post-SC uplift check — verify completeness, close if done — subsumed\
  \ by Phase 9 |\n| [#1063](https://github.com/michael-conrad/.opencode/issues/1063)\
  \ | SUPERSEDES | Anti-merge gates, doc-source-currency, SC-ID traceability — subsumed\
  \ by Phase 8 |\n| [#1703](https://github.com/michael-conrad/.opencode/issues/1703)\
  \ | SUPERSEDES | Contract file naming drift (write→create) — subsumed by Phase 7\
  \ |\n| [#1673](https://github.com/michael-conrad/.opencode/issues/1673) | RELATED\
  \ | Foundation already shipped (trigger phrases, dispatch table, create task, uplift\
  \ check) |\n| [#1605](https://github.com/michael-conrad/.opencode/issues/1605) |\
  \ RELATED | Pipeline-readiness-gate already positioned |\n| [#1060](https://github.com/michael-conrad/.opencode/issues/1060)\
  \ | RELATED | SC table columns, preamble sections already implemented |\n| [#1061](https://github.com/michael-conrad/.opencode/issues/1061)\
  \ | RELATED | Artifact infrastructure already implemented |\n| [#1062](https://github.com/michael-conrad/.opencode/issues/1062)\
  \ | RELATED | Handoff gates already implemented |\n| [#1064](https://github.com/michael-conrad/.opencode/issues/1064)\
  \ | RELATED | Writing-plans consumer awareness — appears implemented, verify and\
  \ close (Phase 9) |\n| [#850](https://github.com/michael-conrad/.opencode/issues/850)\
  \ | RELATED | Parent coordination (dependency chain ordering) |\n\n## Documentation\
  \ Sources\n\n| Source Category | What Was Consulted | Purpose |\n|----------------|-------------------|---------|\n\
  | Direct source search | `srclight_search_symbols(\"spec-creation\")` | Identify\
  \ spec-creation skill structure |\n| Direct source search | Read `.opencode/skills/spec-creation/tasks/create.md`\
  \ | Understand current spec body template and pipeline steps |\n| Direct source\
  \ search | Read `.opencode/skills/spec-creation/tasks/operating-protocol.md` | Understand\
  \ pipeline step ordering and contract paths |\n| Direct source search | Read `.opencode/skills/spec-creation/SKILL.md`\
  \ | Understand skill dispatch table and invocation |\n| Documentation URLs | [080-code-standards.md](https://github.com/michael-conrad/.opencode/blob/main/guidelines/080-code-standards.md)\
  \ | Reference Test Integrity Mandate and Evidence Type Taxonomy |\n| Documentation\
  \ URLs | [065-verification-honesty.md](https://github.com/michael-conrad/.opencode/blob/main/guidelines/065-verification-honesty.md)\
  \ | Reference Cost Model and Hard Failure Discipline |\n| Documentation URLs | [020-go-prohibitions.md](https://github.com/michael-conrad/.opencode/blob/main/guidelines/020-go-prohibitions.md)\
  \ | Reference research card catalogue mandate |\n| Live verification | `github_issue_read(method=get,\
  \ issue_number=1552)` | Verify #1552 is open and describes escape hatch |\n| Live\
  \ verification | `github_issue_read(method=get, issue_number=1229)` | Verify #1229\
  \ state for Phase 9 closure |\n| Live verification | `github_issue_read(method=get,\
  \ issue_number=1064)` | Verify #1064 state for Phase 9 closure |\n\n## Phases\n\n\
  ### Phase 1: Remove Complexity Escape Hatch (#1552)\n- Remove \"Simple specs may\
  \ skip this section\" language from create.md\n- Remove minimal/standard/complex\
  \ tiered structure\n- Replace with: all sections are mandatory, no tier-based skipping\n\
  - Remove \"Skip areas that don't apply to simple specs\" language\n\n### Phase 2:\
  \ Add Research Card Consultation Mandate\n- Add step to operating-protocol.md: before\
  \ requirements extraction, consult `.issues/research-cards/`\n- Add step to requirements.md:\
  \ check research cards for existing findings on the topic\n- Add step to create.md:\
  \ include research card references in spec body\n- Create a research card for spec-creation\
  \ itself documenting current state\n\n### Phase 3: Add Live Documentation URL Verification\n\
  - Add mandatory step to create.md: verify all documentation source URLs are live\n\
  - Add to spec body template: Documentation Sources section must include verified\
  \ live URLs\n- Add verification substep: each URL must be confirmed reachable before\
  \ spec is complete\n- Prefer online (live) documentation over local; local is fallback\
  \ only\n\n### Phase 4: Add Interdependency Checking and Marking\n- Add step to operating-protocol.md:\
  \ before create, check for overlapping/conflicting open specs\n- Add to create.md:\
  \ Interdependency section in spec body listing related issues with classification\n\
  - Classification: BLOCKS, BLOCKED_BY, RELATED, SUPERSEDES, SUPERSEDED_BY\n- Mark\
  \ interdependencies explicitly in both this spec and the interdependent issues\n\
  \n### Phase 5: Strengthen SC-Fail Cascading Statement\n- Replace current \"all-or-nothing\
  \ gate\" with stronger language in create.md spec body template\n- Exact language:\
  \ \"Any SC that is skipped, deferred, weakened, or otherwise bypassed marks ALL\
  \ SCs as FAIL. A PR containing any such bypass MUST be immediately rejected and\
  \ trashed as defective and unusable. There is no partial credit. There is no 'close\
  \ enough.' 100% clean PASS on ALL SCs is the only acceptable outcome.\"\n- Add this\
  \ as a mandatory preamble section in every generated spec\n\n### Phase 6: Add Anti-Lobotomization\
  \ Language\n- Add to create.md spec body template: explicit anti-lobotomization\
  \ section\n- Reference `080-code-standards.md` Test Integrity Mandate\n- Language:\
  \ \"Tests MUST NOT be lobotomized. Removing or weakening a behavioral test assertion\
  \ to work around a timeout, failure, or infrastructure issue is a CRITICAL VIOLATION.\
  \ SCs must achieve 100% clean PASS. No SC may be weakened, deferred, or reclassified\
  \ to a lower evidence type to evade implementation.\"\n- Add SC in every spec that\
  \ explicitly forbids test lobotomization\n\n### Phase 7: Fix Contract File Naming\
  \ Drift\n- Rename `contracts/write-input-template.yaml` → `contracts/create-input-template.yaml`\n\
  - Rename `contracts/write-output-template.yaml` → `contracts/create-output-template.yaml`\n\
  - Update all references in operating-protocol.md, create.md, and SKILL.md\n\n###\
  \ Phase 8: Add Missing #1063 Pipeline Enforcement Gates\n- Add anti-merge gate to\
  \ create.md: verify no SC conflicts with already-merged specs\n- Add doc-source-currency\
  \ check: verify all documentation sources are current (not stale)\n- Add SC-ID traceability:\
  \ verify every SC ID maps to a unique, traceable requirement\n\n### Phase 9: Verify\
  \ and Close Stale Open Issues\n- Verify #1229 implementation is complete → close\
  \ if so\n- Verify #1064 implementation is complete → close if so\n- Document verification\
  \ evidence\n\n### Phase 10: Create Research Card\n- Create `.opencode/.issues/research-cards/spec-creation-state.md`\
  \ documenting:\n  - Current state of spec-creation skill\n  - Known defects and\
  \ their status\n  - Interdependency map\n  - This fix spec's scope\n\n## Key Design\
  \ Decisions\n\n| DEC-ID | Decision | Rationale | Requirement Key | Affected SCs\
  \ |\n|--------|----------|-----------|-----------------|--------------|\n| DEC-1\
  \ | All sections in spec body template become mandatory | No tier-based skipping\
  \ — every section is required regardless of spec complexity | MUST | SC-1, SC-2\
  \ |\n| DEC-2 | Research card consultation is a pipeline gate | Not optional — agents\
  \ MUST check research cards before writing specs | MUST | SC-3, SC-4 |\n| DEC-3\
  \ | Live documentation URLs are verified, not just listed | Each URL must be confirmed\
  \ reachable; local docs are fallback only | MUST | SC-5, SC-6 |\n| DEC-4 | Interdependency\
  \ marking is bidirectional | Both this spec and interdependent issues are marked\
  \ | MUST | SC-7, SC-8 |\n| DEC-5 | SC-fail cascading is a preamble section in every\
  \ generated spec | Embedded in every generated spec, not just a task file instruction\
  \ | MUST | SC-9 |\n| DEC-6 | Anti-lobotomization is a preamble section in every\
  \ generated spec | Embedded in every generated spec with an SC that explicitly forbids\
  \ test lobotomization | MUST | SC-10, SC-11 |\n| DEC-7 | Contract files renamed\
  \ to match task name | write-* → create-* to eliminate naming drift | MUST | SC-12\
  \ |\n\n## Regression Invariants\n\n- [ ] 1. Existing spec-creation pipeline steps\
  \ MUST continue to function after changes\n- [ ] 2. Existing contract file consumers\
  \ MUST be updated to reference new names\n- [ ] 3. Existing specs created before\
  \ this change MUST remain valid and readable\n- [ ] 4. The `issue-operations` integration\
  \ MUST continue to work unchanged\n\n## Success Criteria\n\n**SC-Fail Cascading\
  \ Preamble:** Any SC that is skipped, deferred, weakened, or otherwise bypassed\
  \ marks ALL SCs as FAIL. A PR containing any such bypass MUST be immediately rejected\
  \ and trashed as defective and unusable. There is no partial credit. There is no\
  \ 'close enough.' 100% clean PASS on ALL SCs is the only acceptable outcome.\n\n\
  **Anti-Lobotomization Preamble:** Tests MUST NOT be lobotomized. Removing or weakening\
  \ a behavioral test assertion to work around a timeout, failure, or infrastructure\
  \ issue is a CRITICAL VIOLATION. SCs must achieve 100% clean PASS. No SC may be\
  \ weakened, deferred, or reclassified to a lower evidence type to evade implementation.\
  \ See `080-code-standards.md` Test Integrity Mandate.\n\n| ID | Criterion | Evidence\
