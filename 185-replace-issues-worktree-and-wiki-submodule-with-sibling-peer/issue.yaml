title: Replace .issues/ worktree and wiki submodule with sibling peer repos
status: open
labels:
- SPEC
body: "# Spec: Replace .issues/ Worktree with Sibling Peer Repos\n\n**Status:** DRAFT\n\
  **Date:** 2026-06-11\n**Issue:** https://github.com/michael-conrad/opencode-config/issues/185\n\
  \n## Problem\n\nThe AI agent is repeatedly confused by git worktrees checked out\
  \ as `.issues/`. Specific failure patterns:\n\n1. **Worktree path resolution split-brain**:\
  \ The `worktree.path` context variable fires for ALL worktrees including `.issues/`.\
  \ An explicit exemption in `060-tool-usage.md` says `.issues/` does NOT need the\
  \ prefix — but the agent applies or skips the prefix inconsistently, writing to\
  \ the wrong repo.\n\n2. **Orphan branch in main repo's ref namespace**: The `issues-data`\
  \ orphan branch lives in the code repo's ref list. During `git-workflow cleanup`,\
  \ the agent scans branches, sees `issues-data`, and attempts to delete it — losing\
  \ data.\n\n3. **`.opencode/.issues/` nested worktree**: Same split-brain problem\
  \ as the parent's `.issues/` but nested inside the submodule, compounding path resolution\
  \ errors.\n\n## Solution\n\nReplace ALL `.issues/` worktrees with standalone sibling\
  \ peer repos at the workspace root level. Each sibling is a standalone `git clone`\
  \ of its parent repo, checked out on the `issues-data` branch — no worktrees, no\
  \ orphan branches in the code repo's ref list.\n\n### Target Directory Layout\n\n\
  ```\n~/git/\n  opencode-config/                          # code repo (project root)\n\
  \    .opencode/                              # submodule (mandatory nesting, ONLY\
  \ nesting)\n  opencode-config.issues-data/              # code repo's issue data\
  \ (standalone clone, issues-data branch)\n  .opencode.issues-data/             \
  \       # .opencode repo's issue data (standalone clone, issues-data branch)\n```\n\
  \n### Characteristics\n\n| Property | Value |\n|---|---|\n| Branch name in sibling\
  \ repos | `issues-data` (always, never \"issues\") |\n| Sibling directory naming\
  \ | `{REPO}.issues-data/` |\n| Path resolution | `{PROJECT_ROOT}/../{REPO}.issues-data/{N}/spec-artifacts/`\
  \ |\n| Worktrees | Zero. Not one. Every issue-data repo is a standalone clone. |\n\
  | `.issues/` directories | Zero. Eliminated everywhere including `.opencode/.issues/`.\
  \ |\n| Orphan branches in code repo | Zero. All orphan branches live in sibling\
  \ repos only. |\n| Session-init reporting | Does NOT report siblings. Only project\
  \ root contents. Sibling discovery by `local-issues` tool. |\n| Wiki | Out of scope\
  \ for this spec. Not handled by `local-issues`. |\n\n## Success Criteria\n\n| ID\
  \ | Criterion | Evidence Type |\n|---|---|---|\n| SC-1 | `local-issues init` clones\
  \ sibling repo instead of creating worktree | `behavioral` |\n| SC-2 | `local-issues`\
  \ tool validates sibling repo exists on every command call | `behavioral` |\n| SC-3\
  \ | Zero `.issues/` directories exist in any repo after migration | `structural`\
  \ |\n| SC-4 | Session-init does NOT report sibling repo paths | `string` |\n| SC-5\
  \ | `060-tool-usage.md` `.issues/` Worktree Exemption section deleted | `string`\
  \ |\n| SC-6 | All skill task card `.issues/{N}` paths converted to `{PROJECT_ROOT}/../{REPO}.issues-data/{N}/`\
  \ | `string` |\n| SC-7 | `.opencode/.issues/` worktree eliminated — replaced by\
  \ `.opencode.issues-data/` sibling | `structural` |\n| SC-8 | Agent cannot see `issues-data`\
  \ branch in code repo's ref list | `behavioral` |\n| SC-9 | `local-issues init`\
  \ auto-migrates existing `.issues/` worktree content to sibling | `behavioral` |\n\
  \n## Phases\n\n### Phase 1: `local-issues` Tool Rewrite\n\nReplace all worktree\
  \ management in `.opencode/tools/local-issues` with sibling repo operations.\n\n\
  **Functions to rewrite:**\n\n| Current Function | Replacement |\n|---|---|\n| `_worktree_active()`\
  \ | `_sibling_valid()` — check `{REPO}.issues-data/.git/HEAD` exists |\n| `_ensure_worktree()`\
  \ | `_ensure_sibling()` — `git clone -b issues-data <remote-url> ../{REPO}.issues-data/`\
  \ |\n| `_ensure_all_worktrees()` | `_ensure_all_siblings()` — iterate repos, clone\
  \ each |\n| `_push_worktree()` | `git -C ../{REPO}.issues-data/ push origin issues-data`\
  \ |\n| `_auto_commit()` | `git -C ../{REPO}.issues-data/ add -A && commit -m \"\
  ...\" && push` |\n| `_migrate_existing_data()` | Part of auto-remediation (see below)\
  \ |\n| `_detect_dual_branch()` | Removed — no \"issues\" branch in sibling |\n|\
  \ `_push_orphan_if_needed()` | Removed — sibling remote always has `issues-data`\
  \ |\n| `init` command | Detect existing `.issues/` → auto-remediate → clone sibling\
  \ |\n\n**New functions:**\n\n| Function | Purpose |\n|---|---|\n| `_sibling_repo_path(repo_path)`\
  \ | Resolve `{PROJECT_ROOT}/../{REPO}.issues-data/` |\n| `_sibling_remote_url(repo_path)`\
  \ | Resolve clone URL from repo's remote |\n| `_sibling_valid(repo_path)` | Verify\
  \ sibling repo exists, has `.git/HEAD`, has correct branch |\n| `_validate_sibling_on_call()`\
  \ | Called at top of every mutation command — verify sibling repo exists or auto-clone\
  \ |\n\n**Sibling validation on every command call:**\n\nEvery `cmd_*` handler (`create`,\
  \ `update`, `close`, `comment`, `link`, `delete`, `promote`, `search`, `list`, `read`)\
  \ MUST call `_validate_sibling_on_call()` at entry that verifies:\n1. `{PROJECT_ROOT}/../{REPO}.issues-data/`\
  \ exists\n2. `.git/HEAD` exists and is valid\n3. If either fails → auto-clone before\
  \ proceeding, or HALT with clear error\n\n**Auto-commit/push unchanged:**\n\nAll\
  \ mutation commands (`create`, `update`, `close`, `comment`, `link`, `delete`, `renumber`,\
  \ `promote`) still auto-commit and auto-push after mutation. Only the target directory\
  \ changes from `-C .issues` to `-C ../{REPO}.issues-data/`.\n\n**Removed entirely:**\n\
  \n- `_worktree_active()` — concept eliminated\n- `_ensure_worktree()` — concept\
  \ eliminated\n- `git worktree add --detach` — orphan branch creation via `git clone\
  \ -b issues-data`\n- `git worktree prune` — no worktrees to prune\n- `.issues/`\
  \ fallback to plain files — no worktree to fall back from\n- `_detect_dual_branch()`\
  \ — no \"issues\" branch in sibling\n\n**Auto-remediation (`init` command):**\n\n\
  When `local-issues init` runs, it checks each repo for existing `.issues/` worktrees.\
  \ If found:\n\n1. Snapshot ALL content from `.issues/` — every file and directory\
  \ (committed, uncommitted, unpushed)\n2. `git worktree remove .issues` (force if\
  \ dirty: `--force`)\n3. `git worktree prune` — remove stale entries\n4. Delete `.issues/`\
  \ directory from repo root\n5. Clone sibling from same remote, issues-data branch:\n\
  \   `git clone -b issues-data <remote-url> ../{REPO}.issues-data/`\n6. For each\
  \ item in snapshot: if it does NOT exist in cloned sibling, copy it in\n7. Auto-commit\
  \ restored content to sibling\n8. Remove `issues-data` branch from repo's local\
  \ ref list:\n   `git branch -D issues-data` (local only, not remote)\n9. Report:\
  \ \"Migrated from worktree to sibling at ../{REPO}.issues-data/\"\n\n### Phase 2:\
  \ AGENTS.md per Sibling Repo\n\nEach sibling repo has its own AGENTS.md:\n\n**`opencode-config.issues-data/AGENTS.md`:**\n\
  ```\n# AGENTS.md — Issue Data Sibling Repo\n- This repo contains issue tracking\
  \ data only.\n- Branch: `issues-data` (always).\n- No feature branches. No PRs.\
  \ No wiki content.\n- All operations through `local-issues` tool from the parent\
  \ repo.\n```\n\n**`.opencode.issues-data/AGENTS.md`:**\n```\n# AGENTS.md — .opencode\
  \ Issue Data Sibling Repo\n- This repo contains issue tracking data for the .opencode\
  \ repo.\n- Branch: `issues-data` (always).\n- No feature branches. No PRs.\n- All\
  \ operations through `local-issues` tool.\n```\n\n### Phase 3: Skill Task Card Path\
  \ Updates\n\n~194 references to `.issues/{N}/` across skill task files and guidelines.\
  \ All must be converted.\n\n**Conversion pattern:**\n\n```\nCurrent:    .issues/{N}/spec-artifacts/plan.md\n\
  New:        {PROJECT_ROOT}/../{REPO}.issues-data/{N}/spec-artifacts/plan.md\n```\n\
  \n`{REPO}` is resolved by the `local-issues` tool, not hardcoded.\n\n**Files to\
  \ update (grouped by effort):**\n\n| Group | Files | Ref Count | Effort |\n|---|---|---|---|\n\
  | issue-operations local platform | `platforms/local/SKILL.md`, `platforms/local/tasks/*.md`,\
  \ `tasks/creation.md`, `tasks/comment.md`, `tasks/sync-from-remote.md` | ~115 |\
  \ High |\n| writing-plans | `SKILL.md`, `tasks/create.md`, `tasks/create/plan-structure.md`,\
  \ `tasks/create/create-and-validate.md` | 36 | Medium |\n| spec-creation | `tasks/write.md`,\
  \ `tasks/pipeline-readiness-gate.md` | 27 | Medium |\n| guidelines | `060-tool-usage.md`,\
  \ `000-critical-rules.md` | 8 | Low |\n| implementation-pipeline | `SKILL.md`, `enforcement/context-passing.md`\
  \ | 5 | Low |\n| tests | `tests/AGENTS.md` | 3 | Low |\n| TOTAL | ~30 files | ~194\
  \ | |\n\n### Phase 4: Guideline Updates\n\n**`060-tool-usage.md` — Delete entire\
  \ `.issues/` Worktree Exemption section:**\n\n```\n### `.issues/` Worktree Exemption\
  \ (CRITICAL)\n→ DELETE (lines 126-139)\n```\n\nThe branching requirement footnote\
  \ moves to sibling AGENTS.md.\n\n**`060-tool-usage.md` — Update §9 Identity Source\
  \ Semantics:**\n\nLine 235: `use local .issues/` directory → `use sibling repo at\
  \ ../{REPO}.issues-data/`\n\n**`000-critical-rules.md` — Update inline issue content\
  \ creation rule:**\n\nLine 580: \"orchestrator editing .issues/ files\" → \"orchestrator\
  \ writing to issues-data sibling repo via local-issues tool\"\n\n### Phase 5: Test\
  \ Updates\n\n~30 behavioral test files reference `.issues/` paths. Changes:\n\n\
  | File | Change Description |\n|---|---|\n| `tests/behaviors/helpers.sh` | Remove\
  \ worktree setup. Replace with sibling clone setup. |\n| `tests/behaviors/local-issues-multi-repo.sh`\
  \ | Change prompt from \"create .issues/ worktree\" to \"clone issues-data sibling\"\
  \ |\n| `tests/behaviors/local-issues-list-spec-path.sh` | Change `.issues/100/`\
  \ to sibling-relative path |\n| `tests/behaviors/local-issues-list-qualified-format.sh`\
  \ | Same |\n| `tests/behaviors/local-issues-list-sort-order.sh` | Same |\n| `tests/behaviors/1102-sc-8-mutation-auto-commit.sh`\
  \ | Change `-C .issues` to `-C ../{REPO}.issues-data/` |\n| `tests/behaviors/1102-sc-2-init-delegates-to-sync.sh`\
  \ | Change sync delegation path |\n| `tests/behaviors/auditor-*.sh` | Update spec_local_dir\
  \ paths |\n| `tests/behaviors/spec1061-sc-*.sh` | Content-verification artifact\
  \ paths |\n| `tests/behaviors/spec-revision-no-auth.sh` | Update `.issues/1/spec.md`\
  \ path |\n| `tests/behaviors/no-inline-fallback-universal.sh` | Update forbidden\
  \ pattern |\n| `tests/behaviors/issue-operations-submodule-routing.sh` | Update\
  \ `.issues/` assertion |\n| `tests/behaviors/local-issue-routing.sh` | Update expected\
  \ paths |\n| `tests/behaviors/local-first-creation.sh` | Update prompt/expected\
  \ paths |\n| `tests/behaviors/local-issues-create-plain.sh` | Update prompt/expected\
  \ paths |\n| `tests/behaviors/local-issues-autonumber.sh` | Update prompt/expected\
  \ paths |\n| `tests/behaviors/content-classification-gate.sh` | Update `.issues/`\
  \ storage paths |\n| `tests/behaviors/decision-log-local-first.sh` | Update `.issues/`\
  \ path |\n| `tests/behaviors/sync-classification.sh` | Update fixture paths |\n\
  | `tests/behaviors/fixtures/setup-fixture-issues.sh` | Update fixture creation paths\
  \ |\n| `tests/test_local_issues.py` | Remove worktree tests. Add sibling-validation\
  \ tests. |\n| `tests/test_local_issues_setup.py` | Remove worktree tests. Add sibling\
  \ clone tests. |\n\nNew behavioral tests:\n\n- `local-issues-init-clones-sibling.sh`\
  \ — SC-1: `local-issues init` clones sibling (behavioral)\n- `local-issues-validate-sibling.sh`\
  \ — SC-2: validates sibling exists on every call (behavioral)\n- `local-issues-auto-clone.sh`\
  \ — SC-3: auto-clones if sibling missing (behavioral)\n- `local-issues-auto-remediate.sh`\
  \ — SC-9: auto-migrates existing `.issues/` (behavioral)\n- `local-issues-agent-no-issues-data-branch.sh`\
  \ — SC-8: agent cannot see issues-data in code repo (behavioral)\n\n### Phase 6:\
  \ Final Cleanup — Verify\n\n1. Run `local-issues init` — triggers auto-remediation\
  \ of any lingering `.issues/` worktrees\n2. Verify zero `.issues/` directories:\
  \ `find ~/git -name \".issues\" -type d`\n3. Verify code repo `git branch` shows\
  \ no `issues-data` branch\n4. Verify `status: completed` for this spec's issue\n\
  \n## Items (Dependency Order)\n\n| Item | Phase | Description | Depends On |\n|---|---|---|---|\n\
  | 1 | 1 | Rewrite `local-issues` tool — replace worktree functions with sibling\
  \ clone functions, add auto-remediation for existing `.issues/` | — |\n| 2 | 2 |\
  \ Create AGENTS.md for each sibling repo | 1 |\n| 3 | 3 | Update issue-operations\
  \ local platform paths | 1 |\n| 4 | 3 | Update writing-plans paths | 1 |\n| 5 |\
  \ 3 | Update spec-creation paths | 1 |\n| 6 | 3 | Update implementation-pipeline\
  \ paths | 1 |\n| 7 | 4 | Update guidelines (060-tool-usage.md, 000-critical-rules.md)\
  \ | — |\n| 8 | 5 | Update test harness, behavioral tests, Python tests | 1 |\n|\
  \ 9 | 6 | Run `local-issues init` to trigger auto-remediation; verify zero `.issues/`\
  \ | 1,8 |"
