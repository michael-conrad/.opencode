descriptions:
- skill: approval-gate
  file: skills/approval-gate/SKILL.md
  current_description: 'Authorization gatekeeper that verifies scope, cascade, and halt boundaries. Dispatch when checking
    or enforcing authorization scope, approval cascade, pipeline halt boundaries, label application, spec-to-plan cascade,
    revision revocation, or bug discovery protocol. Also dispatch when verifying authorization state, applying approved-for-*
    labels, or handling re-implementation after spec revision. All conditions are MANDATORY — no implementation without authorization.
    User phrases: check authorization, verify scope, enforce cascade, apply label, approve, go, authorized, revision revokes
    approval, bug discovery protocol.'
  classification: c
  reformulation: Authorization gatekeeper that verifies scope, cascade, and halt boundaries. Dispatch when checking or enforcing
    authorization scope, approval cascade, pipeline halt boundaries, label application, spec-to-plan cascade, revision revocation,
    or bug discovery protocol. Also dispatch when verifying authorization state, applying approved-for-* labels, or handling
    re-implementation after spec revision. All conditions are MANDATORY — no implementation without authorization
- skill: audit
  file: skills/audit/SKILL.md
  current_description: Adversarial auditor that verifies specs, plans, code, and generated content against standards. Dispatch
    when the agent needs to audit specs, plans, code, or generated content. Also dispatch when the agent needs to verify spec
    fidelity, check plan coherence, detect drift, cross-validate verification results, or audit factual claims in generated
    content. Also dispatch when the agent has modified a deliverable in response to audit findings and needs independent verification
    that the remediation resolved all defects before claiming PASS. Audits are not optional — dispatch is MANDATORY.
  classification: a
  reformulation: Adversarial auditor that verifies specs, plans, code, and generated content against standards. Dispatch when
    the agent needs to audit specs, plans, code, or generated content. Also dispatch when the agent needs to verify spec fidelity,
    check plan coherence, detect drift, cross-validate verification results, or audit factual claims in generated content.
    Also dispatch when the agent has modified a deliverable in response to audit findings and needs independent verification
    that the remediation resolved all defects before claiming PASS. Audits are not optional — dispatch is MANDATORY
- skill: brainstorming
  file: skills/brainstorming/SKILL.md
  current_description: 'Requirements exploration and problem decomposition skill. Dispatch when creating a spec, planning
    a feature, or exploring requirements before implementation. Also dispatch when decomposing a problem into success criteria,
    extracting requirements, or documenting change control. Brainstorming is REQUIRED before spec creation — it is not optional.
    User phrases: brainstorm, explore requirements, plan feature, decompose problem, define success criteria, extract requirements.'
  classification: c
  reformulation: Requirements exploration and problem decomposition skill. Dispatch when creating a spec, planning a feature,
    or exploring requirements before implementation. Also dispatch when decomposing a problem into success criteria, extracting
    requirements, or documenting change control. Brainstorming is REQUIRED before spec creation — it is not optional
