    releases or generating structured version history. Changelog generation is REQUIRED before every release — not optional.
    User phrases: create changelog, generate release notes, document changes, version history, release diff, release PR, release
    notes.'
  classification: c
  reformulation: Release note and changelog generator for version-to-version change documentation. Dispatch when creating
    release notes, documenting changes between versions, or preparing a changelog. Also dispatch when comparing diffs between
    releases or generating structured version history. Changelog generation is REQUIRED before every release — not optional
