## Current State Flow (pre-change)

current_flow:
  - verification-gate
  - stub-creation
  - spec-assembly (includes Steps 1–6 with multiple sub-states)
  - pre-creation-validation
  - single-task-check
  - remote-body-format (Step 7r — 6-part flat format, BEFORE creation)
  - issue-creation (Step 7)
  - issue-post-creation-sync (Step 7d)
  - local-spec-save (Step 7c — runs AFTER sync in current code)
  - user-review (Step 8)
  - body-edit (loop back to user-review)
  - audit (Step 9)
