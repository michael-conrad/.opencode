current_flow_issues:
  - issue: "Step numbering collision: Step 1 appears twice (lines 31 and 51)"
    severity: low
    impact: Ambiguous ordering for sub-agents executing create.md. Does not affect runtime but confuses step tracking.
  - issue: "Step 7r (remote body format) appears BEFORE Step 7 (creation)"
    severity: medium
    impact: Logical ordering — you define the remote body format BEFORE creating the issue, not after. Current order is confusing.
  - issue: "Step 7c (local spec save) appears AFTER Step 7d (sync)"
    severity: medium
    impact: You should save the spec locally (7c) before syncing (7d). Current ordering does sync first, meaning spec.md may not be included in the initial sync.

## Proposed State Flow (post-change)

proposed_flow:
  - verification-gate (Step 0 — unchanged)
  - stub-creation (Step 1 — unchanged)
  - spec-assembly (Steps 1–6 — unchanged, deduplicate Step 1 numbering)

  - group: "Step 7 — Issue Creation and Post-Creation (renumbered)"
    substeps:
      - "Step 7.1: Local Spec Assembly" (merged from Step 7c, moved earlier)
      - "Step 7.2: Remote Issue Body" (merged from Step 7a exec-summary format + former Step 7r content)
      - "Step 7.3: Pre-PR Gate" (new — gate-level enforcement for AI Agent Instructions)
      - "Step 7.4: Post-Creation Sync" (from Step 7d, now after local spec save)

  - pre-creation-validation (moved to before issue-creation)
  - single-task-check
  - issue-creation (Step 7 main — creates issue on remote)
  - post-creation-sync (Step 7.4)
  - user-review (Step 8 — unchanged)
  - body-edit (loop back to user-review — unchanged)
  - audit (Step 9 — unchanged)
  - terminal

