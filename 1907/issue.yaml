body: '---

  status: draft

  title: Apply DiMo same-model role-differentiated audit to audit skill

  labels: [SPEC]

  ---


  ## Problem


  The audit skill currently has a `resolve-models` task that attempts cross-model
  family selection for auditor dispatch. This introduces an `INSUFFICIENT_FAMILIES`
  error state when only one model family is available, and adds unnecessary complexity.
  The DiMo research (He & Feng, arXiv:2510.16645) demonstrates that same-model role-differentiated
  agents outperform cross-model debate baselines on 5/6 benchmarks. The divergence
  mechanism is architectural (role persona + clean-room isolation + structured protocol),
  not model-family diversity.


  The audit skill already has the DiMo role chain defined (Generator → Knowledge Supporter
  → Evaluator → Path Provider) but the `resolve-models` task still attempts cross-model
  selection, creating a contradiction between the stated architecture and the implementation.


  ## Scope


  Files in `.opencode/skills/audit/`:


  - `SKILL.md` — Overview, DiMo Role Chain Dispatch, Sub-Agent Routing sections

  - `tasks/resolve-models.md` — Remove or replace with same-model dispatch

  - `tasks/cross-validate.md` — DiMo role references

  - `tasks/spec-audit.md` — DiMo role references


  ## Success Criteria


  | ID | Criterion | Evidence Type | Verification Method |

  |----|-----------|---------------|---------------------|

  | SC-1 | `resolve-models` task is removed or replaced with same-model dispatch that
  does not attempt cross-model family selection | `string` | grep for `resolve-models`
  in tasks/ — must not exist or must not reference cross-model selection |

  | SC-2 | `INSUFFICIENT_FAMILIES` error state is eliminated from the audit skill
  | `string` | grep for `INSUFFICIENT_FAMILIES` in audit/ — must not exist |

  | SC-3 | SKILL.md DiMo Role Chain Dispatch section explicitly states that same-model
  role-differentiated dispatch is sufficient (no cross-model requirement) | `string`
  | grep for "same-model" or "single model family" in SKILL.md DiMo section |

  | SC-4 | All audit task files that reference `resolve-models` or cross-model selection
  are updated to reference same-model dispatch | `string` | grep for `resolve-models`
  in all audit task files — must not reference cross-model selection |

  | SC-5 | The Sub-Agent Routing section in SKILL.md no longer references `resolve-models`
  for auditor subagent_type resolution | `string` | grep for `resolve-models` in SKILL.md
  Sub-Agent Routing section — must not exist |

  | SC-6 | The DiMo research card is referenced as the authority for same-model dispatch
  | `string` | grep for `dimo` or `research-cards/dimo` in SKILL.md or relevant task
  files |


  ## Implementation


  ### Phase 1: Remove `resolve-models` task


  Delete or replace `tasks/resolve-models.md`. If replaced, the new task should:

  - Accept a single model family

  - Dispatch all 4 DiMo roles (Generator, Knowledge Supporter, Evaluator, Path Provider)
  using the same model

  - Use role persona differentiation (system prompt + decoding temperature) per DiMo
  architecture

  - Not attempt cross-model family selection


  ### Phase 2: Update SKILL.md


  - Update the DiMo Role Chain Dispatch section to state that same-model dispatch
  is sufficient

  - Remove any reference to `resolve-models` in the Sub-Agent Routing section

  - Add reference to the DiMo research card


  ### Phase 3: Update task files


  - `cross-validate.md`: Update DiMo role references if they reference cross-model
  selection

  - `spec-audit.md`: Update DiMo role references if they reference cross-model selection

  - Any other task file referencing `resolve-models` or cross-model selection


  ### Phase 4: Verify


  - Run `grep` for `resolve-models` in `audit/` — confirm only expected references
  remain

  - Run `grep` for `INSUFFICIENT_FAMILIES` in `audit/` — confirm eliminated

  - Run `grep` for same-model or single-model-family language in SKILL.md

  - Verify all 4 DiMo roles are still dispatched in the correct order


  '
