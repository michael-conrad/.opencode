current_state:
  cross_reference_forms:
    - form: "See [text](path)"
      prevalence: "Common in SKILL.md and guidelines"
      status: "Defective — agent treats as informational citation"
    - form: "Read [text](path)"
      prevalence: "Common in guidelines (000-critical-rules.md)"
      status: "Defective — false positive (lists directory, never reads)"
    - form: "§N"
      prevalence: "Common in guidelines and SKILL.md"
      status: "Defective — no link, no verb, no path"
    - form: "§Name"
      prevalence: "Common in SKILL.md"
      status: "Defective — no link, no path"
    - form: "Non-linked text (See file.md)"
      prevalence: "Occasional in SKILL.md"
      status: "Defective — no markdown link"
    - form: "Resolution table + admonition"
      prevalence: "Some SKILL.md files"
      status: "Defective — 42-58% access rate per #1988"
    - form: "Load [text](path)"
      prevalence: "Rare (newly introduced)"
      status: "Canonical — 100% access rate per #1988"
target_state:
  cross_reference_forms:
    - form: "Load [descriptive text](relative/path.md)"
      prevalence: "100% of all cross-references"
      status: "Canonical"
  files_updated:
    - "All .opencode/guidelines/*.md"
    - "All .opencode/skills/*/SKILL.md"
    - "All .opencode/skills/*/tasks/*.md"
    - ".opencode/prompts/default.txt"
    - ".opencode/scripts/*.py (if applicable)"
