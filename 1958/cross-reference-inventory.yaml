  - form: 'Read [000-critical-rules.md §Tier 1 Mandate: Correctness over economy](guidelines/000-critical-rules.md)'
    target: guidelines/000-critical-rules.md
    line: 224
    text: '- **Cost-blind universal — all decisions.** Sub-agent task() and tool calls
      are near-zero cost compared to undiscovered defects. The agent MUST NEVER skip
      a tool call, verification step, or sub-agent task() to save resources. This
      prohibition applies to ALL agent decisions: verification, pipeline execution,
      sub-agent dispatch, research depth, message count, and user-facing output length.
      Correctness is the only success metric — there is no score for speed, brevity,
      or economy. A fast wrong answer is strictly worse than a slow correct one. This
      is a NON-WAIVABLE hard gate — no authorization, scope, or developer instruction
