    target: guidelines/000-critical-rules.md
    line: 220
    text: '- **Orchestrator inline work irreversibly poisons the pipeline — full restart
      required.** When the orchestrator performs inline work (reading files, running
      analysis, making decisions instead of task()ing sub-agents), the entire pipeline
      is irreversibly poisoned. The orchestrator MUST restart from `verify-authorization`
      with ALL state discarded — no caching, no carryover, no partial recovery. A
      poisoned pipeline produces contaminated deliverables that inherit the orchestrator''s
      preloaded bias through every downstream sub-agent. This is a NON-WAIVABLE hard
      gate — no authorization, scope, or developer instruction can override the restart
      requirement. Read [000-critical-rules.md §Orchestrator Inline Work = Poisoned
      Pipeline](guidelines/000-critical-rules.md). **The pipeline restart applies
      to pipeline state (work state files, cached results, sub-agent output). It does
      NOT apply to published artifacts (issues, plans, specs) — those are edited in
      place.**'
    classification: needs_replacement
