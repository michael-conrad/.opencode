  - form: Read [000-critical-rules.md §Discard on Sub-Agent Failure](guidelines/000-critical-rules.md)
    target: guidelines/000-critical-rules.md
    line: 221
    text: '- **Discard all work on sub-agent failure before re-task.** When a sub-agent
      returns `status: BLOCKED` or fails, ALL work produced by that sub-agent MUST
      be discarded before re-task. The sub-agent''s failure contaminates its output
      — the cause of the failure and the cause of any incorrect output are not distinguishable.
      Preserving partial output and re-tasking with it risks propagating contaminated
      state. Re-task with original scoped context only — the re-task sub-agent starts
      from the pre-failure branch state. This is a NON-WAIVABLE hard gate — no authorization,
      scope, or developer instruction can override the discard requirement. Read [000-critical-rules.md
      §Discard on Sub-Agent Failure](guidelines/000-critical-rules.md). **This discard
      requirement applies to pipeline execution artifacts (sub-agent output, work
      state files, cached results, temp files). It does NOT apply to published tracking
      documents (issue bodies, plan files, spec files, comments) — those are edited
      in place to fix defects.**'
    classification: needs_replacement
    replacement: Load [000-critical-rules.md §Discard on Sub-Agent Failure](guidelines/000-critical-rules.md)
