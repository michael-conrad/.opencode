    line: 14
    text: 3. **Behavioral test assertions for rule-changing SCs** — For each SC that
      changes agent behavior (guideline rules, skill enforcement, critical violations),
      at least one BEHAVIORAL enforcement test assertion must exist that verifies
      the agent's actual behavior, not just content presence in a file. Behavioral
      assertions for behavioral SCs MUST use `assert_semantic` (clean-room AI inspector)
      as primary evidence — see `080-code-standards.md` §Rule 5. `assert_stderr_pattern_*`
      assertions are SECONDARY corroboration for tool dispatch strings only — they
      are string evidence, NOT behavioral evidence, and are FORBIDDEN as primary evidence
      for behavioral SCs. Assertions MUST verify agent actions (skill dispatches,
      tool calls, file operations) NOT stdout prose. A test that only checks stdout
      prose recall is classified as PROSE-RECALL and does NOT satisfy the behavioral
      requirement.
