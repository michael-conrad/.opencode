      — the cheapest fix point. String evidence defers discovery to CI (100×–1000×
      cost multiplier). Structural evidence defers discovery to production (1000×+
      cost multiplier, death spiral). Every SC''s evidence type is chosen to minimize
      DDL: behavioral for runtime-behavioral changes, string for content-pattern changes.
