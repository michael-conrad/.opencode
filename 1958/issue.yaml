body: "---\ntitle: Imperative verb forms for cross-reference load directive — systematic\
  \ comparison\nstatus: draft\ncreated: 2026-07-15\nlicense: MIT\nprovenance: AI-generated\n\
  issue: 1958\nauthors:\n  - OpenCode (deepseek-v4-flash)\n---\n\n**STATUS:** DRAFT\n\
  **CREATED:** 2026-07-15\n\n> **Compliance Requirement:** All steps and sub-steps\
  \ in this document MUST be followed in order. Failure to comply with any step —\
  \ including but not limited to verification gates, test phases, audit checkpoints,\
  \ and review steps — will result in the feature branch being rejected and discarded,\
  \ requiring a full rework from scratch and loss of all prior work. There is no valid\
  \ reason to skip, compress, reorder, or omit any step. If a step appears redundant\
  \ or unnecessary, follow it anyway — the cost of following an extra step is negligible\
  \ compared to the cost of rework from a skipped step.\n\n## Anti-Lobotomization\n\
  \nTests MUST NOT be lobotomized. Removing or weakening a behavioral test assertion\
  \ to work around a timeout, failure, or infrastructure issue is a CRITICAL VIOLATION.\
  \ SCs must achieve 100% clean PASS. No SC may be weakened, deferred, or reclassified\
  \ to a lower evidence type to evade implementation. Read [Test Integrity Mandate](guidelines/080-code-standards.md).\n\
  \n## Problem\n\nThe `Read [Text](path)` cross-reference pattern in `.opencode/guidelines/`\
  \ files is the designated mechanism for directing an AI agent to load referenced\
  \ content into its context. The pattern appears in `000-critical-rules.md` as the\
  \ mandatory cross-reference form:\n\n> When agent-facing text references content\
  \ in another file, the agent MUST use the `Read [Text](path)` pattern. This is an\
  \ instruction to call the `read` tool on that path.\n\nHowever, it is unknown which\
  \ imperative verb form most reliably causes the agent to actually invoke the `read`\
  \ tool (or any other available tool) on the linked file. The agent may instead:\n\
  \n- Rely on memory or training data to answer without reading\n- Use `grep` or `search`\
  \ as a substitute for `read`\n- Use other tools (srclight, glob) instead of reading\
  \ the file directly\n- Ignore the directive entirely\n\nA systematic comparison\
  \ across candidate verb forms is needed to determine which form produces the most\
  \ reliable `read` tool invocation.\n\n## Root Cause Analysis\n\nThe root cause is\
  \ that the agent's training data contains many imperative verb forms used in documentation\
  \ (\"see\", \"refer to\", \"check\", \"look at\") that do not correspond to tool\
  \ invocations. The agent has learned to treat these as informational cues rather\
  \ than actionable directives. The `Read` verb was chosen because it directly names\
  \ the `read` tool, but no empirical evidence exists that it outperforms alternatives.\n\
  \n## Alternatives Considered & Why Discarded\n\n| Alternative | Discard Rationale\
  \ |\n|-------------|-------------------|\n| Testing only `Read` in isolation | Does\
  \ not provide comparative data — cannot determine if another form is more effective\
  \ |\n| Testing via human evaluation | Not scalable — requires automated, repeatable\
  \ methodology |\n| Testing all possible verbs | Impractical — 8-10 candidates provides\
  \ sufficient coverage for a winning form |\n| Testing in production guidelines |\
  \ Risk of agent confusion during testing — isolated test environment required |\n\
  \n## Interdependency\n\n| Issue | Classification | Description |\n|-------|---------------|-------------|\n\
  | [#1958](https://github.com/michael-conrad/.opencode/issues/1958) | BLOCKS | This\
  \ spec blocks the follow-up implementation spec for the winning verb form |\n\n\
  ## Research Cards\n\nThe following research cards were created during the investigation\
  \ phase and MUST be consulted before implementation:\n\n| Card | Path | Key Findings\
  \ |\n|------|------|-------------|\n| Microsoft markdown link patterns | `.issues/research-cards/microsoft-markdown-link-patterns.md`\
  \ | VS Code uses passive references, not load directives. `Read [Text](path)` is\
  \ NOT cargo-culted from Microsoft — it's an independent convention. |\n| Imperative\
  \ verb forms for LLM load directives | `.issues/research-cards/imperative-verb-forms-load-directives.md`\
  \ | No production system uses `Read [Text](path)` except OpenCode. Amp uses `@-mention`.\
  \ No research exists on verb effectiveness. \"See [file]\" is documented as defective.\
  \ |\n\n## Documentation Sources\n\n| Source Category | What Was Consulted | Purpose\
  \ |\n|----------------|-------------------|---------|\n| Local docs | `.opencode/guidelines/000-critical-rules.md`\
  \ | Understand existing `Read [Text](path)` pattern |\n| Local docs | `.opencode/guidelines/INDEX.md`\
  \ | Understand guideline structure and trigger patterns |\n| Local docs | `.opencode/tests-v2/AGENTS.md`\
  \ | Understand behavioral test harness specification |\n| Local docs | `.opencode/tests-v2/behaviors/helpers.sh`\
  \ | Understand `behavior_run` and assertion helpers |\n| Local docs | `.opencode/tests-v2/behaviors/test-verb-variant.sh`\
  \ | Understand existing verb test script |\n| Local docs | `.opencode/tests-v2/default-model.sh`\
  \ | Confirm default model is `ollama/qwen3.6:35b-256k` |\n| Local docs | `.opencode/prompts/default.txt`\
  \ | Understand where directives are injected |\n| Research card | `.issues/research-cards/microsoft-markdown-link-patterns.md`\
  \ | Microsoft's passive reference pattern vs OpenCode's active load directive |\n\
  | Research card | `.issues/research-cards/imperative-verb-forms-load-directives.md`\
  \ | Candidate verb forms, production system patterns, known defective patterns |\n\
  | Web | VS Code prompt files docs | Microsoft's documented markdown link pattern\
  \ |\n| Web | Amp AGENTS.md docs | `@-mention` syntax for file references |\n| Web\
  \ | OpenAI Codex AGENTS.md spec | Imperative \"MUST\" language for agent instructions\
  \ |\n| Web | Anthropic CLAUDE.md best practices | Emphasis markers and native auto-loading\
  \ |\n| Web | Future AGI prompt best practices | Instruction-first ordering, constraint\
  \ pinning |\n| Web | Agent Patterns documentation | 9-section structure for agent\
  \ prompts |\n| Web | Paxrel AI agent prompt patterns | 10 patterns for AI agent\
  \ prompts |\n| Web | arxiv papers (Arbiter, Prompt Template Analysis) | Academic\
  \ context for prompt engineering |\n\n## Candidate Verb List\n\nThe following 12\
  \ imperative verb forms MUST be tested. The list was derived from research findings\
  \ (see Research Cards section) and includes the current form, alternatives from\
  \ production systems, and hypotheses:\n\n| # | Verb | Directive Text Template |\
  \ Checkbox Variant | Rationale | Source |\n|---|------|------------------------|------------------|-----------|--------|\n\
  | 1 | Read | `Read [the authorization token list](tmp/verb-test/target-a.md).` |\
  \ `- [ ] Read [the authorization token list](tmp/verb-test/target-a.md).` | Current\
  \ form — baseline | OpenCode convention |\n| 2 | Load | `Load [the authorization\
  \ token list](tmp/verb-test/target-a.md).` | `- [ ] Load [the authorization token\
  \ list](tmp/verb-test/target-a.md).` | Common programming term | Hypothesis |\n\
  | 3 | Fetch | `Fetch [the authorization token list](tmp/verb-test/target-a.md).`\
  \ | `- [ ] Fetch [the authorization token list](tmp/verb-test/target-a.md).` | Implies\
  \ retrieval action | Hypothesis |\n| 4 | Consult | `Consult [the authorization token\
  \ list](tmp/verb-test/target-a.md).` | `- [ ] Consult [the authorization token list](tmp/verb-test/target-a.md).`\
  \ | Suggests reference lookup | Hypothesis |\n| 5 | Open | `Open [the authorization\
  \ token list](tmp/verb-test/target-a.md).` | `- [ ] Open [the authorization token\
  \ list](tmp/verb-test/target-a.md).` | Direct file operation verb | Hypothesis |\n\
  | 6 | Retrieve | `Retrieve [the authorization token list](tmp/verb-test/target-a.md).`\
  \ | `- [ ] Retrieve [the authorization token list](tmp/verb-test/target-a.md).`\
  \ | Formal retrieval term | Hypothesis |\n| 7 | Access | `Access [the authorization\
  \ token list](tmp/verb-test/target-a.md).` | `- [ ] Access [the authorization token\
  \ list](tmp/verb-test/target-a.md).` | Implies reaching a resource | Hypothesis\
  \ |\n| 8 | Follow instructions in | `Follow instructions in [the authorization token\
  \ list](tmp/verb-test/target-a.md).` | `- [ ] Follow instructions in [the authorization\
  \ token list](tmp/verb-test/target-a.md).` | Multi-word directive | Hypothesis |\n\
  | 9 | Check | `Check [the authorization token list](tmp/verb-test/target-a.md).`\
  \ | `- [ ] Check [the authorization token list](tmp/verb-test/target-a.md).` | Common\
  \ verification verb | Hypothesis |\n| 10 | Look up | `Look up [the authorization\
  \ token list](tmp/verb-test/target-a.md).` | `- [ ] Look up [the authorization token\
  \ list](tmp/verb-test/target-a.md).` | Common reference verb | Hypothesis |\n| 11\
  \ | MUST read | `You MUST read [the authorization token list](tmp/verb-test/target-a.md).`\
  \ | `- [ ] You MUST read [the authorization token list](tmp/verb-test/target-a.md).`\
  \ | OpenAI Codex-style imperative | OpenAI Codex AGENTS.md spec |\n| 12 | See @\
  \ | `See @tmp/verb-test/target-a.md` | `- [ ] See @tmp/verb-test/target-a.md` |\
  \ Amp-style @-mention | Amp AGENTS.md docs |\n| 13 | (none — checkbox only) | —\
  \ | `- [ ] [the authorization token list](tmp/verb-test/target-a.md).` | Tests whether\
  \ checkbox alone (no verb) triggers read | Hypothesis |\n\n**Note on #12 (See @):**\
  \ The `See [file]` pattern without `@` is documented as defective — agents treat\
  \ it as a citation to ignore. The `@` prefix from Amp's system is included to test\
  \ whether the `@` symbol changes behavior. If `@` is not supported by the test harness,\
  \ this variant may be skipped and noted in the test record.\n\n**Note on #13 (checkbox\
  \ only):** This variant has no imperative verb at all — just a markdown checkbox\
  \ followed by a link. If this triggers `read` tool calls, it indicates that the\
  \ checkbox prefix alone is sufficient to make the agent treat the link as an actionable\
  \ task, regardless of verb choice.\n\n**Checkbox variant rationale:** Markdown task\
  \ list checkboxes (`- [ ]`) are a common pattern in LLM training data for indicating\
  \ actionable items. Agents trained on GitHub issues, PRs, and project management\
  \ data may treat checkbox-prefixed items as tasks to be completed rather than informational\
  \ text. Testing the checkbox variant for each verb form determines whether the checkbox\
  \ prefix improves adherence independently of the verb choice.\n\n## Test Methodology\n\
  \n### Test Environment\n\nEach test uses the existing `test-verb-variant.sh` script\
  \ at `.opencode/tests-v2/behaviors/test-verb-variant.sh` with the following configuration:\n\
  \n- **Test project:** Isolated git repo with `.opencode` submodule cloned from remote\n\
  - **Guideline:** A test guideline (`999-verb-test.md`) is injected with the verb\
  \ form under test, referencing two target files via the directive\n- **Target files:**\
  \ `tmp/verb-test/target-a.md` (authorization tokens) and `tmp/verb-test/target-b.md`\
  \ (tool usage rules)\n- **Prompt:** A real-domain task asking the agent to verify\
  \ authorization using the token list and determine the correct path protocol — this\
  \ triggers natural agent behavior, not prose recall\n- **Directive injection:**\
  \ The verb directive is also injected into a local copy of `default.txt` to simulate\
  \ the production guideline context\n\n### Multi-Model Test Matrix\n\nEach verb form\
  \ MUST be tested against ALL of the following models to account for model-specific\
  \ behavior differences:\n\n| Model | Size | Type | Rationale |\n|-------|------|------|----------|\n\
  | `ollama/qwen3.6:35b-256k` | 35B / 256k ctx | Local (default) | Default test model;\
  \ baseline for all comparisons |\n| `ollama/laguna-xs-2.1:q4_K_M-256k` | ~20B /\
  \ 256k ctx | Local (quantized) | Tests whether quantized models behave differently\
  \ |\n| `ollama/gpt-oss:20b-128k` | 20B / 128k ctx | Local | Smaller model; tests\
  \ whether model size affects adherence |\n| `ollama/ornith:35b-256k` | 35B / 256k\
  \ ctx | Local | Alternative 35B model; tests whether model architecture affects\
  \ adherence |\n\nEach verb form has TWO variants: plain directive text and checkbox-prefixed\
  \ directive text (`- [ ]` prefix). Additionally, a checkbox-only variant (#13) tests\
  \ whether the checkbox alone (no verb) triggers read. This produces a 4 (models)\
  \ × 13 (verb forms) × 2 (plain/checkbox) × 2 (runs) = **208 total test runs** minimum\
  \ for the orchestrator context alone, plus the same for sub-agent context = **416\
  \ total test runs** minimum across all combinations.\n\n### Agent Context Test Matrix\n\
  \nEach verb+model combination MUST be tested in TWO agent contexts to determine\
  \ whether the orchestrator and sub-agents behave differently:\n\n| Context | How\
  \ Tested | What It Simulates |\n|---------|-----------|-------------------|\n| **Orchestrator**\
  \ | `opencode run` with the verb directive injected into `default.txt` (the system\
  \ prompt) | The orchestrator receives the directive as part of its initial system\
  \ prompt — tests whether the directive is followed when pre-loaded |\n| **Sub-agent**\
  \ | `opencode run` with the verb directive in a Tier 2 guideline file (loaded on-demand\
  \ via `load_when: sub-agent`) | The sub-agent encounters the directive when loading\
  \ a guideline during task execution — tests whether the directive is followed when\
  \ discovered dynamically |\n\n**Rationale:** If sub-agents read the cross-references\
  \ but the orchestrator does not, this indicates a possible defect in the orchestrator's\
  \ system prompt injection — the orchestrator may be receiving only relevant portions\
  \ of the injected prompts, or the Tier 1 pre-loading may suppress the directive.\
  \ If the orchestrator reads but sub-agents do not, the issue is in how guidelines\
  \ are loaded for sub-agents.\n\n**Test procedure for sub-agent context:** The verb\
  \ directive is placed ONLY in the Tier 2 test guideline (`999-verb-test.md`), NOT\
  \ in `default.txt`. The prompt triggers the guideline's `trigger_on` pattern, causing\
  \ the orchestrator to dispatch a sub-agent. The sub-agent loads the guideline, encounters\
  \ the verb directive, and should follow it. The test checks whether the sub-agent's\
  \ stderr shows `read` tool calls to the target files.\n\n**Test procedure for orchestrator\
  \ context:** The verb directive is placed in `default.txt` (the system prompt).\
  \ The prompt does NOT need to trigger a guideline — the directive is already in\
  \ the orchestrator's context. The test checks whether the orchestrator's stderr\
  \ shows `read` tool calls to the target files.\n\n### Adherence Rate Threshold and\
  \ Remediation\n\nIf the adherence rate across all verb+model+context combinations\
  \ is **low (≤ 25%) or zero**, the following remediation steps MUST be taken:\n\n\
  1. **Research additional verb forms** — search for verb forms and link description\
  \ text wordings used in production LLM systems that may produce better adherence.\
  \ Document findings in `.issues/research-cards/imperative-verb-forms-load-directives.md`.\n\
  2. **Research link description text wording** — test variations of the link description\
  \ text (e.g., \"the authorization token list\" vs \"the file containing authorization\
  \ tokens\" vs \"the rules in this file\") to determine whether description text\
  \ affects adherence.\n3. **Test emphasis markers** — test with emphasis markers\
  \ (e.g., `**IMPORTANT**: Read [file]`, `⚠️ You MUST read [file]`) to determine whether\
  \ emphasis improves adherence.\n4. **Test position effects** — test whether placing\
  \ the directive at the top vs bottom of the guideline affects adherence.\n5. **Test\
  \ repetition** — test whether repeating the directive multiple times in the same\
  \ guideline improves adherence.\n6. **Document all findings** in `.opencode/.issues/1958/winning-verb-analysis.md`\
  \ with recommendations for the next iteration.\n\n### What \"Works\" Means\n\nA\
  \ verb form is considered to \"work\" when ALL of the following conditions are met:\n\
  \n1. **Agent calls `read` tool on the referenced file path** — the stderr log MUST\
  \ contain evidence of a `read` tool call targeting the exact file path (e.g., `tmp/verb-test/target-a.md`)\n\
  2. **Agent does NOT use grep/search as a substitute** — the stderr log MUST NOT\
  \ show `grep` or `search` tool calls targeting the same content\n3. **Agent does\
  \ NOT rely on pre-loaded context to answer** — the agent MUST NOT answer the prompt\
  \ correctly without having read the target files (verified by checking that the\
  \ answer contains content only available in the target files)\n\n### Test Record\
  \ Format\n\nEach test run produces a row in the test record table:\n\n| Verb | Directive\
  \ text | Model | Did agent call read on target file? | Did agent use grep/search\
  \ instead? | Did agent use other tool? | Time | Notes |\n\n### Test Execution\n\n\
  Each verb variant MUST be tested at least 2 times to account for model non-determinism.\
  \ A verb is classified as \"reliable\" if it triggers `read` in at least 2 out of\
  \ 2 runs.\n\n### Test Script Modifications\n\nThe existing `test-verb-variant.sh`\
  \ script MUST be used as-is for the first test run. If modifications are needed\
  \ (e.g., to improve stderr parsing, add additional target files, or change the prompt),\
  \ those modifications MUST be documented in the test record.\n\n## Success Criteria\n\
  \n| ID | Criterion | Evidence Type | Verification Method | Remediation | Pipeline\
  \ Step Binding | Artifact Path | Requirement Traceability | Phase Binding | Verification\
  \ Gate | Integration Mode | Affinity Group | Re-Entry Step | Test File | Phase Mapping\
  \ |\n|----|-----------|---------------|-------------------|-------------|----------------------|--------------|-------------------------|--------------|-----------------|----------------|--------------|-------------|-----------|--------------|\n\
  | SC-1 | All 13 candidate verb forms (12 verbs + 1 checkbox-only) are tested in\
  \ BOTH plain and checkbox-prefixed variants, at least 2 times each, against ALL\
  \ 4 models (`qwen3.6:35b-256k`, `laguna-xs-2.1:q4_K_M-256k`, `gpt-oss:20b-128k`,\
  \ `ornith:35b-256k`) | behavioral | Run `test-verb-variant.sh` for each verb×model×variant\
  \ combination 2 times; verify 208 runs completed for orchestrator context | Re-run\
  \ any missing variant runs | test-execution | `.opencode/.issues/1958/` | Candidate\
  \ Verb List, Multi-Model Test Matrix, Checkbox Variant | Phase 1 | pre-commit |\
  \ sequential | — | — | `test-verb-variant.sh` | Phase 1 |\n| SC-2 | Each verb+model\
  \ combination is tested in BOTH orchestrator context (directive in `default.txt`)\
  \ and sub-agent context (directive in Tier 2 guideline) | behavioral | Verify test\
  \ record has separate rows for orchestrator and sub-agent contexts for each combination\
  \ | Re-run missing context tests | test-execution | `.opencode/.issues/1958/` |\
  \ Agent Context Test Matrix | Phase 1 | pre-commit | sequential | — | — | `test-verb-variant.sh`\
  \ | Phase 1 |\n| SC-3 | A test record table is produced with columns: Verb, Directive\
  \ text, Model, Context (orchestrator/sub-agent), Did agent call read on target file?,\
  \ Did agent use grep/search instead?, Did agent use other tool?, Time, Notes | string\
  \ | Verify the table exists in `.opencode/.issues/1958/test-record.md` with all\
  \ 12 verbs × 4 models × 2 contexts × 2 runs = 192 rows | Re-generate table from\
  \ raw test artifacts | documentation | `.opencode/.issues/1958/test-record.md` |\
  \ Test Record Format | Phase 1 | pre-commit | sequential | — | — | — | Phase 1 |\n\
  | SC-4 | Each test run produces behavioral evidence artifacts (stdout.log, stderr.log,\
  \ manifest.yaml, exit_code) in `tmp/behavioral-evidence-*/` | structural | Verify\
  \ artifact directory exists for each of the 192 runs | Re-run failed runs | test-execution\
  \ | `tmp/behavioral-evidence-*/` | Test Methodology | Phase 1 | pre-commit | sequential\
  \ | — | — | `test-verb-variant.sh` | Phase 1 |\n| SC-5 | A winning verb form is\
  \ identified based on the criterion: triggers `read` in at least 2 out of 2 runs\
  \ per model, does NOT trigger grep/search substitute | behavioral | Analyze test\
  \ record table; select verb with highest `read` call rate and zero grep/search substitution\
  \ across all models and contexts | If no verb meets criterion, document the best\
  \ performer and note the gap | analysis | `.opencode/.issues/1958/winning-verb-analysis.md`\
  \ | What \"Works\" Means | Phase 1 | pre-commit | sequential | — | — | — | Phase\
  \ 1 |\n| SC-6 | If adherence rate across all combinations is ≤ 25% or zero, remediation\
  \ research is conducted: additional verb forms, link description text wording, emphasis\
  \ markers, position effects, repetition | behavioral | Verify `.opencode/.issues/1958/winning-verb-analysis.md`\
  \ contains remediation research findings | Conduct remediation research per Adherence\
  \ Rate Threshold section | analysis | `.opencode/.issues/1958/winning-verb-analysis.md`\
  \ | Adherence Rate Threshold and Remediation | Phase 1 | pre-commit | sequential\
  \ | — | — | — | Phase 1 |\n| SC-7 | The winning verb form (or best performer) is\
  \ documented with a recommendation for implementation in guidelines and default.txt,\
  \ including any context-specific differences (orchestrator vs sub-agent) | string\
  \ | Verify `.opencode/.issues/1958/winning-verb-analysis.md` contains a recommendation\
  \ section with context-specific findings | Update recommendation based on additional\
  \ analysis | documentation | `.opencode/.issues/1958/winning-verb-analysis.md` |\
  \ Success Criteria | Phase 1 | pre-commit | sequential | — | — | — | Phase 1 |\n\
  | SC-8 | No SC may be weakened, deferred, or reclassified to a lower evidence type\
  \ to evade implementation | structural | Verify all SCs maintain their declared\
  \ evidence type throughout implementation | Restore any weakened SC to original\
  \ evidence type | audit | `.opencode/.issues/1958/` | Anti-Lobotomization | Phase\
  \ 1 | pre-commit | sequential | — | — | — | Phase 1 |\n| SC-9 | Before any implementation,\
  \ write behavioral enforcement tests in `.opencode/tests-v2/behaviors/` that verify\
  \ the new rule; confirm RED state (test fails before change) | behavioral | Verify\
  \ behavioral test script exists and fails before implementation changes are applied\
  \ | Re-create behavioral test if missing | test-execution | `.opencode/tests-v2/behaviors/`\
  \ | Behavioral Test Mandate | Phase 1 | pre-approval-gate | sequential | — | — |\
  \ — | Phase 1 |\n\n## Edge Cases\n\n| Edge Case | Handling |\n|-----------|----------|\n\
  | Model produces empty output | Retry up to 2 times per `behavior_run` default;\
  \ record as FAIL if all retries empty |\n| Model times out | Increase bash tool\
  \ timeout to 600000ms; retry per `behavior_run` default |\n| Test script needs modification\
  \ | Document modification in test record; use modified script for remaining runs\
  \ |\n| Verb triggers partial read (reads some but not all target files) | Record\
  \ as \"partial\" in Notes column; does not count as full PASS |\n| Verb triggers\
  \ read but also triggers grep/search | Record both; verb is disqualified if grep/search\
  \ substitutes for read content |\n| Model not available (e.g., not installed locally)\
  \ | Skip that model for all verb tests; note in test record; continue with remaining\
  \ models |\n| Orchestrator and sub-agent produce different results | Record both\
  \ results separately; flag for analysis in winning verb analysis |\n| Adherence\
  \ rate is zero across all combinations | Trigger remediation research per Adherence\
  \ Rate Threshold section; do NOT conclude \"nothing works\" without remediation\
  \ |\n\n## Implementation Approach\n\nAfter this spec is approved, invoke `writing-plans`\
  \ to create `.opencode/.issues/1958/plan.md` before implementation begins.\n\nThe\
  \ implementation plan MUST:\n\n1. Use the canonical `skill({name: \"...\"})` → `task(...,\
  \ prompt: \"execute <task> task from <skill>\")` form for every dispatch step\n\
  2. NOT contain inline procedure text — the plan is a routing document, not a re-implementation\
  \ of skill task cards\n3. Enumerate the full implementation pipeline with no skipped\
  \ or combined steps: coherence gate, pre-red-baseline, RED/GREEN per item, VbC,\
  \ audit, cross-validate, regression check, finishing checklist, review-prep, cleanup\n\
  4. Reference the correct skill/task combination for each step\n\n## Decision Ledger\n\
  \n| DEC-ID | Decision | Rationale | Requirement Key | Affected SCs |\n|--------|----------|-----------|-----------------|--------------|\n\
  | DEC-1 | Use existing `test-verb-variant.sh` as test harness | Avoids reinventing\
  \ test infrastructure; script already handles model invocation, artifact collection,\
  \ and test project setup | MUST | SC-1, SC-3 |\n| DEC-2 | Test each verb 2 times\
  \ minimum | Model output is non-deterministic; single-run results are unreliable\
  \ | MUST | SC-1 |\n| DEC-3 | Default model is `ollama/qwen3.6:35b-256k` | Specified\
  \ in requirements; matches `default-model.sh` | MUST | SC-1 |\n\n## Risk Traceability\
  \ Table\n\n| RISK-ID | Risk Description | Likelihood | Impact | Mitigation | Verifying\
  \ SC |\n|---------|-----------------|------------|--------|------------|--------------|\n\
  | RISK-1 | Model behavior varies across runs | High | Medium | Test each verb 2\
  \ times; use majority vote | SC-1 |\n| RISK-2 | Test script needs modification |\
  \ Medium | Low | Document modifications; use modified script | SC-1 |\n| RISK-3\
  \ | No verb reliably triggers `read` | Medium | High | Document best performer;\
  \ consider alternative approaches | SC-4 |\n| RISK-4 | Model unavailable during\
  \ testing | Low | High | Retry with increased timeout; use alternative model if\
  \ specified | SC-3 |\n\n## Revision Policy\n\n| Artifact | Cascade Trigger | Action\
  \ on Parent Revision |\n|----------|----------------|---------------------------|\n\
  | Implementation plan | MUST | Revise to match revised spec |\n| Behavioral tests\
  \ | SHOULD | Review for continued validity |\n| Test record table | MUST | Regenerate\
  \ if candidate list changes |\n| Winning verb analysis | MUST | Re-analyze if test\
  \ methodology changes |\n\n> **Compliance Requirement:** All steps and sub-steps\
  \ in this document MUST be followed in order. Failure to comply with any step —\
  \ including but not limited to verification gates, test phases, audit checkpoints,\
  \ and review steps — will result in the feature branch being rejected and discarded,\
  \ requiring a full rework from scratch and loss of all prior work. There is no valid\
  \ reason to skip, compress, reorder, or omit any step. If a step appears redundant\
  \ or unnecessary, follow it anyway — the cost of following an extra step is negligible\
  \ compared to the cost of rework from a skipped step.\n\n---\n\nCo-authored with\
  \ AI: OpenCode (deepseek-v4-flash)\n"
