# Contract for #1961 — SKILL.md Description Rewrite
variables:
  phase_0:
    type: string
    domain: ["no_test", "test_created", "red_confirmed"]
    nullable: false
  phase_1:
    type: string
    domain: ["old_pattern_only", "dual_pattern_accepted"]
    nullable: false
  phase_2:
    type: string
    domain: ["old_descriptions", "new_descriptions"]
    nullable: false
  phase_3:
    type: string
    domain: ["implemented", "verified"]
    nullable: false

preconditions:
  - "phase_0 == z3.StringVal('no_test')"
  - "phase_1 == z3.StringVal('old_pattern_only')"
  - "phase_2 == z3.StringVal('old_descriptions')"
  - "phase_3 == z3.StringVal('implemented')"

invariants:
  # Cross-phase dependency ordering
  - "z3.Implies(phase_1 == z3.StringVal('dual_pattern_accepted'), phase_0 == z3.StringVal('red_confirmed'))"
  - "z3.Implies(phase_2 == z3.StringVal('new_descriptions'), phase_1 == z3.StringVal('dual_pattern_accepted'))"
  - "z3.Implies(phase_3 == z3.StringVal('verified'), phase_2 == z3.StringVal('new_descriptions'))"

postconditions:
  - "phase_0 == z3.StringVal('red_confirmed')"
  - "phase_1 == z3.StringVal('dual_pattern_accepted')"
  - "phase_2 == z3.StringVal('new_descriptions')"
  - "phase_3 == z3.StringVal('verified')"
