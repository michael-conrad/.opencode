  |

  | SC-3 | `writing-plans-creation` has NO TDT, no Invocation | structural | `read`
  SKILL.md â†’ TDT section absent |

  | SC-4 | All contract paths in `create.md`, `update.md`, `retroactive.md` resolve
  | structural | `bash` check each path exists |

  | SC-5 | `create` workflow dispatches to `plan-creation-pipeline` with Z3 gates
  | behavioral | `opencode run` â†’ verify skill dispatch in stderr |

  | SC-6 | `pre-plan-readiness` has `solve` readiness gate | structural | `read` pre-plan-readiness.md
