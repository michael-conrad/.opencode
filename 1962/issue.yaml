body: '# Plan: writing-plans workflow defects fix


  **Issue:** #1962

  **Spec:** `.opencode/.issues/1962/spec.md`

  **Status:** DRAFT

  **Created:** 2026-07-19


  ## Goal


  Fix structural defects in `writing-plans` and `writing-plans-creation` skills: correct
  TDT entries, contract paths, dispatch routing, and add Z3 gates per #1962.


  ## Architecture


  Single-phase plan. All changes are structural/config modifications to skill metadata
  files and task files. No pipeline logic changes. The plan follows the dispatcher
  pattern established by `spec-creation`/`spec-creation-decomposition`.


  ## Files


  | File | Change | SC |

  |------|--------|----|

  | `.opencode/skills/writing-plans/SKILL.md` | TDT â†’ 4 entries, add Pipeline section
  (4 workflows), fix Invocation, document clean-room as internal | SC-1, SC-2, SC-7,
  SC-8 |

  | `.opencode/skills/writing-plans-creation/SKILL.md` | Convert to task card: remove
  YAML frontmatter, "Skill:" header, Contracts section | SC-3 |

  | `.opencode/skills/writing-plans-creation/tasks/create.md` | Fix 11 contract paths,
  add plan-creation-pipeline step | SC-4, SC-5 |

  | `.opencode/skills/writing-plans-creation/tasks/update.md` | Fix contract paths
  | SC-4 |

  | `.opencode/skills/writing-plans-creation/tasks/retroactive.md` | Fix contract
  paths | SC-4 |

  | `.opencode/skills/writing-plans-creation/tasks/pre-plan-readiness.md` | Add solve
