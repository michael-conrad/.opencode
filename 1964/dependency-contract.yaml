# Dependency contract for issue 1964 — Submodule Hook Installation
variables:
  hooks_installed_parent:
    type: bool
    domain: [true, false]
    nullable: false
  submodule_paths_discovered:
    type: bool
    domain: [true, false]
    nullable: false
  hooks_installed_submodules:
    type: bool
    domain: [true, false]
    nullable: false
  idempotent:
    type: bool
    domain: [true, false]
    nullable: false

preconditions:
  - "z3.Not(hooks_installed_parent)"
  - "z3.Not(submodule_paths_discovered)"
  - "z3.Not(hooks_installed_submodules)"
  - "z3.Not(idempotent)"

invariants:
  - "z3.Implies(hooks_installed_submodules, hooks_installed_parent)"
  - "z3.Implies(hooks_installed_submodules, submodule_paths_discovered)"

postconditions:
  - "z3.And(hooks_installed_parent, submodule_paths_discovered, hooks_installed_submodules)"
  - "idempotent"
