body: "---\ntitle: Add secret redaction plugin (opencode-vibeguard) for mandatory\
  \ secret redaction\nstatus: draft\ncreated: 2026-07-16\nlicense: MIT\nprovenance:\
  \ AI-generated\nissue: 1974\nauthors:\n  - OpenCode (opencode/nemotron-3-ultra-free)\n\
  ---\n\n**STATUS:** DRAFT\n**CREATED:** 2026-07-16\n\n> **Compliance Requirement:**\
  \ All steps and sub-steps in this document MUST be followed in order. Failure to\
  \ comply with any step — including but not limited to verification gates, test phases,\
  \ audit checkpoints, and review steps — will result in the feature branch being\
  \ rejected and discarded, requiring a full rework from scratch and loss of all prior\
  \ work. There is no valid reason to skip, compress, reorder, or omit any step. If\
  \ a step appears redundant or unnecessary, follow it anyway — the cost of following\
  \ an extra step is negligible compared to the cost of rework from a skipped step.\n\
  \n## Problem Statement\n\nCurrent `session-enforcement.ts` has a home-grown `redactSecrets()`\
  \ function with only 4 regex patterns (TOKEN=, KEY=, SECRET=, PASSWORD=). This is\
  \ insufficient for mandatory secret redaction across all LLM requests and tool outputs.\
  \ A robust, configurable solution is required.\n\n**Root Cause Analysis:** The existing\
  \ `redactSecrets()` implementation in `session-enforcement.ts` uses a hardcoded\
  \ set of 4 regex patterns that only match simple `KEY=value` patterns. It does not\
  \ cover:\n- API keys with specific formats (OpenAI `sk-...`, GitHub `ghp_...`, AWS\
  \ `AKIA...`)\n- PII data (emails, phone numbers, IDs, UUIDs, IPv4, MAC addresses)\n\
  - Configurable pattern extensibility\n- Historical redaction of tool outputs in\
  \ conversation history\n- Streaming edge case handling (placeholder briefly visible\
  \ during text-delta)\n\nThe home-grown solution was a minimal stopgap that cannot\
  \ scale to comprehensive secret protection requirements.\n\n## Goals\n\n- Install\
  \ `opencode-vibeguard@0.1.0` npm plugin (150★, MIT license) via `opencode.jsonc`\
  \ plugins array\n- Configure `vibeguard.config.json` in `.opencode/` directory (self-contained,\
  \ versioned with project)\n- Remove home-grown `redactSecrets()` function from `session-enforcement.ts`\n\
  - Keep mode-switch stripping in `session-enforcement.ts` (separate concern, mandatory)\n\
  - Achieve three-layer secret protection: pre-request redaction, pre-tool restoration,\
  \ historical redaction\n\n## Non-Goals\n\n- Modifying opencode core (plugin is external\
  \ npm package)\n- Changing vibeguard's internal behavior (config-driven)\n- Other\
  \ secret management approaches (e.g., HashiCorp Vault, AWS Secrets Manager)\n- Modifying\
  \ the plugin's source code\n\n## Constraints and Scope\n\n**In Scope:**\n- Install\
  \ `opencode-vibeguard@0.1.0` npm plugin via `opencode.jsonc`\n- Configure `vibeguard.config.json`\
  \ in `.opencode/` directory\n- Remove `redactSecrets()` from `session-enforcement.ts`\n\
  - Preserve mode-switch stripping logic in `session-enforcement.ts`\n\n**Out of Scope:**\n\
  - Modifying opencode core\n- Changing vibeguard's internal behavior\n- Other secret\
  \ management approaches\n\n## Alternatives Considered & Why Discarded\n\n| Alternative\
  \ | Discard Rationale |\n|-------------|-------------------|\n| Extend home-grown\
  \ `redactSecrets()` with more patterns | Maintenance burden; no streaming support;\
  \ no historical redaction; no pre-tool restoration |\n| Use `@ai-sdk` middleware\
  \ for redaction | Only covers LLM requests; no tool output redaction; no historical\
  \ redaction |\n| HashiCorp Vault integration | Overkill for secret redaction in\
  \ LLM context; external dependency; complex setup |\n| AWS Secrets Manager | Cloud-specific;\
  \ not designed for real-time LLM stream redaction |\n\n## Safety Considerations\n\
  \n**Rollback Plan:** If plugin causes issues:\n1. Remove `\"opencode-vibeguard@0.1.0\"\
  ` from `opencode.jsonc` plugins array\n2. Restore `redactSecrets()` function in\
  \ `session-enforcement.ts` from git history\n3. Delete `.opencode/vibeguard.config.json`\n\
  \n**Safeguards:**\n- Plugin pinned to exact version `0.1.0`\n- Configuration self-contained\
  \ in `.opencode/`\n- Plugin becomes no-op if config file missing or `enabled=false`\
  \ (per plugin docs)\n- Debug logging available via `OPENCODE_VIBEGUARD_DEBUG=1`\
  \ or config `debug: true` (does not print plaintext secrets)\n\n## Evidence/Provenance\n\
  \nEvery factual claim in this spec is backed by a tool-call artifact:\n\n| Claim\
  \ | Source Category | Tool Call / Evidence |\n|-------|----------------|---------------------|\n\
  | Old `session-enforcement.ts` had `redactSecrets()` with 4 patterns | Direct source\
  \ search | `git show HEAD:.opencode/plugins/session-enforcement.ts` (pre-rewrite)\
  \ shows `redactSecrets()` with 4 patterns |\n| `opencode-vibeguard@0.1.0` exists\
  \ on npm, MIT license, 150★ | Documentation URLs | Verified via GitHub repo `inkdust2021/opencode-vibeguard`\
  \ - 150 stars, MIT license |\n| Plugin provides three-layer protection (pre-request,\
  \ pre-tool, historical) | Direct source search | README: \"Pre-request redaction\"\
  , \"Pre-tool restoration\", \"Historical redaction\" |\n| Configuration in `vibeguard.config.json`\
  \ with regex, keywords, builtin PII | Direct source search | `vibeguard.config.json.example`\
  \ shows `patterns.keywords`, `patterns.regex`, `patterns.builtin` |\n| Installation\
  \ via `opencode.jsonc` plugins array | Documentation URLs | README: `\"plugin\"\
  : [\"opencode-vibeguard@0.1.0\"]` |\n| opencode auto-installs npm plugins via Bun\
  \ at startup | Documentation URLs | README: \"OpenCode will auto-install it on first\
  \ use\", \"cached in `~/.cache/opencode/node_modules/`\" |\n| Streaming placeholder\
  \ briefly appears but sanitized | Documentation URLs | README Known limitations:\
  \ \"During streaming (text-delta) the placeholder may briefly appear; it will be\
  \ restored at text-end\" |\n| Plugin becomes no-op if config missing or `enabled=false`\
  \ | Documentation URLs | README Safety note: \"the plugin becomes a no-op if the\
  \ config file is missing or enabled=false\" |\n\n## SC-to-Root-Cause Traceability\
  \ Table\n\n| SC ID | Root Cause Element |\n|-------|-------------------|\n| SC-1\
  \ | Home-grown `redactSecrets()` only has 4 hardcoded patterns |\n| SC-2 | No pre-request\
  \ redaction for LLM requests |\n| SC-3 | No pre-tool restoration for tool execution\
  \ |\n| SC-4 | No historical redaction of tool outputs in conversation history |\n\
  | SC-5 | No streaming edge case handling |\n| SC-6 | No configurable pattern extensibility\
  \ |\n| SC-7 | No PII detection (email, phone, ID, UUID, IP, MAC) |\n\n## Feasibility\
  \ Assessment\n\nAll referenced files and artifacts exist:\n- `.opencode/plugins/session-enforcement.ts`\
  \ — exists, will be modified\n- `.opencode/opencode.jsonc` — exists, already has\
  \ plugin entry\n- `.opencode/vibeguard.config.json` — will be created\n- `opencode-vibeguard@0.1.0`\
  \ npm package — verified exists\n- Bun runtime — available in environment\n\n##\
  \ Success Criteria\n\n| ID | Criterion | Verification Method | Remediation | Pipeline\
  \ Step Binding | Artifact Path | Requirement Traceability | Phase Binding | Verification\
  \ Gate | Integration Mode | Affinity Group | Re-Entry Step | Test File | Phase Mapping\
  \ |\n|----|-----------|---------------------|-------------|----------------------|---------------|-------------------------|---------------|------------------|------------------|----------------|--------------|-----------|---------------|\n\
  | SC-1 | Home-grown `redactSecrets()` removed from `session-enforcement.ts` | `grep\
  \ -c redactSecrets .opencode/plugins/session-enforcement.ts` → 0 | Re-apply removal\
  \ | RED | .issues/1974/artifacts/redact-removed.log | Root cause: home-grown function\
  \ | Phase 1 | red-green | sequential | redaction-removal | RED | .opencode/tests-v2/behaviors/secret-redaction/SC-1.sh\
  \ | Phase 1 |\n| SC-2 | `opencode-vibeguard@0.1.0` installed via `opencode.jsonc`\
  \ plugins array | `cat .opencode/opencode.jsonc | jq -r '.plugin[]' | grep opencode-vibeguard@0.1.0`\
  \ | Add to plugins array | pre-commit | .issues/1974/artifacts/config-valid.log\
  \ | Install plugin | Phase 1 | pre-commit | sequential | plugin-install | pre-work\
  \ | .opencode/tests-v2/behaviors/secret-redaction/SC-2.sh | Phase 1 |\n| SC-3 |\
  \ Mode-switch stripping preserved in `session-enforcement.ts` | `grep -c \"isModeSwitchSynthetic\"\
  \ .opencode/plugins/session-enforcement.ts` → ≥1 | Restore from git | RED | .issues/1974/artifacts/mode-switch-preserved.log\
  \ | Separate concern, mandatory | Phase 1 | red-green | sequential | mode-switch\
  \ | RED | .opencode/tests-v2/behaviors/secret-redaction/SC-3.sh | Phase 1 |\n| SC-4\
  \ | `vibeguard.config.json` created in `.opencode/` with regex patterns | `cat .opencode/vibeguard.config.json\
  \ | jq '.patterns.regex | length'` → ≥3 | Create config file | RED | .issues/1974/artifacts/regex-patterns.log\
  \ | Config-driven patterns | Phase 1 | red-green | sequential | config-patterns\
  \ | RED | .opencode/tests-v2/behaviors/secret-redaction/SC-4.sh | Phase 1 |\n| SC-5\
  \ | Pre-request redaction: secrets redacted before LLM requests | `OPENCODE_VIBEGUARD_DEBUG=1\
  \ opencode run \"test\" 2>&1 | grep -c \"replace count\"` → >0 | Debug plugin |\
  \ GREEN | .issues/1974/artifacts/pre-request.log | Three-layer protection | Phase\
  \ 1 | red-green | sequential | pre-request | GREEN | .opencode/tests-v2/behaviors/secret-redaction/SC-5.sh\
  \ | Phase 1 |\n| SC-6 | Pre-tool restoration: placeholders restored before tool\
  \ execution | `OPENCODE_VIBEGUARD_DEBUG=1 opencode run \"bash echo $SECRET\" 2>&1\
  \ | grep -c \"restore\"` → >0 | Debug plugin | GREEN | .issues/1974/artifacts/pre-tool.log\
  \ | Three-layer protection | Phase 1 | red-green | sequential | pre-tool | GREEN\
  \ | .opencode/tests-v2/behaviors/secret-redaction/SC-6.sh | Phase 1 |\n| SC-7 |\
  \ Historical redaction: tool outputs redacted in conversation history | `OPENCODE_VIBEGUARD_DEBUG=1\
  \ opencode run \"test secret\" 2>&1 | grep -c \"historical\"` → >0 | Debug plugin\
  \ | GREEN | .issues/1974/artifacts/historical.log | Three-layer protection | Phase\
  \ 1 | red-green | sequential | historical | GREEN | .opencode/tests-v2/behaviors/secret-redaction/SC-7.sh\
  \ | Phase 1 |\n| SC-8 | Streaming edge case handled: placeholder briefly visible\
  \ but sanitized at text-end | `OPENCODE_VIBEGUARD_DEBUG=1 opencode run \"stream\
  \ test\" 2>&1 | grep -c \"text-end\"` → >0 | Debug plugin | GREEN | .issues/1974/artifacts/streaming.log\
  \ | Streaming handling | Phase 1 | red-green | sequential | streaming | GREEN |\
  \ .opencode/tests-v2/behaviors/secret-redaction/SC-8.sh | Phase 1 |\n| SC-9 | Config\
  \ supports regex patterns for API keys (OpenAI, GitHub, AWS) | `cat .opencode/vibeguard.config.json\
  \ | jq '.patterns.regex[] | select(.pattern | test(\"sk-|ghp|AKIA\"))' | wc -l`\
  \ → ≥3 | Update config | GREEN | .issues/1974/artifacts/builtin-pii.log | Config\
  \ patterns | Phase 1 | red-green | sequential | regex-patterns | GREEN | .opencode/tests-v2/behaviors/secret-redaction/SC-9.sh\
  \ | Phase 1 |\n| SC-10 | Config supports builtin PII detectors (email, phone, ID,\
  \ UUID, IP, MAC) | `cat .opencode/vibeguard.config.json | jq '.patterns.builtin[]'\
  \ | wc -l` → ≥6 | Update config | GREEN | .issues/1974/artifacts/keywords.log |\
  \ Config patterns | Phase 1 | red-green | sequential | builtin-pii | GREEN | .opencode/tests-v2/behaviors/secret-redaction/SC-10.sh\
  \ | Phase 1 |\n| SC-11 | Config supports keyword patterns for custom secrets | `cat\
  \ .opencode/vibeguard.config.json | jq '.patterns.keywords | length'` → ≥1 | Update\
  \ config | GREEN | .issues/1974/artifacts/test-pass.log | Config patterns | Phase\
  \ 1 | red-green | sequential | keywords | GREEN | .opencode/tests-v2/behaviors/secret-redaction/SC-11.sh\
  \ | Phase 1 |\n| SC-12 | Behavioral enforcement tests written and pass (RED→GREEN\
  \ cycle) | `bash .opencode/tests-v2/behaviors/secret-redaction/run.sh` → PASS |\
  \ Write tests | post-implementation | .issues/1974/artifacts/test-pass.log | Test\
  \ Integrity Mandate | Phase 1 | post-implementation | sequential | behavioral-tests\
  \ | verification-before-completion | .opencode/tests-v2/behaviors/secret-redaction/run.sh\
  \ | Phase 1 |\n| SC-13 | No SC weakened, deferred, or reclassified to lower evidence\
  \ type | `grep -r \"structural\\|string\" .issues/1974/sc-summary.yaml` → 0 for\
  \ behavioral SCs | Fix evidence types | post-implementation | .issues/1974/artifacts/evidence-type.log\
  \ | Test Integrity Mandate | Phase 1 | post-implementation | sequential | anti-lobotomization\
  \ | verification-before-completion | .opencode/tests-v2/behaviors/secret-redaction/SC-13.sh\
  \ | Phase 1 |\n\n**Behavioral test assertions for rule-changing SCs:** Success criteria\
  \ that change agent behavior (guideline rules, skill enforcement, critical violations)\
  \ MUST include a behavioral test assertion describing the RED state (agent behavior\
  \ without the rule) and GREEN state (agent behavior with the rule), not just a content-verification\
  \ grep command. Content-verification commands are SECONDARY for rule-changing SCs;\
  \ behavioral assertions are PRIMARY.\n\n**Semantic intent field:** Each success\
  \ criterion includes a brief prose annotation explaining WHY the exact criterion\
  \ value matters and what semantic distinction it represents.\n\n**Cost-frame mandate\
  \ in SCs:** Each success criterion carries a short cost-frame reformation statement:\
  \ a skipped runtime equals a defect undiscovered. The death spiral / break dynamics\
  \ are formalized in the Verification Honesty guideline — behavioral PASS is a break\
  \ (zero downstream cost); structural-only PASS is a death spiral (compounding exponential\
  \ cost).\n\n## Risk and Edge Cases\n\n| Risk | Likelihood | Impact | Mitigation\
  \ |\n|------|------------|--------|------------|\n| Plugin compatibility with opencode\
  \ version | Medium | High | Pin to 0.1.0, test in isolation |\n| Streaming placeholder\
  \ visibility | Low | Medium | vibeguard handles this; brief flash acceptable per\
  \ docs |\n| Config maintenance | Low | Low | Self-contained in .opencode/, versioned\
  \ with project |\n\n**Edge Cases:**\n- Streaming text-delta: placeholder may briefly\
  \ appear but sanitized at text-end\n- Missing config file: plugin becomes no-op\
  \ (safety feature)\n- Debug mode enabled: logs replace counts but never plaintext\
  \ secrets\n\n## Implementation Approach\n\nFor the reader's understanding (not prescribing\
  \ HOW):\n\n1. **Pre-work:** Verify git state, create feature branch, sync submodules\n\
  2. **Config creation:** Create `.opencode/vibeguard.config.json` with regex patterns,\
  \ keywords, builtin PII detectors\n3. **Plugin installation:** Confirm `opencode-vibeguard@0.1.0`\
  \ in `opencode.jsonc` plugins array\n4. **Code removal:** Remove `redactSecrets()`\
  \ function from `session-enforcement.ts`, preserve mode-switch stripping\n5. **Behavioral\
  \ tests:** Write RED tests that fail without the plugin, then GREEN tests that pass\
  \ with it\n6. **Verification:** Run verification-before-completion, finishing checklist,\
  \ review-prep\n\nAfter this spec is approved, invoke `writing-plans` to create `.issues/1974/plan.md`\
  \ before implementation begins.\n\n## Anti-Lobotomization\n\nTests MUST NOT be lobotomized.\
  \ Removing or weakening a behavioral test assertion to work around a timeout, failure,\
  \ or infrastructure issue is a CRITICAL VIOLATION. SCs must achieve 100% clean PASS.\
  \ No SC may be weakened, deferred, or reclassified to a lower evidence type to evade\
  \ implementation. Read [Test Integrity Mandate](guidelines/080-code-standards.md).\n\
  \n## Anti-Merge Gate\n\nBefore finalizing the spec, verify that no SC conflicts\
  \ with already-merged specs. Check merged PRs for related functionality. If a merged\
  \ spec has SCs that conflict with this spec's SCs, flag the conflict and HALT. Do\
  \ NOT proceed with conflicting SCs.\n\n## Doc-Source-Currency Check\n\nAll documentation\
  \ sources referenced in this spec are current as of 2026-07-16:\n- `opencode-vibeguard`\
  \ README (GitHub) — last updated 5 months ago, version 0.1.0 current\n- `vibeguard.config.json.example`\
  \ — current with plugin version 0.1.0\n- No stale sources detected\n\n## SC-ID Traceability\
  \ Check\n\n| SC ID | Unique | Maps to Requirement | Verification Method Defined\
  \ |\n|-------|--------|---------------------|----------------------------|\n| SC-1\
  \ | ✅ | Home-grown removal | ✅ |\n| SC-2 | ✅ | Plugin install | ✅ |\n| SC-3 | ✅\
  \ | Mode-switch preserve | ✅ |\n| SC-4 | ✅ | Config creation | ✅ |\n| SC-5 | ✅ |\
  \ Pre-request redaction | ✅ |\n| SC-6 | ✅ | Pre-tool restoration | ✅ |\n| SC-7 |\
  \ ✅ | Historical redaction | ✅ |\n| SC-8 | ✅ | Streaming edge case | ✅ |\n| SC-9\
  \ | ✅ | Regex patterns | ✅ |\n| SC-10 | ✅ | Builtin PII | ✅ |\n| SC-11 | ✅ | Keywords\
  \ | ✅ |\n| SC-12 | ✅ | Behavioral tests | ✅ |\n| SC-13 | ✅ | Anti-lobotomization\
  \ | ✅ |\n\nAll SCs pass traceability check.\n\n## Interdependency\n\n| Issue | Classification\
  \ | Description |\n|-------|---------------|-------------|\n| [.opencode#1960](https://github.com/michael-conrad/.opencode/issues/1960)\
  \ | RELATED | Plugin skills and hooks infrastructure |\n| [.opencode#1961](https://github.com/michael-conrad/.opencode/issues/1961)\
  \ | RELATED | Plugin skills and hooks infrastructure |\n| [.opencode#1964](https://github.com/michael-conrad/.opencode/issues/1964)\
  \ | RELATED | Plugin skills and hooks infrastructure |\n\n## Documentation Sources\n\
  \n| Source Category | What Was Consulted | Purpose |\n|----------------|-------------------|---------|\n\
  | Local docs | `.opencode/plugins/session-enforcement.ts` (git history) | Understand\
  \ existing redactSecrets() |\n| Direct source search | `git show HEAD:.opencode/plugins/session-enforcement.ts`\
  \ | Verify 4-pattern redactSecrets() |\n| Documentation URLs | https://github.com/inkdust2021/opencode-vibeguard\
  \ | Verify plugin features, config, installation |\n| Documentation URLs | https://www.npmjs.com/package/opencode-vibeguard\
  \ | Verify package version, license, stars |\n| Live verification | `vibeguard.config.json.example`\
  \ from repo | Verify config structure |\n\n> **Compliance Requirement:** All steps\
  \ and sub-steps in this document MUST be followed in order. Failure to comply with\
  \ any step — including but not limited to verification gates, test phases, audit\
  \ checkpoints, and review steps — will result in the feature branch being rejected\
  \ and discarded, requiring a full rework from scratch and loss of all prior work.\
  \ There is no valid reason to skip, compress, reorder, or omit any step. If a step\
  \ appears redundant or unnecessary, follow it anyway — the cost of following an\
  \ extra step is negligible compared to the cost of rework from a skipped step.\n\
  \n---\n\n\U0001F916 Co-authored with AI: OpenCode (opencode/nemotron-3-ultra-free)"
