code_path_inventory:
  spec: "#2027 — SPEC-FIX: Missing task files in spec-creation-validation"
  classification: documentation-only
  rationale: "All 5 units are documentation-only (new task files, metadata corrections, scope boundary). No runtime code paths exist. Paths enumerated are workflow/documentation-creation paths — trigger conditions, data flow, and coverage requirements for each unit's creation/verification lifecycle."

  paths:
    # ── UNIT-A: research-card-consultation.md ──────────────────────────
    - id: "PATH-A1"
      unit: "UNIT-A"
      path_type: "happy"
      trigger_condition: "Research cards directory exists with ≥1 card file"
      path_description: "Task reads existing research cards, consults each for relevance to current spec, writes consultation findings to artifact"
      data_flow:
        inputs:
          - ".opencode/.issues/research-cards/*.md — existing research card files"
          - "spec-creation/SKILL.md contract table line 140 — contract definition"
        transformations:
          - "Read each card's frontmatter (question, confidence, source URLs, tags)"
          - "Match card question against current spec context"
          - "Filter cards by relevance to current spec"
        outputs:
          - ".issues/{N}/artifacts/research-cards-consulted.yaml — consultation findings"
        side_effects: []
      coverage_requirements:
        - "At least one SC verifies that consultation findings are written when cards exist"
        - "At least one SC verifies the artifact format matches the contract"
      maps_to_sc: ["SC-1"]

    - id: "PATH-A2"
      unit: "UNIT-A"
      path_type: "error"
      trigger_condition: "Research cards directory does not exist"
      path_description: "Task detects missing directory, reports no cards found, returns empty consultation"
      data_flow:
        inputs:
          - "Filesystem check for .opencode/.issues/research-cards/ existence"
        transformations:
          - "Detect directory absence"
          - "Set finding_summary to 'no research cards found'"
        outputs:
          - ".issues/{N}/artifacts/research-cards-consulted.yaml — empty consultation"
        side_effects: []
      coverage_requirements:
        - "At least one SC verifies graceful handling of missing directory (no crash)"
        - "At least one SC verifies empty consultation artifact is produced"
      maps_to_sc: ["SC-1"]

    - id: "PATH-A3"
      unit: "UNIT-A"
      path_type: "edge_case"
      trigger_condition: "Research cards directory exists but is empty"
      path_description: "Task reads empty directory, reports no cards found, returns empty consultation (same behavior as PATH-A2)"
      data_flow:
        inputs:
          - "Filesystem check for .opencode/.issues/research-cards/ contents"
        transformations:
          - "Detect empty directory"
          - "Set finding_summary to 'no research cards found'"
        outputs:
          - ".issues/{N}/artifacts/research-cards-consulted.yaml — empty consultation"
        side_effects: []
      coverage_requirements:
        - "At least one SC verifies graceful handling of empty directory (same as missing)"
      maps_to_sc: ["SC-1"]

    - id: "PATH-A4"
      unit: "UNIT-A"
      path_type: "error"
      trigger_condition: "Contract mismatch between task file and spec-creation/SKILL.md line 140"
      path_description: "Task produces artifact in wrong format — caught by pipeline coherence gate, not by task itself"
      data_flow:
        inputs:
          - "spec-creation/SKILL.md contract table line 140 — expected contract"
        transformations:
          - "Task produces artifact deviating from contract format"
        outputs:
          - "Malformed artifact at .issues/{N}/artifacts/research-cards-consulted.yaml"
        side_effects:
          - "Pipeline coherence gate detects mismatch and blocks pipeline"
      coverage_requirements:
        - "At least one SC verifies the task file contract matches SKILL.md line 140 exactly"
      maps_to_sc: ["SC-1"]

    # ── UNIT-B: interdependency-check.md ──────────────────────────────
    - id: "PATH-B1"
      unit: "UNIT-B"
      path_type: "happy"
      trigger_condition: "GitHub API available and open [SPEC] issues exist"
      path_description: "Task queries GitHub API for open [SPEC] issues, analyzes interdependencies with current spec, writes findings to artifact"
      data_flow:
        inputs:
          - "GitHub API — open [SPEC] issues list"
          - "spec-creation/SKILL.md contract table line 153 — contract definition"
        transformations:
          - "Query open [SPEC] issues via github_issue_read or equivalent"
          - "Compare each open spec's affected files/symbols against current spec"
          - "Classify overlap: FULL-SUPERSESSION, PARTIAL-OVERLAP, CONFLICT-RISK, INDEPENDENT"
        outputs:
          - ".issues/{N}/artifacts/interdependency-check.yaml — interdependency analysis findings"
        side_effects: []
      coverage_requirements:
        - "At least one SC verifies interdependency analysis is produced when open specs exist"
        - "At least one SC verifies the artifact format matches the contract"
      maps_to_sc: ["SC-2"]

    - id: "PATH-B2"
      unit: "UNIT-B"
      path_type: "error"
      trigger_condition: "GitHub API unavailable (network error, auth failure, rate limit)"
      path_description: "Task cannot query open specs, reports BLOCKED with API failure reason"
      data_flow:
        inputs:
          - "GitHub API call attempt"
        transformations:
          - "API call fails"
          - "Set status to BLOCKED with reason: API failure"
        outputs:
          - "Result contract with status=BLOCKED, blocker_reason=API failure details"
        side_effects: []
      coverage_requirements:
        - "At least one SC verifies BLOCKED status is returned on API failure"
        - "At least one SC verifies blocker_reason contains actionable failure details"
      maps_to_sc: ["SC-2"]

    - id: "PATH-B3"
      unit: "UNIT-B"
      path_type: "edge_case"
      trigger_condition: "GitHub API available but no open [SPEC] issues found"
      path_description: "Task queries API successfully, finds zero open specs, reports no interdependencies (valid empty state)"
      data_flow:
        inputs:
          - "GitHub API — open [SPEC] issues list (empty)"
        transformations:
          - "Query returns empty list"
          - "Set finding_summary to 'no interdependencies found'"
        outputs:
          - ".issues/{N}/artifacts/interdependency-check.yaml — empty analysis"
        side_effects: []
      coverage_requirements:
        - "At least one SC verifies graceful handling of empty results (no crash, valid empty state)"
      maps_to_sc: ["SC-2"]

    - id: "PATH-B4"
      unit: "UNIT-B"
      path_type: "error"
      trigger_condition: "Contract mismatch between task file and spec-creation/SKILL.md line 153"
      path_description: "Task produces artifact in wrong format — caught by pipeline coherence gate"
      data_flow:
        inputs:
          - "spec-creation/SKILL.md contract table line 153 — expected contract"
        transformations:
          - "Task produces artifact deviating from contract format"
        outputs:
          - "Malformed artifact at .issues/{N}/artifacts/interdependency-check.yaml"
        side_effects:
          - "Pipeline coherence gate detects mismatch and blocks pipeline"
      coverage_requirements:
        - "At least one SC verifies the task file contract matches SKILL.md line 153 exactly"
      maps_to_sc: ["SC-2"]

    # ── UNIT-C: Fix sub-skills count ──────────────────────────────────
    - id: "PATH-C1"
      unit: "UNIT-C"
      path_type: "happy"
      trigger_condition: "Count in spec-creation/SKILL.md line 28 is '6' and actual file count is 9"
      path_description: "Update the count from 6 to 9 to match actual task file count in spec-creation-validation/tasks/"
      data_flow:
        inputs:
          - "spec-creation/SKILL.md line 28 — current value '6 task files'"
          - "spec-creation-validation/tasks/ directory listing — 9 files"
        transformations:
          - "Verify actual file count (ls spec-creation-validation/tasks/ | wc -l)"
          - "Replace '6 task files' with '9 task files'"
        outputs:
          - "spec-creation/SKILL.md line 28 — updated to '9 task files'"
        side_effects: []
      coverage_requirements:
        - "At least one SC verifies the count is updated to 9"
        - "At least one SC verifies no other changes to SKILL.md"
      maps_to_sc: ["SC-3"]

    - id: "PATH-C2"
      unit: "UNIT-C"
      path_type: "error"
      trigger_condition: "Wrong count value used (not matching actual file count)"
      path_description: "Incorrect count written to SKILL.md — metadata is wrong, caught by review or audit"
      data_flow:
        inputs:
          - "spec-creation/SKILL.md line 28 — current value"
          - "spec-creation-validation/tasks/ directory listing"
        transformations:
          - "Count verification produces wrong value (e.g., miscount, stale directory state)"
          - "Wrong value written to line 28"
        outputs:
          - "spec-creation/SKILL.md line 28 — incorrect count"
        side_effects:
          - "Review or audit catches discrepancy"
      coverage_requirements:
        - "At least one SC verifies the count matches actual file count (not a hardcoded assumption)"
      maps_to_sc: ["SC-3"]

    - id: "PATH-C3"
      unit: "UNIT-C"
      path_type: "edge_case"
      trigger_condition: "Task files added/removed after this fix (future drift)"
      path_description: "Count becomes stale again when task files are added or removed — caught by periodic audit, not by this fix"
      data_flow:
        inputs:
          - "spec-creation/SKILL.md line 28 — current count (may be stale)"
          - "spec-creation-validation/tasks/ directory listing — actual count"
        transformations:
          - "Count drift detected by periodic audit"
        outputs:
          - "Audit finding: count mismatch"
        side_effects:
          - "New SPEC-FIX filed to correct count"
      coverage_requirements:
        - "No SC required for future drift — periodic audit is the remediation mechanism"
      maps_to_sc: []

    # ── UNIT-D: Update tasks list ──────────────────────────────────────
    - id: "PATH-D1"
      unit: "UNIT-D"
      path_type: "happy"
      trigger_condition: "spec-creation-validation/SKILL.md lines 16-21 list 6 tasks but directory has 9 files"
      path_description: "Add 3 missing task file entries to the tasks list"
      data_flow:
        inputs:
          - "spec-creation-validation/SKILL.md lines 16-21 — current list of 6 tasks"
          - "spec-creation-validation/tasks/ directory listing — 9 files"
        transformations:
          - "List all 9 files from directory"
          - "Identify 3 missing entries (create-remote-stub, pre-spec-inspection, revise-remote-body)"
          - "Insert missing entries into tasks list"
        outputs:
          - "spec-creation-validation/SKILL.md lines 16-21 — updated list with all 9 tasks"
        side_effects: []
      coverage_requirements:
        - "At least one SC verifies all 9 task files are listed"
        - "At least one SC verifies no other changes to SKILL.md"
      maps_to_sc: ["SC-4"]

    - id: "PATH-D2"
      unit: "UNIT-D"
      path_type: "error"
      trigger_condition: "Missing entries in updated list (not all 9 files added)"
      path_description: "Incomplete list written to SKILL.md — metadata is incomplete, caught by review or audit"
      data_flow:
        inputs:
          - "spec-creation-validation/tasks/ directory listing — 9 files"
        transformations:
          - "Some entries omitted from update"
        outputs:
          - "spec-creation-validation/SKILL.md lines 16-21 — incomplete list"
        side_effects:
          - "Review or audit catches missing entries"
      coverage_requirements:
        - "At least one SC verifies the list includes all 9 files (not a subset)"
      maps_to_sc: ["SC-4"]

    - id: "PATH-D3"
      unit: "UNIT-D"
      path_type: "edge_case"
      trigger_condition: "Task files added/removed after this fix (future drift)"
      path_description: "List becomes stale again — caught by periodic audit"
      data_flow:
        inputs:
          - "spec-creation-validation/SKILL.md lines 16-21 — current list (may be stale)"
          - "spec-creation-validation/tasks/ directory listing — actual files"
        transformations:
          - "List drift detected by periodic audit"
        outputs:
          - "Audit finding: list mismatch"
        side_effects:
          - "New SPEC-FIX filed to correct list"
      coverage_requirements:
        - "No SC required for future drift — periodic audit is the remediation mechanism"
      maps_to_sc: []

    # ── UNIT-E: Scope boundary documentation ──────────────────────────
    - id: "PATH-E1"
      unit: "UNIT-E"
      path_type: "happy"
      trigger_condition: "Spec body includes explicit scope boundary section with no implementation steps"
      path_description: "Scope boundary is documented, non-requirements are preserved, spec is documentation-only"
      data_flow:
        inputs:
          - "Spec context: SPEC-FIX scope boundary"
          - "REQ-9, REQ-10, NR-1, NR-2, NR-3 — requirement and non-requirement markers"
        transformations:
          - "Draft scope boundary section in spec body"
          - "Verify no implementation steps appear"
          - "Verify non-requirements are preserved"
        outputs:
          - "Spec body with documented scope boundary"
        side_effects: []
      coverage_requirements:
        - "At least one SC verifies scope boundary is explicitly documented"
        - "At least one SC verifies no implementation steps appear in spec body"
      maps_to_sc: ["SC-5"]

    - id: "PATH-E2"
      unit: "UNIT-E"
      path_type: "error"
      trigger_condition: "Implementation steps leak into spec body"
      path_description: "Spec contains implementation instructions — violates SPEC-FIX scope, caught by review"
      data_flow:
        inputs:
          - "Spec body content"
        transformations:
          - "Implementation steps inadvertently included"
        outputs:
          - "Spec body with implementation content"
        side_effects:
          - "Review catches scope violation"
      coverage_requirements:
        - "At least one SC verifies no implementation steps appear in spec body"
      maps_to_sc: ["SC-5"]

    - id: "PATH-E3"
      unit: "UNIT-E"
      path_type: "error"
      trigger_condition: "Scope boundary not documented in spec body"
      path_description: "Missing scope boundary — implementer may assume implementation is authorized"
      data_flow:
        inputs:
          - "Spec body content"
        transformations:
          - "Scope boundary section omitted"
        outputs:
          - "Spec body without scope documentation"
        side_effects:
          - "Implementer may proceed with unauthorized implementation"
      coverage_requirements:
        - "At least one SC verifies scope boundary is explicitly documented"
      maps_to_sc: ["SC-5"]

  coverage_verification:
    status: "VERIFIED"
    checks:
      - "Every path has at least one corresponding SC: YES — 14 paths with SC mappings, 2 drift paths (PATH-C3, PATH-D3) exempt (future drift handled by periodic audit)"
      - "Every SC exercises at least one path: YES — SC-1 (4 paths), SC-2 (4 paths), SC-3 (2 paths), SC-4 (2 paths), SC-5 (3 paths)"
      - "No path is orphaned (no SC covers it): YES — all 14 non-drift paths map to ≥1 SC"
      - "No SC is orphaned (exercises no path): YES — all 5 SCs have ≥1 path"
    gap_analysis:
      - "PATH-C3 (future count drift) and PATH-D3 (future list drift) have no SC — these are post-fix drift scenarios handled by periodic audit, not by this SPEC-FIX. No gap."
