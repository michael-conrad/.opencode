decomposition:
  spec: "#2027 — SPEC-FIX: Missing task files in spec-creation-validation"
  classification: single-task
  rationale: "SPEC-FIX is documentation-only — prescribes creation of missing artifacts without implementing them. Single phase: document the missing files, metadata fixes, and scope boundaries. No three-tier phase structure needed per Step 5 rule (single-task specs use flat phase list)."

  units:
    - id: "UNIT-A"
      title: "Create research-card-consultation.md task file"
      maps_to_sc: ["SC-1"]
      purpose: "Create the missing task file referenced in spec-creation/SKILL.md pipeline step 4 and contract table"
      single_assertion: "The task file research-card-consultation.md exists at spec-creation-validation/tasks/ with correct contract behavior"
      atomic: true
      no_hidden_conjunction: true
      traceable_to_sc: "SC-1"

      interface:
        reads:
          - ".opencode/.issues/research-cards/*.md — existing research cards (may be empty/absent)"
          - "spec-creation/SKILL.md contract table line 140 — defines reads/writes contract"
        writes:
          - ".issues/{N}/artifacts/research-cards-consulted.yaml — consultation findings"
        returns: "Standard result contract (status, finding_summary, artifact_path, blocker_reason)"
        format: "YAML frontmatter + Purpose + Entry Criteria + Exit Criteria + Procedure sections (per existing task file convention)"

      invariants:
        - "Task file MUST follow the same YAML-frontmatter + section format as all other spec-creation-validation/tasks/ files"
        - "Task file MUST handle empty/missing research cards directory gracefully (no crash, report no-cards-found)"
        - "Task file MUST NOT modify any existing files — it is a read-only consultation step"
        - "Contract MUST match spec-creation/SKILL.md line 140 exactly"

      failure_modes:
        - "Research cards directory does not exist → task reports no cards found, returns empty consultation"
        - "Research cards directory exists but is empty → same as above"
        - "Contract mismatch with SKILL.md → task produces wrong artifact format, caught by pipeline coherence gate"
        - "Format deviation from existing task files → caught by review or audit"

    - id: "UNIT-B"
      title: "Create interdependency-check.md task file"
      maps_to_sc: ["SC-2"]
      purpose: "Create the missing task file referenced in spec-creation/SKILL.md pipeline step 20 and contract table"
      single_assertion: "The task file interdependency-check.md exists at spec-creation-validation/tasks/ with correct contract behavior"
      atomic: true
      no_hidden_conjunction: true
      traceable_to_sc: "SC-2"

      interface:
        reads:
          - "GitHub API for open [SPEC] issues — queries open specs for interdependency analysis"
          - "spec-creation/SKILL.md contract table line 153 — defines reads/writes contract"
        writes:
          - ".issues/{N}/artifacts/interdependency-check.yaml — interdependency analysis findings"
        returns: "Standard result contract (status, finding_summary, artifact_path, blocker_reason)"
        format: "YAML frontmatter + Purpose + Entry Criteria + Exit Criteria + Procedure sections (per existing task file convention)"

      invariants:
        - "Task file MUST follow the same YAML-frontmatter + section format as all other spec-creation-validation/tasks/ files"
        - "Task file MUST use GitHub API (github_issue_read or equivalent) — no local-only fallback per CON-3"
        - "Task file MUST NOT modify any existing files — it is a read-only analysis step"
        - "Contract MUST match spec-creation/SKILL.md line 153 exactly"

      failure_modes:
        - "GitHub API unavailable → task cannot query open specs, reports BLOCKED with API failure reason"
        - "No open [SPEC] issues found → task reports no interdependencies found (valid empty state)"
        - "Contract mismatch with SKILL.md → task produces wrong artifact format, caught by pipeline coherence gate"
        - "Format deviation from existing task files → caught by review or audit"

    - id: "UNIT-C"
      title: "Fix sub-skills task count in spec-creation/SKILL.md"
      maps_to_sc: ["SC-3"]
      purpose: "Correct the sub-skills table count from 6 to 9 to match actual task file count in spec-creation-validation/tasks/"
      single_assertion: "spec-creation/SKILL.md line 28 reports '9 task files' instead of '6 task files'"
      atomic: true
      no_hidden_conjunction: true
      traceable_to_sc: "SC-3"

      interface:
        reads:
          - "spec-creation/SKILL.md line 28 — current count '6 task files'"
          - "spec-creation-validation/tasks/ directory listing — 9 files"
        writes:
          - "spec-creation/SKILL.md line 28 — update count to '9 task files'"
        returns: "N/A — documentation fix, no result contract"

      invariants:
        - "Count MUST match actual file count in spec-creation-validation/tasks/ (9 files)"
        - "No other changes to SKILL.md — single-line fix only"
        - "Documentation fix per REQ-10 — no new task file creation"

      failure_modes:
        - "Count drifts again if task files are added/removed — caught by periodic audit"
        - "Wrong count value used → spec-creation/SKILL.md metadata is incorrect"

    - id: "UNIT-D"
      title: "Update spec-creation-validation/SKILL.md tasks list"
      maps_to_sc: ["SC-4"]
      purpose: "Add the 3 missing task files (create-remote-stub.md, pre-spec-inspection.md, revise-remote-body.md) to the tasks list at lines 16-21"
      single_assertion: "spec-creation-validation/SKILL.md tasks list includes all 9 task files from the directory"
      atomic: true
      no_hidden_conjunction: true
      traceable_to_sc: "SC-4"

      interface:
        reads:
          - "spec-creation-validation/SKILL.md lines 16-21 — current list of 6 tasks"
          - "spec-creation-validation/tasks/ directory listing — 9 files"
        writes:
          - "spec-creation-validation/SKILL.md lines 16-21 — updated list with all 9 tasks"
        returns: "N/A — documentation fix, no result contract"

      invariants:
        - "Task list MUST include all 9 files from the directory"
        - "No other changes to SKILL.md — list update only"
        - "Documentation fix per REQ-10 — no new task file creation"

      failure_modes:
        - "List drifts again if task files are added/removed — caught by periodic audit"
        - "Missing entries → SKILL.md metadata is incomplete"

    - id: "UNIT-E"
      title: "SPEC-FIX scope boundary documentation"
      maps_to_sc: ["SC-5"]
      purpose: "Document that this SPEC-FIX is documentation-only — no implementation work is authorized"
      single_assertion: "The spec body explicitly states that no implementation work is authorized by this SPEC-FIX"
      atomic: true
      no_hidden_conjunction: true
      traceable_to_sc: "SC-5"

      interface:
        reads:
          - "Spec context: SPEC-FIX scope boundary"
          - "REQ-9, REQ-10, NR-1, NR-2, NR-3 — non-requirement and non-requirement markers"
        writes:
          - "Spec body scope section — documents the boundary"
        returns: "N/A — documentation constraint"

      invariants:
        - "No implementation steps appear in the spec body"
        - "Scope boundary is explicitly documented in the spec"
        - "Non-requirements (NR-1, NR-2, NR-3) are preserved"

      failure_modes:
        - "Implementation steps leak into spec → violates SPEC-FIX scope, caught by review"
        - "Scope boundary not documented → implementer may assume implementation is authorized"

  phase_structure:
    note: "Single-task SPEC-FIX — no three-tier phase structure needed. Flat phase list applies."
    phases:
      - phase: "Phase 1"
        title: "Document SPEC-FIX artifacts and metadata corrections"
        units: ["UNIT-A", "UNIT-B", "UNIT-C", "UNIT-D", "UNIT-E"]
        type: "flat"
        rationale: "All units are documentation-only — no implementation. Single phase covers all missing artifact documentation and metadata fixes."

  decomposition_depth:
    assessment: "AT_DEPTH"
    rationale: "Each unit asserts exactly one independently verifiable property. No unit contains 'and'/'or' conjunctions. Each maps to exactly one SC. A PASS/FAIL for any unit identifies exactly one thing that is correct or wrong."
