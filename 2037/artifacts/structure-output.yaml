## Dependency Contract

dependency_contract:
  ordering: sequential
  rationale: >
    All phases modify overlapping files (020-go-prohibitions.md and 000-critical-rules.md
    are touched by Phases 1-5). Sequential ordering prevents merge conflicts and ensures
    each phase builds on the previous phase's state. Phase 1 is a pre-phase that establishes
    the universal prohibition framework. Phases 2-5 each add one new rule. Phase 6 is a
    post-phase that verifies all rules together.
  edges:
    - from: 1
      to: 2
      type: depends_on
      condition: "Phase 1 committed to feature branch"
    - from: 2
      to: 3
      type: depends_on
      condition: "Phase 2 committed to feature branch"
    - from: 3
      to: 4
      type: depends_on
      condition: "Phase 3 committed to feature branch"
    - from: 4
      to: 5
      type: depends_on
      condition: "Phase 4 committed to feature branch"
    - from: 5
      to: 6
      type: depends_on
      condition: "Phase 5 committed to feature branch; all 5 rules exist in guideline files"
  invariants:
    - "020-go-prohibitions.md must be edited sequentially — no parallel edits across phases"
    - "000-critical-rules.md must be edited sequentially — no parallel edits across phases"
    - "Phase 1 modifies existing text (scope qualifiers); Phases 2-5 add new text (new rules)"
    - "Phase 6 is additive only — no modification of existing files"
    - "Each phase produces exactly one commit on the feature branch"
  z3_model:
    variables:
      - name: p1
        description: "Phase 1 complete"
      - name: p2
        description: "Phase 2 complete"
      - name: p3
        description: "Phase 3 complete"
      - name: p4
        description: "Phase 4 complete"
      - name: p5
        description: "Phase 5 complete"
      - name: p6
        description: "Phase 6 complete"
    constraints:
      - "p2 → p1"   # Phase 2 requires Phase 1
      - "p3 → p2"   # Phase 3 requires Phase 2
      - "p4 → p3"   # Phase 4 requires Phase 3
      - "p5 → p4"   # Phase 5 requires Phase 4
      - "p6 → p5"   # Phase 6 requires Phase 5
    goal: "p1 ∧ p2 ∧ p3 ∧ p4 ∧ p5 ∧ p6"
    expected_result: "SAT — all phases reachable in sequential order"

