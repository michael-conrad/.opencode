body: "---\ntitle: '[SPEC] Fix spec-creation family — remove 5 sub-skill stubs, per-step\
  \ dispatch'\nstatus: draft\ncreated: 2026-07-21\nlicense: MIT\nprovenance: AI-generated\n\
  issue: 2048\nauthors:\n  - OpenCode (deepseek-v4-flash)\n---\n\n> STATUS: **DRAFT**\n\
  > CREATED: 2026-07-21\n\n> **Compliance Requirement:** All steps and sub-steps in\
  \ this document MUST be followed in order. Failure to comply with any step — including\
  \ but not limited to verification gates, test phases, audit checkpoints, and review\
  \ steps — will result in the feature branch being rejected and discarded, requiring\
  \ a full rework from scratch and loss of all prior work. There is no valid reason\
  \ to skip, compress, reorder, or omit any step.\n>\n> **Master spec reference:**\
  \ See `tmp/spec-per-step-dispatch.md` for the full interdependency analysis, dispatch\
  \ vocabulary, and shared definitions.\n\n\n## Problem\n\nThe spec-creation skill\
  \ card routes 3 task references through 5 sub-skill SKILL.md files (spec-creation-decomposition,\
  \ spec-creation-requirements, spec-creation-validation, spec-creation-change-control,\
  \ spec-creation-operating-protocol). Each sub-skill is a stub with no dispatch information\
  \ — they list task filenames with no TDT, no workflows, no dispatch instructions.\n\
  \nThis sub-skill indirection is dead weight. The task files are referenced by path\
  \ from the parent TDT and should be referenced directly. Additionally, all 6 skill\
  \ cards have the global Invocation/DISPATCH_GATE defect.\n\n## Scope\n\nThis spec\
  \ covers the spec-creation family: spec-creation and its 5 sub-skill stubs, plus\
  \ their ~18 task files.\n\n**Out of scope:** Other skill cards (covered by F-1 through\
  \ F-3, F-5 through F-7). Behavioral enforcement tests (covered by issue #2054).\
  \ Removal of the 5 orphaned sub-skill SKILL.md files (covered by C-1, issue #2055).\n\
  \n## Key Changes\n\n1. Add `## Pre-Flight Gate` section to all 6 skill cards\n2.\
  \ Remove global `## Invocation` and `## DISPATCH_GATE` sections from all 6 skill\
  \ cards\n3. Update `spec-creation/SKILL.md` TDT to reference task files by direct\
  \ path instead of `--task` qualifiers\n4. Add enumerated workflow sections with\
  \ per-step dispatch for each spec-creation workflow\n5. Add Dispatch Contract, Output\
  \ Contract, and Frugal Contract to all ~18 task files\n6. Remove \"dispatch via\
  \ task()\" language from Overview and Persona sections\n\n## Affected Files\n\n\
  | File | Change |\n|------|--------|\n| `spec-creation/SKILL.md` | Add Pre-Flight\
  \ Gate, remove Invocation/DISPATCH_GATE, update TDT to direct paths, add workflows\
  \ |\n| `spec-creation-decomposition/SKILL.md` | Add Pre-Flight Gate, remove Invocation/DISPATCH_GATE,\
  \ add workflows |\n| `spec-creation-requirements/SKILL.md` | Add Pre-Flight Gate,\
  \ remove Invocation/DISPATCH_GATE, add workflows |\n| `spec-creation-validation/SKILL.md`\
  \ | Add Pre-Flight Gate, remove Invocation/DISPATCH_GATE, add workflows |\n| `spec-creation-change-control/SKILL.md`\
  \ | Add Pre-Flight Gate, remove Invocation/DISPATCH_GATE, add workflows |\n| `spec-creation-operating-protocol/SKILL.md`\
  \ | Add Pre-Flight Gate, remove Invocation/DISPATCH_GATE, add workflows |\n| `spec-creation/tasks/*.md`\
  \ (~5 files) | Add contract sections |\n| `spec-creation-decomposition/tasks/*.md`\
  \ (~4 files) | Add contract sections |\n| `spec-creation-requirements/tasks/*.md`\
  \ (~3 files) | Add contract sections |\n| `spec-creation-validation/tasks/*.md`\
  \ (~3 files) | Add contract sections |\n| `spec-creation-change-control/tasks/*.md`\
  \ (~2 files) | Add contract sections |\n| `spec-creation-operating-protocol/tasks/*.md`\
  \ (~1 file) | Add contract sections |\n\n## Success Criteria\n\n| ID | Criterion\
  \ | Evidence Type |\n|----|-----------|---------------|\n| SC-1 | All 6 skill cards\
  \ have Pre-Flight Gate as first content section | `string` |\n| SC-2 | All 6 skill\
  \ cards have no global Invocation or DISPATCH_GATE section | `string` |\n| SC-3\
  \ | `spec-creation/SKILL.md` TDT references task files by direct path, not `--task`\
  \ qualifiers | `string` |\n| SC-4 | All 6 skill cards have enumerated workflow sections\
  \ with per-step dispatch | `string` |\n| SC-5 | All ~18 task files have Dispatch\
  \ Contract, Output Contract, and Frugal Contract sections | `string` |\n| SC-6 |\
  \ No \"dispatch via task()\" language in lead-in sections | `string` |\n\n\n## Implementation\
  \ Order\n\n```\nPhase 1: F-1 (audit) — proof of concept\nPhase 2: F-4 (this spec)\
  \ — parallel with F-2, F-3, F-5, F-6, F-7\nPhase 3: C-1 (cleanup) — blocked until\
  \ F-2 through F-5 complete\n```\n\n## Dependencies\n\n- **Prerequisite for #2055\
  \ (C-1):** Cleanup spec must wait until parent TDT references task files directly\n\
  - **Templates:** The canonical templates are materialized at `.opencode/skills/templates/SKILL.md`\
  \ and `.opencode/skills/templates/task.md`\n\n## Interdependency\n\n| Issue | Classification\
  \ | Description |\n|-------|---------------|-------------|\n| #2053 | — | F-1: Audit\
  \ fix — proof of concept |\n| #2057 | — | F-2: Approval-gate fix — parallel |\n\
  | #2049 | — | F-3: Git-workflow fix — parallel |\n| #2048 | — | F-4: Spec-creation\
  \ fix — this spec |\n| #2050 | — | F-5: Writing-plans fix — parallel |\n| #2051\
  \ | — | F-6: Implementation-pipeline fix — parallel |\n| #2056 | — | F-7: Standalone\
  \ cards fix — parallel |\n| #2055 | BLOCKED_BY #2057, #2049, #2048, #2050 | C-1:\
  \ Cleanup — blocked by fix specs |\n| #2054 | BLOCKED_BY #2053, #2057, #2049, #2048,\
  \ #2050, #2051, #2056, #2055 | Behavioral tests — blocked by all |\n\n\n"
