body: "---\ntitle: '[SPEC] Fix writing-plans family — remove 2 sub-skill stubs, per-step\
  \ dispatch'\nstatus: draft\ncreated: 2026-07-21\nlicense: MIT\nprovenance: AI-generated\n\
  issue: 2050\nauthors:\n  - OpenCode (deepseek-v4-flash)\n---\n\n> STATUS: **DRAFT**\n\
  > CREATED: 2026-07-21\n\n> **Compliance Requirement:** All steps and sub-steps in\
  \ this document MUST be followed in order. Failure to comply with any step — including\
  \ but not limited to verification gates, test phases, audit checkpoints, and review\
  \ steps — will result in the feature branch being rejected and discarded, requiring\
  \ a full rework from scratch and loss of all prior work. There is no valid reason\
  \ to skip, compress, reorder, or omit any step.\n>\n> **Master spec reference:**\
  \ See `tmp/spec-per-step-dispatch.md` for the full interdependency analysis, dispatch\
  \ vocabulary, and shared definitions.\n\n> **Master spec reference:** See `tmp/spec-per-step-dispatch.md`\
  \ for the full interdependency analysis, dispatch vocabulary, and shared definitions.\n\
  \n## Problem\n\nThe writing-plans skill card routes 1 task reference through 2 sub-skill\
  \ SKILL.md files (writing-plans-creation, writing-plans-holistic). Each sub-skill\
  \ is a stub with no dispatch information — they list task filenames with no TDT,\
  \ no workflows, no dispatch instructions.\n\nThis sub-skill indirection is dead\
  \ weight. The task files are referenced by path from the parent TDT and should be\
  \ referenced directly. Additionally, all 3 skill cards have the global Invocation/DISPATCH_GATE\
  \ defect.\n\n## Scope\n\nThis spec covers the writing-plans family: writing-plans,\
  \ writing-plans-creation, and writing-plans-holistic skill cards and their ~20 task\
  \ files.\n\n**Out of scope:** Other skill cards (covered by F-1 through F-4, F-6,\
  \ F-7). Behavioral enforcement tests (covered by issue #2054). Removal of the 2\
  \ orphaned sub-skill SKILL.md files (covered by C-1, issue #2055).\n\n## Key Changes\n\
  \n1. Add `## Pre-Flight Gate` section to all 3 skill cards\n2. Remove global `##\
  \ Invocation` and `## DISPATCH_GATE` sections from all 3 skill cards\n3. Update\
  \ `writing-plans/SKILL.md` TDT to reference task files by direct path instead of\
  \ `--task` qualifiers\n4. Add enumerated workflow sections with per-step dispatch\
  \ for each writing-plans workflow\n5. Add Dispatch Contract, Output Contract, and\
  \ Frugal Contract to all ~20 task files\n6. Remove \"dispatch via task()\" language\
  \ from Overview and Persona sections\n\n## Affected Files\n\n| File | Change |\n\
  |------|--------|\n| `writing-plans/SKILL.md` | Add Pre-Flight Gate, remove Invocation/DISPATCH_GATE,\
  \ update TDT to direct paths, add workflows |\n| `writing-plans-creation/SKILL.md`\
  \ | Add Pre-Flight Gate, remove Invocation/DISPATCH_GATE, add workflows |\n| `writing-plans-holistic/SKILL.md`\
  \ | Add Pre-Flight Gate, remove Invocation/DISPATCH_GATE, add workflows |\n| `writing-plans/tasks/*.md`\
  \ (~10 files) | Add contract sections |\n| `writing-plans-creation/tasks/*.md` (~5\
  \ files) | Add contract sections |\n| `writing-plans-holistic/tasks/*.md` (~5 files)\
  \ | Add contract sections |\n\n## Success Criteria\n\n| ID | Criterion | Evidence\
  \ Type |\n|----|-----------|---------------|\n| SC-1 | All 3 skill cards have Pre-Flight\
  \ Gate as first content section | `string` |\n| SC-2 | All 3 skill cards have no\
  \ global Invocation or DISPATCH_GATE section | `string` |\n| SC-3 | `writing-plans/SKILL.md`\
  \ TDT references task files by direct path, not `--task` qualifiers | `string` |\n\
  | SC-4 | All 3 skill cards have enumerated workflow sections with per-step dispatch\
  \ | `string` |\n| SC-5 | All ~20 task files have Dispatch Contract, Output Contract,\
  \ and Frugal Contract sections | `string` |\n| SC-6 | No \"dispatch via task()\"\
  \ language in lead-in sections | `string` |\n\n\n## Implementation Order\n\n```\n\
  Phase 1: F-1 (audit) — proof of concept\nPhase 2: F-5 (this spec) — parallel with\
  \ F-2, F-3, F-4, F-6, F-7\nPhase 3: C-1 (cleanup) — blocked until F-2 through F-5\
  \ complete\n```\n\n## Dependencies\n\n- **Prerequisite for #2055 (C-1):** Cleanup\
  \ spec must wait until parent TDT references task files directly\n- **Templates:**\
  \ The canonical templates are materialized at `.opencode/skills/templates/SKILL.md`\
  \ and `.opencode/skills/templates/task.md`\n\n## Interdependency\n\n| Issue | Classification\
  \ | Description |\n|-------|---------------|-------------|\n| #2053 | — | F-1: Audit\
  \ fix — proof of concept |\n| #2057 | — | F-2: Approval-gate fix — parallel |\n\
  | #2049 | — | F-3: Git-workflow fix — parallel |\n| #2048 | — | F-4: Spec-creation\
  \ fix — parallel |\n| #2050 | — | F-5: Writing-plans fix — this spec |\n| #2051\
  \ | — | F-6: Implementation-pipeline fix — parallel |\n| #2056 | — | F-7: Standalone\
  \ cards fix — parallel |\n| #2055 | BLOCKED_BY #2057, #2049, #2048, #2050 | C-1:\
  \ Cleanup — blocked by fix specs |\n| #2054 | BLOCKED_BY #2053, #2057, #2049, #2048,\
  \ #2050, #2051, #2056, #2055 | Behavioral tests — blocked by all |\n\n"
