body: "---\ntitle: '[SPEC] Remove 13 sub-skill SKILL.md files from available_skills\
  \ — cleanup after per-step dispatch fix'\nstatus: draft\ncreated: 2026-07-21\nlicense:\
  \ MIT\nprovenance: AI-generated\nissue: 2055\nauthors:\n  - OpenCode (deepseek-v4-flash)\n\
  ---\n\n> STATUS: **DRAFT**\n> CREATED: 2026-07-21\n>\n> **Compliance Requirement:**\
  \ All steps and sub-steps in this document MUST be followed in order. Failure to\
  \ comply with any step — including but not limited to verification gates, test phases,\
  \ audit checkpoints, and review steps — will result in the feature branch being\
  \ rejected and discarded, requiring a full rework from scratch and loss of all prior\
  \ work. There is no valid reason to skip, compress, reorder, or omit any step.\n\
  >\n> **Master spec reference:** See `tmp/spec-per-step-dispatch.md` for the full\
  \ interdependency analysis, dispatch vocabulary, and shared definitions.\n>\n> **Compliance\
  \ requirement:** This is a cleanup spec (C-1). It removes orphaned sub-skill SKILL.md\
  \ files from `<available_skills>` after the fix specs (F-2 through F-5) have updated\
  \ parent TDTs to reference task files directly. This spec MUST NOT run until all\
  \ prerequisite fix specs are complete.\n\n## Problem\n\nAfter fix specs F-2 through\
  \ F-5 update parent TDTs to reference task files by direct path, 13 sub-skill SKILL.md\
  \ files become orphaned. They are no longer referenced by any TDT `--task` qualifier.\
  \ However, they still appear in the `<available_skills>` list with \"Load via skill()\"\
  \ language, which misleads the orchestrator into thinking these are valid entry\
  \ points.\n\nThese sub-skill SKILL.md files are dead weight. The task files under\
  \ them remain — they are the useful artifacts. The SKILL.md files themselves provide\
  \ no dispatch information (no TDT, no workflows, no dispatch instructions).\n\n\
  ## Scope\n\nThis spec covers the removal of 13 sub-skill SKILL.md files from `<available_skills>`\
  \ and stripping \"Load via skill()\" language from their descriptions. The task\
  \ files under these directories are preserved.\n\n**Out of scope:** The fix specs\
  \ themselves (F-2 through F-5). Behavioral enforcement tests (covered by issue #2054).\
  \ The task files under the sub-skill directories (they remain in place). TDT updates\
  \ in parent skill cards (handled by fix specs F-2 through F-5).\n\n## Key Changes\n\
  \n1. Remove 13 sub-skill SKILL.md files from the `<available_skills>` list in the\
  \ system prompt\n2. Strip \"Load via skill()\" language from their descriptions\
  \ in `<available_skills>`\n3. The task files under each sub-skill directory remain\
  \ — they are referenced by direct path from parent TDTs\n\n## Affected Files\n\n\
  | File | Change |\n|------|--------|\n| `<available_skills>` list (system prompt)\
  \ | Remove 13 entries, strip \"Load via skill()\" from descriptions |\n\n### Sub-skill\
  \ SKILL.md files to remove from `<available_skills>`\n\n| # | Sub-skill | Parent\
  \ Skill | Removed By |\n|---|-----------|-------------|------------|\n| 1 | `approval-gate-scope`\
  \ | approval-gate | F-2 |\n| 2 | `git-workflow-branch` | git-workflow | F-3 |\n\
  | 3 | `git-workflow-commit` | git-workflow | F-3 |\n| 4 | `git-workflow-pr` | git-workflow\
  \ | F-3 |\n| 5 | `git-workflow-cleanup` | git-workflow | F-3 |\n| 6 | `git-workflow-conflict`\
  \ | git-workflow | F-3 |\n| 7 | `spec-creation-decomposition` | spec-creation |\
  \ F-4 |\n| 8 | `spec-creation-requirements` | spec-creation | F-4 |\n| 9 | `spec-creation-validation`\
  \ | spec-creation | F-4 |\n| 10 | `spec-creation-change-control` | spec-creation\
  \ | F-4 |\n| 11 | `spec-creation-operating-protocol` | spec-creation | F-4 |\n|\
  \ 12 | `writing-plans-creation` | writing-plans | F-5 |\n| 13 | `writing-plans-holistic`\
  \ | writing-plans | F-5 |\n\n## Success Criteria\n\n| ID | Criterion | Evidence\
  \ Type |\n|----|-----------|---------------|\n| SC-1 | No sub-skill SKILL.md file\
  \ appears in `<available_skills>` with \"Load via skill()\" language | `string`\
  \ |\n| SC-2 | All 13 sub-skill entries are removed from `<available_skills>` | `string`\
  \ |\n| SC-3 | Parent TDTs reference task files by direct path (verified by fix specs\
  \ F-2 through F-5 — C-1 only removes from available_skills) | `string` |\n| SC-4\
  \ | Task files under sub-skill directories remain in place and are accessible by\
  \ direct path | `string` |\n\n## Implementation Order\n\n```\nPhase 1: T-1, T-2\
  \ (templates) — prerequisite\nPhase 2: F-1 (audit) — proof of concept\nPhase 3:\
  \ F-2, F-3, F-4, F-5 (fix specs) — prerequisite\nPhase 4: C-1 (this spec) — cleanup\
  \ after fix specs complete\nPhase 5: Behavioral enforcement tests (issue #2054)\n\
  ```\n\n## Dependencies\n\n- **BLOCKED_BY #2057 (F-2):** approval-gate fix must update\
  \ parent TDT first\n- **BLOCKED_BY #2049 (F-3):** git-workflow fix must update parent\
  \ TDT first\n- **BLOCKED_BY #2048 (F-4):** spec-creation fix must update parent\
  \ TDT first\n- **BLOCKED_BY #2050 (F-5):** writing-plans fix must update parent\
  \ TDT first\n\n## Interdependency\n\n| Issue | Classification | Description |\n\
  |-------|---------------|-------------|\n| #2047 | BLOCKS | T-2: Task card template\
  \ — prerequisite for all fix specs |\n| #2052 | BLOCKS | T-1: Skill card template\
  \ — prerequisite for all fix specs |\n| #2053 | BLOCKED_BY #2047, #2052 | F-1: Audit\
  \ fix — blocked by templates |\n| #2057 | BLOCKED_BY #2047, #2052 | F-2: Approval-gate\
  \ fix — blocked by templates |\n| #2049 | BLOCKED_BY #2047, #2052 | F-3: Git-workflow\
  \ fix — blocked by templates |\n| #2048 | BLOCKED_BY #2047, #2052 | F-4: Spec-creation\
  \ fix — blocked by templates |\n| #2050 | BLOCKED_BY #2047, #2052 | F-5: Writing-plans\
  \ fix — blocked by templates |\n| #2051 | BLOCKED_BY #2047, #2052 | F-6: Implementation-pipeline\
  \ fix — blocked by templates |\n| #2056 | BLOCKED_BY #2047, #2052 | F-7: Standalone\
  \ cards fix — blocked by templates |\n| #2055 | BLOCKED_BY #2057, #2049, #2048,\
  \ #2050 | C-1: Cleanup — blocked by fix specs |\n| #2054 | BLOCKED_BY #2053, #2057,\
  \ #2049, #2048, #2050, #2051, #2056, #2055 | Behavioral tests — blocked by all |\n"
