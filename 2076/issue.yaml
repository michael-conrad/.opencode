title: '[SPEC] Skill card and task card architecture documentation standards for .opencode/
  module'
status: closed
labels:
- '[SPEC],needs-approval'
body: "## Objective\n\nDocument the canonical skill card (SKILL.md) and task card\
  \ (tasks/<name>.md) architecture requirements and recommended structure in the .opencode/\
  \ module, AND re-align all existing documentation to match research findings. This\
  \ spec covers both what is MISSING and what needs to be CORRECTED.\n\n## Background\n\
  \nResearch across opencode official docs, the opencode-agent-skills plugin, and\
  \ community guides reveals that the current .opencode/ module has comprehensive\
  \ documentation for the orchestrator/sub-agent routing pattern and the DISPATCH_GATE\
  \ protocol, but has these defects:\n\n### Missing Documentation\n\n1. **The `description`\
  \ field as a semantic router** — the agent evaluates its OWN intent against the\
  \ description, not the user's literal utterance. Current descriptions use \"Load\
  \ via skill() when...\" meta-instructions that dilute the semantic signal. No centralized\
  \ reference exists explaining this mechanism.\n\n2. **The `skill()` tool is orchestrator-only**\
  \ — sub-agents dispatched via task() cannot call skill(). This is documented in\
  \ critical-rules-XXX but not in any centralized reference.\n\n3. **`skill()` auto-loads\
  \ SKILL.md; `task()` does NOT auto-load task cards** — Source code analysis of opencode's\
  \ `skill.ts` and `task.ts` reveals an asymmetry:\n   - `skill({name: \"...\"})`\
  \ reads the SKILL.md file from disk and injects the full content into the **calling\
  \ agent's context** as XML-wrapped tool output. The orchestrator receives the skill\
  \ card automatically.\n   - `task(..., prompt: \"...\")` creates a child session\
  \ with fresh context. The prompt is the ONLY context the subagent receives. The\
  \ subagent must use its own file read tools to load `tasks/<name>.md`. The task\
  \ tool does NOT auto-load task card files.\n   - The discovery directive in the\
  \ prompt (\"Read `<skill>/tasks/<task>.md` first\") is REQUIRED because `task()`\
  \ does not auto-load. It is routing metadata (which file to read), not preloading.\n\
  \   - No centralized reference documents this asymmetry or the complete pipeline.\n\
  \n4. **Sub-skills are not an opencode concept** — the opencode skill system has\
  \ exactly one abstraction (SKILL.md with YAML frontmatter). The current codebase\
  \ has 20+ sub-skill directories that appear as independent entries in <available_skills>,\
  \ creating routing confusion.\n\n5. **Progressive disclosure architecture** — Level\
  \ 1 (metadata: name + description only, ~100 tokens), Level 2 (instructions: full\
  \ SKILL.md body, ~5,000 tokens), Level 3 (resources: scripts, references). This\
  \ architecture is not documented anywhere in .opencode/.\n\n6. **The description\
  \ field is a classifier boundary** — too vague causes false activations, too specific\
  \ causes missed opportunities. No guidance exists on writing descriptions that match\
  \ agent intent.\n\n7. **The Invocation section is an incomplete dispatch contract**\
  \ — the `task()` tool requires `subagent_type`, `description`, and `prompt` parameters.\
  \ Current Invocation sections only specify the `prompt` string. The `subagent_type`\
  \ is missing. Context include/exclude is scattered across Sub-Agent Routing and\
  \ DISPATCH_GATE sections. The result contract is in the task card file. The orchestrator\
  \ must cross-reference 3+ locations to construct a single `task()` call. A survey\
  \ of 43 SKILL.md files found that 22 of 28 with Invocation sections omit the discovery\
  \ directive, forcing subagents to search for the correct task file.\n\n### Existing\
  \ Documentation That Needs Re-Alignment\n\n7. **`reference/skill-card-schema.md`**\
  \ — uses the deprecated \"Load via skill() when...\" description pattern. Must be\
  \ updated to agent-intent format.\n\n8. **`skills/skill-creator/reference/skill-card-spec.md`**\
  \ — references the deprecated Farmage description format. Must be updated to agent-intent\
  \ format.\n\n9. **`skills/skill-creator/reference/routing-only-template.md`** —\
  \ the canonical template for new SKILL.md files. Its description format specification\
  \ uses the deprecated pattern. Must be updated to agent-intent format.\n\n10. **`AGENTS.md`\
  \ (Universal Skill Dispatch Gate section)** — the Pre-Response Gate Procedure says\
  \ \"evaluate against ALL available skill descriptions\" but does not explain that\
  \ the match is between the agent's OWN intent and the description, not the user's\
  \ literal utterance. Must be updated.\n\n11. **All existing skill descriptions in\
  \ `skills/`** — approximately 60 SKILL.md files use the deprecated \"Load via skill()\
  \ when...\" / \"User phrases:\" pattern. These must be audited and a plan created\
  \ for rewriting them.\n\n### Tooling That Needs Re-Alignment\n\n12. **`skills/skill-creator/scripts/validate_skill_cards.py`**\
  \ — the mechanical validation script. Validates REQ-6 (DISPATCH_GATE 6 subsections),\
  \ SC-LINT-005 (no procedure content in SKILL.md), SC-LINT-006 (dispatch table sub-item\
  \ types), and description format (SC-LINT-001 requires \"Dispatch when\" or \"Load\
  \ via skill() when\"). All of these reference the old Trigger Dispatch Table + Invocation\
  \ + DISPATCH_GATE structure. Must be updated to validate the new Workflows section\
  \ format with sub-bullet dispatch contracts.\n\n13. **`skills/skill-creator/tasks/validate.md`**\
  \ — the agent-driven semantic validation task. Phase 6 validates SKILL-STRUCT-1\
  \ through SKILL-STRUCT-6 (Trigger Dispatch Table presence, DISPATCH_GATE completeness,\
  \ Sub-Agent Routing section, Invocation section, no inline procedure, Tasks section\
  \ listing). Must be updated to validate Workflows section structure instead.\n\n\
  14. **`skills/audit/tasks/spec-audit-evaluator.md`** — the spec audit evaluator.\
  \ Step 5i validates SC-ADMONISHMENT (5/4/3-item discipline admonishment). Step 15\
  \ evaluates SC-SEM-001 through SC-SEM-006 (dispatch condition alignment, dispatch\
  \ table sub-item types). These reference the old Trigger Dispatch Table structure.\
  \ Must be updated to validate Workflows section format.\n\n15. **`tests-v2/behaviors/dispatch-boundary-writing-plans.sh`**\
  \ — behavioral test that validates Trigger Dispatch Table routing classification\
  \ (SC-28). References the old TDT structure. Must be updated or replaced to validate\
  \ Workflows section routing.\n\n16. **`tests-v2/behaviors/skill-description-pattern.sh`**\
  \ — behavioral test that validates description agent-intent pattern (SC-3 from #1961).\
  \ May need updating if the description format requirements changed.\n\n### Dual-Repo\
  \ Problem\n\n12. **The `.opencode/` submodule is invisible from `opencode-config/`**\
  \ — when the agent works in the `opencode-config` parent repo, it has access to\
  \ `.opencode/` as a submodule. But `opencode-config/AGENTS.md` and `opencode-config/.opencode/AGENTS.md`\
  \ do not cross-reference the new reference docs in `.opencode/reference/`. A companion\
  \ spec must be filed in `opencode-config` to update its AGENTS.md files so the agent\
  \ can discover and use the new documentation.\n\n## Not Included\n\n- Replacing\
  \ the spec-creation skill (separate spec #2077)\n- Changing the DISPATCH_GATE protocol\
  \ (already documented)\n- Changing the orchestrator/sub-agent routing pattern (already\
  \ documented)\n- Rewriting individual skill descriptions (covered by audit report\
  \ in this spec, actual rewriting is downstream work)\n\n## Success Criteria\n\n\
  | ID | Criterion | Evidence Type | Verification Method |\n|----|-----------|---------------|---------------------|\n\
  | SC-1 | A centralized reference document exists at reference/skill-card-description-standards.md\
  \ covering the description field as a semantic router for agent-intent matching\
  \ | structural | File exists at expected path |\n| SC-2 | The reference document\
  \ explains that the agent evaluates its OWN intent against descriptions (not user\
  \ utterances) and provides guidance on writing descriptions that match agent task\
  \ intent | string | grep for \"agent intent\" and \"semantic router\" in the reference\
  \ file |\n| SC-3 | The reference document documents the progressive disclosure three-level\
  \ architecture (metadata, instructions, resources) | string | grep for \"progressive\
  \ disclosure\" and \"Level 1\" in the reference file |\n| SC-4 | The reference document\
  \ documents that skill() is orchestrator-only and sub-agents cannot call it | string\
  \ | grep for \"orchestrator-only\" in the reference file |\n| SC-5 | The reference\
  \ document documents the complete skill() → task() → task card pipeline: skill()\
  \ auto-loads SKILL.md into orchestrator context; task() creates a child session\
  \ with prompt only — the subagent must read tasks/<name>.md via file tools (the\
  \ discovery directive in the prompt tells the subagent which file to read) | string\
  \ | grep for \"skill()\" and \"task()\" and \"auto-load\" in the reference file\
  \ — must show the asymmetry between the two tools |\n| SC-6 | The reference document\
  \ documents the complete dispatch contract format: base prompt, subagent_type, context,\
  \ and expected result contract — all in one place per workflow step | string | grep\
  \ for \"dispatch contract\" and \"subagent_type\" in the reference file |\n| SC-7\
  \ | The reference document specifies that the Workflows section uses sub-bullet\
  \ dispatch contracts with Prompt, Context, and Returns fields. No Context Exclude\
  \ sub-bullet is needed because task() creates a child session with zero parent context\
  \ | string | grep for \"Context\" field and \"No Context Exclude\" in the reference\
  \ file |\n| SC-8 | The reference document specifies that the base prompt MUST use\
  \ natural language (not coded dispatch strings like \"execute X from Y\") and MUST\
  \ include the discovery directive telling the subagent which file to read | string\
  \ | grep for \"natural language\" and \"discovery directive\" in the reference file\
  \ |\n| SC-9 | The reference document documents that sub-skills are not an opencode\
  \ concept and provides guidance on when to use a single skill with multiple task\
  \ cards vs multiple independent skills | string | grep for \"sub-skill\" and \"\
  not an opencode concept\" in the reference file |\n| SC-10 | A centralized reference\
  \ document exists at reference/task-card-structure-standards.md covering the canonical\
  \ task card structure (Purpose, Entry Criteria, Procedure, Exit Criteria, Result\
  \ Contract) | structural | File exists at expected path |\n| SC-11 | The task card\
  \ reference includes guidance on what task cards MUST NOT contain (no task() calls,\
  \ no skill() calls, no orchestrator-level routing instructions) | string | grep\
  \ for \"MUST NOT\" and \"task()\" in the reference file |\n| SC-12 | The task card\
  \ reference includes guidance on result contract format (status, finding_summary,\
  \ artifact_path, blocker_reason) | string | grep for \"result contract\" in the\
  \ reference file |\n| SC-13 | Both reference documents are cross-referenced from\
  \ AGENTS.md and the skill-creator skill card | string | grep for reference file\
  \ paths in AGENTS.md and skills/skill-creator/SKILL.md |\n| SC-14 | All existing\
  \ skill descriptions in skills/ are audited and a report is generated listing which\
  \ descriptions use the deprecated \"Load via skill() when...\" pattern vs the agent-intent\
  \ pattern | structural | File exists at expected path — audit report listing deprecated\
  \ vs agent-intent patterns |\n| SC-15 | reference/skill-card-schema.md is updated\
  \ to use agent-intent description format (not \"Load via skill() when...\") | string\
  \ | grep for \"Load via skill() when\" in skill-card-schema.md — must return empty\
  \ |\n| SC-16 | skills/skill-creator/reference/skill-card-spec.md is updated to use\
  \ agent-intent description format | string | grep for deprecated Farmage patterns\
  \ in skill-card-spec.md — must return empty |\n| SC-17 | skills/skill-creator/reference/routing-only-template.md\
  \ description format specification is updated to agent-intent format | string |\
  \ grep for \"Load via skill() when\" in routing-only-template.md — must return empty\
  \ |\n| SC-18 | AGENTS.md Pre-Response Gate Procedure is updated to clarify that\
  \ the match is between the agent's OWN intent and the description, not the user's\
  \ literal utterance | string | grep for \"agent's OWN intent\" in AGENTS.md |\n\
  | SC-19 | A companion spec is filed in the opencode-config repo (opencode-config#332)\
  \ to update opencode-config/AGENTS.md and opencode-config/.opencode/AGENTS.md to\
  \ cross-reference the new reference documents | structural | Companion issue exists\
  \ at michael-conrad/opencode-config/issues/332 with [SPEC] label |\n| SC-20 | opencode-config/AGENTS.md\
  \ is updated to reference the new skill-card-description-standards.md and task-card-structure-standards.md\
  \ in .opencode/reference/ | string | grep for reference file paths in opencode-config/AGENTS.md\
  \ |\n| SC-21 | opencode-config/.opencode/AGENTS.md is updated to reference the new\
  \ reference documents | string | grep for reference file paths in opencode-config/.opencode/AGENTS.md\
  \ |\n| SC-22 | validate_skill_cards.py is updated to validate Workflows section\
  \ format (sub-bullet dispatch contracts) instead of Trigger Dispatch Table + Invocation\
  \ + DISPATCH_GATE | behavioral | Run validate_skill_cards.py against a test SKILL.md\
  \ with Workflows format — passes without false failures |\n| SC-23 | skills/skill-creator/tasks/validate.md\
  \ Phase 6 is updated to validate Workflows section structure instead of SKILL-STRUCT-1\
  \ through SKILL-STRUCT-6 | string | grep for \"Workflows\" in validate.md — no references\
  \ to \"Trigger Dispatch Table\" or \"DISPATCH_GATE\" in structural checks |\n| SC-24\
  \ | skills/audit/tasks/spec-audit-evaluator.md SC-SEM criteria are updated to validate\
  \ Workflows section format instead of Trigger Dispatch Table | string | grep for\
  \ \"Workflows\" in spec-audit-evaluator.md — SC-SEM criteria reference Workflows,\
  \ not Trigger Dispatch Table |\n| SC-25 | tests-v2/behaviors/dispatch-boundary-writing-plans.sh\
  \ is updated or replaced to validate Workflows section routing instead of Trigger\
  \ Dispatch Table routing | behavioral | Behavioral test passes with Workflows-format\
  \ SKILL.md |\n| SC-26 | tests-v2/behaviors/skill-description-pattern.sh is updated\
  \ to validate agent-intent description format (no \"Load via skill() when\" or \"\
  User phrases:\") | behavioral | Behavioral test passes with agent-intent format\
  \ descriptions |\n\n## Requirements\n\n### REQ-1: Description Field Standards\n\
  The reference SHALL document:\n- The description field as a semantic router (agent\
  \ evaluates own intent, not user utterance)\n- The progressive disclosure architecture\
  \ (Level 1: metadata, Level 2: instructions, Level 3: resources)\n- Guidance on\
  \ writing descriptions that match agent task intent (action verbs, domain context,\
  \ specificity)\n- What to exclude from descriptions (meta-instructions, trigger\
  \ phrase lists, \"Load via skill() when...\")\n- Examples of effective vs ineffective\
  \ descriptions\n\n### REQ-2: Skill() and Task() Tool Pipeline\nThe reference SHALL\
  \ document the complete two-tool pipeline, including the critical asymmetry:\n-\
  \ `skill({name: \"...\"})` auto-loads SKILL.md into the calling agent's context\
  \ — the tool reads the file from disk and injects the full content as XML-wrapped\
  \ output. The orchestrator receives the skill card automatically.\n- `task(...,\
  \ prompt: \"...\")` creates a child session with fresh context — the prompt is the\
  \ ONLY context the subagent receives. The subagent MUST use its own file read tools\
  \ to load `tasks/<name>.md`. The task tool does NOT auto-load task card files.\n\
  - The discovery directive in the prompt (\"Read `<skill>/tasks/<task>.md` first\"\
  ) is REQUIRED because task() does not auto-load. It is routing metadata (which file\
  \ to read), not preloading.\n- `skill()` is orchestrator-only — sub-agents dispatched\
  \ via task() cannot call skill() (sub-agents have `task: deny` hardcoded and no\
  \ access to the skill tool)\n- Dispatching SKILL.md content to a sub-agent is a\
  \ category error (critical-rules-XXX) — the sub-agent receives task() calls it cannot\
  \ execute and orchestrator-level routing instructions it cannot act on\n- The complete\
  \ pipeline: orchestrator → `skill({name: \"...\"})` → SKILL.md auto-loaded → orchestrator\
  \ reads Workflows section → `task(..., prompt: \"Read \\`<skill>/tasks/<task>.md\\\
  ` and follow its instructions. Issue: {issue_number}.\")` → child session created\
  \ → subagent reads `tasks/<name>.md` via file tools → executes procedure → returns\
  \ result contract\n\n### REQ-3: Sub-Skill Clarification\nThe reference SHALL document:\n\
  - Sub-skills are not an opencode concept — the skill system has exactly one abstraction\n\
  - What appears to be sub-skills are independent skills that happen to be co-located\n\
  - Guidance on when to use a single skill with multiple task cards vs multiple independent\
  \ skills\n\n### REQ-4: Task Card Structure\nThe reference SHALL document:\n- Canonical\
  \ sections: Purpose, Entry Criteria, Procedure, Exit Criteria, Result Contract\n\
  - What task cards MUST NOT contain (no task() calls, no skill() calls, no orchestrator\
  \ routing)\n- Result contract format: status, finding_summary, artifact_path, blocker_reason\n\
  - Task file discovery directive pattern for sub-agents\n\n### REQ-5: Workflow Structure\
  \ with Sub-Bullet Dispatch Contracts\nThe reference SHALL document that skill cards\
  \ use a **Workflows** section where each workflow is a numbered list of clean-room\
  \ `task()` dispatch steps. Each step has sub-bullets for the dispatch parameters:\n\
  \n```\n1. **Step name** — description of what this step accomplishes\n   - Prompt:\
  \ `\"Read \\`<skill>/tasks/<task>.md\\` and follow its instructions. Issue: {issue_number}.\"\
  `\n   - Context: `{issue_number, project_root, ...}`\n   - Returns: `{status, finding_summary,\
  \ artifact_path, blocker_reason}`\n```\n\nThe reference SHALL document:\n- The `task()`\
  \ tool accepts exactly 6 parameters: `description`, `prompt`, `subagent_type`, `task_id`,\
  \ `command`, `background` — there is NO skill or task card parameter\n- The base\
  \ prompt MUST use natural language (not coded dispatch strings like \"execute X\
  \ from Y\") and MUST include the discovery directive because `task()` does not auto-load\
  \ task cards\n- Format: `\"Read \\`<skill>/tasks/<task>.md\\` and follow its instructions.\
  \ Issue: {issue_number}.\"`\n- The `description` parameter is derived from the step\
  \ name (3-5 words)\n- The sub-bullets (Prompt, Context, Returns) are the dispatch\
  \ contract for that step. The numbered step is the sequencing logic. Everything\
  \ the orchestrator needs is in one place per workflow.\n- No separate Dispatch Contract\
  \ table — the dispatch parameters are colocated with each step\n- No Context Exclude\
  \ sub-bullet — `task()` creates a child session with zero parent context, so everything\
  \ is excluded by default\n- No `subagent_type` sub-bullet — default is `general`;\
  \ annotate in the step name when non-default (e.g., `1. **Inspect codebase (explore)**`)\n\
  - Context parameters are embedded in the prompt body as additional instructions,\
  \ not as separate `task()` parameters\n- The orchestrator waits for each result\
  \ contract before dispatching the next step. If any step returns BLOCKED, the workflow\
  \ halts and reports the blocker.\n- Task cards that appear in multiple workflows\
  \ get their own sub-bullets each time — context may differ per workflow\n- Example\
  \ of a complete workflow with multiple steps\n\n### REQ-6: Cross-References\nBoth\
  \ reference documents SHALL be cross-referenced from:\n- AGENTS.md (Universal Skill\
  \ Dispatch Gate section)\n- skills/skill-creator/SKILL.md (skill lifecycle manager)\n\
  \n### REQ-7: Re-Align Existing Documentation\nThe following existing reference documents\
  \ SHALL be updated to use agent-intent description format:\n- reference/skill-card-schema.md\
  \ — replace \"Load via skill() when...\" with agent-intent format\n- skills/skill-creator/reference/skill-card-spec.md\
  \ — replace deprecated Farmage format with agent-intent format\n- skills/skill-creator/reference/routing-only-template.md\
  \ — replace description format specification with agent-intent format\n\n### REQ-8:\
  \ AGENTS.md Update\nAGENTS.md Pre-Response Gate Procedure SHALL be updated to clarify\
  \ that the match is between the agent's OWN intent and the description, not the\
  \ user's literal utterance. The current text says \"evaluate against ALL available\
  \ skill descriptions\" but does not explain the semantic matching mechanism.\n\n\
  ### REQ-9: Companion Spec for opencode-config\nA companion spec SHALL be filed in\
  \ the opencode-config repo to update:\n- opencode-config/AGENTS.md — add cross-references\
  \ to the new reference documents in .opencode/reference/\n- opencode-config/.opencode/AGENTS.md\
  \ — add cross-references to the new reference documents\n\n### REQ-11: Tooling Updates\n\
  The following tools SHALL be updated to validate the new Workflows section format\
  \ instead of the old Trigger Dispatch Table + Invocation + DISPATCH_GATE structure:\n\
  \n- **validate_skill_cards.py** — update SC-LINT-001 (description format), SC-LINT-005\
  \ (no procedure content), SC-LINT-006 (dispatch sub-item types), and REQ-6 (DISPATCH_GATE\
  \ subsections) to reference Workflows section with sub-bullet dispatch contracts\n\
  - **skills/skill-creator/tasks/validate.md Phase 6** — replace SKILL-STRUCT-1 through\
  \ SKILL-STRUCT-6 validation with Workflows section structure validation\n- **skills/audit/tasks/spec-audit-evaluator.md**\
  \ — update SC-SEM-001 through SC-SEM-006 to validate Workflows section format instead\
  \ of Trigger Dispatch Table\n- **tests-v2/behaviors/dispatch-boundary-writing-plans.sh**\
  \ — update or replace to validate Workflows section routing\n- **tests-v2/behaviors/skill-description-pattern.sh**\
  \ — update to validate agent-intent description format\n\n## Phases\n\n### Phase\
  \ 1: Create description field standards reference\nCreate reference/skill-card-description-standards.md\
  \ with all description field guidance.\n\n### Phase 2: Create task card structure\
  \ standards reference\nCreate reference/task-card-structure-standards.md with all\
  \ task card guidance.\n\n### Phase 3: Re-align existing documentation\nUpdate reference/skill-card-schema.md,\
  \ skills/skill-creator/reference/skill-card-spec.md, and skills/skill-creator/reference/routing-only-template.md\
  \ to use agent-intent description format.\n\n### Phase 4: Update AGENTS.md\nUpdate\
  \ AGENTS.md Pre-Response Gate Procedure to clarify agent-intent matching.\n\n###\
  \ Phase 5: Audit existing descriptions\nAudit all SKILL.md files in skills/ and\
  \ classify each description as agent-intent pattern or deprecated pattern. Produce\
  \ audit report.\n\n### Phase 6: File companion spec for opencode-config\nFile companion\
  \ spec in opencode-config repo (issue #332) to update its AGENTS.md files.\n\n###\
  \ Phase 7: Cross-reference integration\nAdd cross-references from AGENTS.md and\
  \ skills/skill-creator/SKILL.md to both new reference documents.\n\n### Phase 8:\
  \ Update tooling\nUpdate validate_skill_cards.py, validate.md Phase 6, spec-audit-evaluator.md\
  \ SC-SEM criteria, and behavioral tests to validate Workflows section format instead\
  \ of old Trigger Dispatch Table + Invocation + DISPATCH_GATE structure.\n\n## Dependencies\n\
  \n- Companion spec in opencode-config (issue #332) — must be filed before Phase\
  \ 7 can be completed\n- Spec #2077 (replace spec-creation skill) — the new description\
  \ format from this spec informs the new skill's description\n\n## Traceability\n\
  \n| Requirement | SCs | Phase |\n|-------------|-----|-------|\n| REQ-1 | SC-1,\
  \ SC-2, SC-3 | Phase 1 |\n| REQ-2 | SC-4, SC-5 | Phase 1 |\n| REQ-3 | SC-6, SC-7,\
  \ SC-8, SC-9 | Phase 1 |\n| REQ-4 | SC-10, SC-11, SC-12 | Phase 2 |\n| REQ-5 | SC-6,\
  \ SC-7, SC-8 | Phase 1 |\n| REQ-6 | SC-13 | Phase 7 |\n| REQ-7 | SC-15, SC-16, SC-17\
  \ | Phase 3 |\n| REQ-8 | SC-18 | Phase 4 |\n| REQ-9 | SC-19 | Phase 6 |\n| REQ-10\
  \ | SC-20, SC-21 | Phase 7 |\n| REQ-11 | SC-22, SC-23, SC-24, SC-25, SC-26 | Phase\
  \ 8 |\n| Audit | SC-14 | Phase 5 |\n"
