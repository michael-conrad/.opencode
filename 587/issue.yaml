  merge conflicts; delete "Programmatic Invocation" section |

  | `skills/writing-plans/tasks/create.md` | Update Purpose section; resolve merge
  conflicts |

  | (new) GitHub Issue | Comprehensive deck audit (deferred item 7) |


  ## Interdependencies


  | Issue | Relationship | Action |

  |-------|-------------|--------|

  | #589 | Child spec — covers spec-creation §7, §8, §9 | Must be implemented before
  or alongside #587 SC-2 |

  | #590 | Child spec — covers brainstorming §5 | Must be implemented before or alongside
  #587 SC-3 |

  | #592 | Child spec — covers executing-plans §3 | Must be implemented before or
  alongside #587 SC-4 |

  | #593 | Child spec — covers adversarial-audit dispatch boilerplate | Must be implemented
  before or alongside #587 SC-6, SC-7, SC-8, SC-9 |

  | #865 | Canonical DISPATCH_GATE across all skills | **Potential conflict** — DISPATCH_GATE
  format changes could overwrite Operating Protocol changes. Sequence: apply #587
  Operating Protocol changes first, then #865 DISPATCH_GATE insertion. |

  | #1358 | Reorganize Skill Cards with Checklist Dispatch | **Potential conflict**
  — structural refactor could overwrite Operating Protocol changes. Sequence: apply
  #587 changes first, then #1358 reorganization. |

  | #958 | Audit skill deck: add workflow checklist | **Potential overlap** — both
  modify SKILL.md files. Sequence: apply #587 changes first, then #958 checklist additions.
  |

  | (new) | Comprehensive deck audit (deferred item 7) | Created as separate issue,
  linked as sub-issue of #587 |


  ## Circular Dependency Resolution


  No circular dependencies exist. The dependency graph is a DAG:

  - #587 (parent) → #589, #590, #592, #593 (children)

  - #587 → (new) comprehensive deck audit (child)

  - #865, #1358, #958 are independent efforts with sequencing guidance only


  ## Out of Scope


  - Changes to adversarial-audit SKILL.md or task files (verdict format already correct
  per #529)

  - Changes to verdict parsing logic or `next_step` vocabulary

  - Changes to other skills'' Operating Protocols not listed in Files Affected

  - Behavioral enforcement tests for the Operating Protocol changes (covered by child
  specs)


  ## No-Lobotomize Clause


  **Any skipped, deferred, or otherwise attempted bypass of an SC failure marks ALL
  SCs as FAIL. The PR must be immediately rejected and trashed as defective and unusable.**
  All SCs must be 100% clean pass. No SC may be removed, weakened, deferred, or reclassified
  to evade implementation.


  ## Research Card References


  - `writing-plans-skill-contradiction.md` (confidence 0.95) — confirms structural
  contradiction in writing-plans SKILL.md "Programmatic Invocation" section. Used
  as basis for SC-10.

  - `dimo-same-model-auditor-divergence.md` (confidence 0.9) — confirms same-model
  role-differentiated agents produce divergent evaluations. Relevant for adversarial-audit
  dispatch format in SC-6 through SC-9.

  - `for_analysis-scope-investigation.md` (confidence 0.9) — confirms for_analysis
  scope does not block technical investigation. Not directly relevant but confirms
  no scope issues with this work.


