---
schema_version: "1.0"
last_updated: "2026-06-04"
description: "#884 Pair 0-4 phase ordering contract"

variables:
  pair0_red:
    type: bool
  pair0_green:
    type: bool
  pair1_red:
    type: bool
  pair1_green:
    type: bool
  pair2_red:
    type: bool
  pair2_green:
    type: bool
  pair3_red:
    type: bool
  pair3_green:
    type: bool
  pair4_red:
    type: bool
  pair4_green:
    type: bool

preconditions:
  # RED before GREEN within each pair
  - "z3.Implies(pair0_green, pair0_red)"
  - "z3.Implies(pair1_green, pair1_red)"
  - "z3.Implies(pair2_green, pair2_red)"
  - "z3.Implies(pair3_green, pair3_red)"
  - "z3.Implies(pair4_green, pair4_red)"

  # Shared resource conflicts:
  # Pair 2 RED (confirm timeout exists) and Pair 3 RED (confirm wrapper exists)
  # require untouched helpers.sh — BLOCKED if Pair 0 GREEN has already run
  - "z3.Not(z3.And(pair2_red, pair0_green))"
  - "z3.Not(z3.And(pair3_red, pair0_green))"