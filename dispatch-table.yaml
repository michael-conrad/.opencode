# DEPRECATED: Skill Dispatch Table
#
# This file is DEPRECATED and kept for historical reference only.
# Skill invocation is now driven by self-discovery via YAML frontmatter
# in each SKILL.md file. The session-enforcement plugin reads skill
# descriptions from frontmatter at startup and injects them into the
# first user message.
#
# See AGENTS.md "Skill Self-Discovery" section for details.
# Source attribution: Self-discovery pattern adapted from obra/superpowers
# https://github.com/obra/superpowers/blob/main/skills/writing-skills/SKILL.md
#
# ============================================================
# HISTORICAL CONTENT BELOW — DO NOT USE FOR ACTIVATION
# ============================================================
# Original: Skill Dispatch Table - Externalized from AGENTS.md
# Version: 2.0
# Last Updated: 2026-04-07

platform_operations:
  - trigger: "GitBucket repo detected"
    skill: "gitbucket-api"
    purpose: "GitBucket API patterns, authentication, error recovery"
    mandatory_before: "GitBucket Python API"
    
  - trigger: "Creating GitHub/GitBucket issue"
    skill: "github-issue-creation"
    purpose: "Validate spec, labels, auditors"
    mandatory_before: "issue creation"
    
  - trigger: "Posting to GitHub/GitBucket"
    skill: "github-comments"
    purpose: "AI byline, comment format, when to comment vs edit body"
    
  - trigger: "Multi-task spec needs sub-issues"
    skill: "github-sub-issues"
    purpose: "Create sub-issues for phases, database ID management"

code_quality:
  - trigger: "When writing or modifying code"
    skill: "code-size-enforcement"
    purpose: "Enforce size limits on functions, cells, and files"
    
  - trigger: "Before approving guideline changes"
    skill: "guideline-auditor"
    purpose: "Verify guideline quality, find ambiguities/conflicts"
    
  - trigger: "Before approving spec implementation"
    skill: "spec-auditor"
    purpose: "Orchestrate spec quality audit (determines subtasks automatically)"
    parameters: "--issue N"
    
  - trigger: "After spec creation"
    skill: "spec-auditor"
    purpose: "Orchestrate spec quality audit (determines subtasks automatically)"
    parameters: "--issue N"
    
  - trigger: "After guideline/skill update"
    skill: "coherence-auditor"
    purpose: "Verify coherence after changes"
    parameters: "--mode maintenance"
    
  - trigger: "Audit specific spec subtask"
    skill: "spec-auditor"
    purpose: "Run specific subtask (fresh-start, structure, content-quality, traceability, operational, fidelity, concerns)"
    parameters: "--issue N --task <subtask>"
    
  - trigger: "Before skill extraction"
    skill: "coherence-auditor"
    purpose: "Identify skill candidates from guideline content"
    parameters: "--mode extraction"

issue_pr_workflow:
  # FIRST CHECK - Q/A mode gate (before any implementation work)
  - trigger: "User gives any implementation instruction"
    skill: "approval-gate"
    task: "verify-qa-mode"
    purpose: "Detect spec-less implementation requests, check feature branch, switch to Q/A mode"
    automatic: false
    note: "This is the FIRST gate - before authorization, before branching"

  # PRE-SPEC GATE - Brainstorming (before spec creation)
  - trigger: "User says 'spec' or 'plan' or similar planning terms"
    skill: "brainstorming"
    purpose: "Mandatory pre-spec brainstorming workflow"
    automatic: true
    note: "Ensures thorough requirements exploration before spec creation"
    
  - trigger: "User provides feature description for planning"
    skill: "brainstorming"
    purpose: "Complete brainstorming dimensions before spec creation"
    automatic: true

  # SECOND CHECK - Authorization verification (after spec exists)
  - trigger: "User says 'approved' or 'go'"
    skill: "approval-gate"
    purpose: "Verify spec+authorization requirements, sub-issues"
    
  # POST-SPEC GATE - Plan creation (after spec approval)
  - trigger: "After spec receives explicit approval"
    skill: "writing-plans"
    task: "create"
    purpose: "Create implementation plan from approved spec"
    automatic: true
    note: "Transforms spec phases into actionable implementation steps"
    
  - trigger: "Existing spec needs plan"
    skill: "writing-plans"
    task: "retroactive"
    purpose: "Create plan for existing approved spec"
    
  - trigger: "User says 'approved: plan' or 'approved plan'"
    skill: "approval-gate"
    purpose: "Verify plan approval before execution"
    note: "Plans require separate approval from specs"

  # POST-PLAN GATE - Execution start (after plan approval)
  - trigger: "After plan receives explicit approval"
    skill: "executing-plans"
    task: "start"
    purpose: "Begin systematic plan execution"
    automatic: true
    note: "Starts step-by-step implementation with evidence collection"
    
  - trigger: "Executing plan with independent tasks via subagents"
    skill: "divide-and-conquer"
    purpose: "Dispatch fresh subagents per task with two-stage review"
    note: "Alternative to executing-plans for plans with independent tasks"

  - trigger: "Implementing approved spec with subagent dispatch"
    skill: "divide-and-conquer"
    purpose: "Dispatch implementer → spec review → code quality review per task"
    note: "Integrates with approval-gate, git-workflow, verification-before-completion"
    
  - trigger: "User says 'next step' or 'continue'"
    skill: "executing-plans"
    task: "step"
    purpose: "Execute next step in approved plan"
    
  - trigger: "User asks about current progress"
    skill: "executing-plans"
    task: "progress"
    purpose: "Report current execution progress"
    
  - trigger: "Before implementing any task"
    skill: "approval-gate"
    purpose: "Verify authorization, check sub-issues, re-evaluate"
    
  # VERIFICATION GATE - Before completion claims (after execution)
  - trigger: "Agent claims 'task complete' or 'step complete'"
    skill: "verification-before-completion"
    task: "verify"
    purpose: "Verify all success criteria have evidence"
    automatic: true
    note: "MANDATORY - prevents premature completion claims without evidence"
    enforcement: "CRITICAL VIOLATION to skip - see 000-critical-rules.md"
    
  - trigger: "Agent marks step as ☑ in plan"
    skill: "verification-before-completion"
    task: "verify"
    purpose: "Verify step completion has evidence"
    automatic: true
    enforcement: "CRITICAL VIOLATION to skip - see 000-critical-rules.md"
    
  - trigger: "Agent attempts to close issue or create PR"
    skill: "verification-before-completion"
    task: "verify"
    purpose: "Final verification before closure"
    automatic: true
    enforcement: "CRITICAL VIOLATION to skip - see 000-critical-rules.md"

  - trigger: "Missing evidence detected"
    skill: "verification-before-completion"
    task: "collect"
    purpose: "Collect missing evidence for incomplete criteria"

  # BRANCH COMPLETION GATE - Before review-prep (after verification)
  - trigger: "Implementation completes on feature branch"
    skill: "finishing-a-development-branch"
    task: "checklist"
    purpose: "Verify branch is ready for PR creation (committed, tested, pushed)"
    automatic: true
    note: "MANDATORY - must pass AFTER verification-before-completion, BEFORE review-prep"
    enforcement: "CRITICAL VIOLATION to skip - see 000-critical-rules.md"
    
  - trigger: "User says 'done' or 'finished' or 'ready for PR'"
    skill: "finishing-a-development-branch"
    task: "checklist"
    purpose: "Run completion checklist before PR"
    
  # Git workflow tasks (called by divide-and-conquer orchestration)
  - trigger: "Divide-and-conquer calls pre-work"
    skill: "git-workflow"
    task: "pre-work"
    purpose: "Pure git ops: stash, create branch (NO implementation logic)"
    automatic: false
    note: "Called by orchestration layer, not by dispatch table directly"
    
  - trigger: "Divide-and-conquer calls review-prep"
    skill: "git-workflow"
    task: "review-prep"
    purpose: "Pure git ops: push branch, generate URL (NO implementation logic)"
    automatic: false
    note: "Called by orchestration layer, not by dispatch table directly"
    
  - trigger: "User says 'create a PR'"
    skill: "git-workflow"
    task: "pr-creation"
    purpose: "Post-work: squash commits, push, create PR"
    
  - trigger: "PR timing questions"
    skill: "pr-creation-workflow"
    purpose: "PR authorization boundary, when PRs can be created"
    
  - trigger: "Before PR creation"
    skill: "changelog-generator"
    purpose: "Generate changelog from commits"
    
  - trigger: "Before creating GitHub Issue"
    skill: "github-issue-creation"
    task: "pre-creation"
    purpose: "Validate spec, check for conflicts/superseded issues"
    
  - trigger: "After issue created"
    skill: "github-issue-creation"
    task: "post-creation"
    purpose: "Invoke spec-auditor orchestrator, create sub-issues for multi-task specs"
    
  - trigger: "Post-implementation verification"
    skill: "spec-auditor"
    purpose: "Orchestrate spec quality verification (determines subtasks)"
    parameters: "--issue N"
    
  - trigger: "Periodic guideline maintenance"
    skill: "guideline-auditor"
    purpose: "Check for guideline drift over time"
    
  - trigger: "Before major release"
    skill: "coherence-auditor"
    purpose: "Verify guideline-skill coherence"
    parameters: "--mode maintenance"

quality_gates:
  - trigger: "Bug or error encountered during implementation"
    skill: "systematic-debugging"
    task: "diagnose"
    purpose: "Systematic bug diagnosis before any fix attempt"
    note: "Enforces root cause analysis before code changes"

  - trigger: "User says 'fix this' or 'debug this'"
    skill: "systematic-debugging"
    task: "diagnose"
    purpose: "Diagnose bug before fixing, no vibe debugging"

  - trigger: "After bug diagnosis confirmed"
    skill: "systematic-debugging"
    task: "fix"
    purpose: "Apply minimal targeted fix after diagnosis"

  - trigger: "Implementation completes on feature branch"
    skill: "finishing-a-development-branch"
    task: "checklist"
    purpose: "Verify branch is ready for PR creation (MUST come before review-prep)"
    enforcement: "CRITICAL VIOLATION to skip - see 000-critical-rules.md"

  - trigger: "User says 'done' or 'finished' or 'ready for PR'"
    skill: "finishing-a-development-branch"
    task: "checklist"
    purpose: "Run completion checklist before PR"

optional_skills:
  - trigger: "User requests TDD approach"
    skill: "test-driven-development"
    task: "red"
    purpose: "Write failing test first (TDD red phase)"

  - trigger: "After failing test written"
    skill: "test-driven-development"
    task: "green"
    purpose: "Write minimal implementation (TDD green phase)"

  - trigger: "After tests pass"
    skill: "test-driven-development"
    task: "refactor"
    purpose: "Refactor while keeping tests green (TDD refactor phase)"

  - trigger: "PR receives review comments"
    skill: "receiving-code-review"
    task: "address"
    purpose: "Address all review comments without scope creep"

  - trigger: "User says 'address review' or 'fix review feedback'"
    skill: "receiving-code-review"
    task: "respond"
    purpose: "Reply to review comments"

  - trigger: "User says 'request review' or 'ready for review'"
    skill: "requesting-code-review"
    task: "prepare"
    purpose: "Prepare PR for review with proper context"

  - trigger: "After review preparation"
    skill: "requesting-code-review"
    task: "request"
    purpose: "Submit review request with documentation"

development_maintenance:
  - trigger: "When tool selection matters"
    skill: "mcp-tool-usage"
    purpose: "Five-tier tool hierarchy (opencode built-in primary, domain MCP primary, .opencode/tools primary, JetBrains MCP fallback, CLI last resort)"
    
  - trigger: "Working with Jupyter notebooks"
    skill: "notebook-operations"
    purpose: "Notebook read/write/execute rules, safety constraints"
    
  - trigger: "Creating/updating skills"
    skill: "skill-creator"
    purpose: "Skill template workflow, initialize templates"
    
  - trigger: "Managing duplicate content blocks"
    skill: "fragment-manager"
    purpose: "CRUD operations and synchronization for fragment masters"
    
  - trigger: "Syncing guidelines across repos"
    skill: "sync-guidelines"
    purpose: "Multi-repo guideline maintenance"

automatic_invocation:
  # FIRST GATE - Q/A mode (before authorization)
  - skill: "approval-gate"
    task: "verify-qa-mode"
    trigger: "ANY user instruction that could be interpreted as implementation request"
    note: "Must check gates FIRST: spec exists? authorization? feature branch?"
  
  # PRE-SPEC GATE - Brainstorming (before spec creation)
  - skill: "brainstorming"
    trigger: "User says 'spec' or 'plan' or provides feature description"
    note: "Mandatory brainstorming before any spec creation"
  
  # SECOND GATE - Authorization
  - skill: "git-workflow"
    trigger: "User authorizes implementation ('approved', 'go', 'proceed')"
    task: "pre-work"
  
  # POST-SPEC GATE - Plan creation (after spec approval)
  - skill: "writing-plans"
    trigger: "Spec receives explicit approval"
    task: "create"
    note: "Automatic plan creation from approved spec"
    
  # POST-PLAN GATE - Execution start (after plan approval)
  - skill: "executing-plans"
    trigger: "Plan receives explicit approval"
    task: "start"
    note: "Automatic execution start after plan approval"
  
  # VERIFICATION GATE - Before completion claims (MANDATORY, no decision point)
  - skill: "verification-before-completion"
    trigger: "Agent claims 'task complete' or 'step complete'"
    task: "verify"
    note: "MANDATORY evidence verification before completion claims. CRITICAL VIOLATION to skip."

  # BRANCH COMPLETION GATE - After verification, before review-prep (MANDATORY, no decision point)
  - skill: "finishing-a-development-branch"
    trigger: "Verification-before-completion passes"
    task: "checklist"
    note: "MANDATORY branch readiness check. CRITICAL VIOLATION to skip. Must come BEFORE review-prep."
  
  # REVIEW-PREP - After verification and branch completion gates pass
  - skill: "git-workflow"
    trigger: "Implementation completes"
    task: "review-prep"
    note: "Automatic, no decision point. Must ONLY run after verification and finishing gates pass."
    
  - skill: "git-workflow"
    trigger: "User requests PR creation ('create a PR', 'make a PR', 'push and create PR')"
    task: "pr-creation"
    
  - skill: "pr-creation-workflow"
    trigger: "PR timing questions"
    note: "Documents rules, NOT automatically invoked"

  # QUALITY GATES - Systematic debugging and branch completion
  - skill: "systematic-debugging"
    trigger: "Bug or error encountered during implementation"
    task: "diagnose"
    note: "Enforces root cause analysis before any fix"

  - skill: "finishing-a-development-branch"
    trigger: "Implementation completes on feature branch"
    task: "checklist"
    note: "Completion checklist before PR creation"

sub_task_invocation:
  - examples:
      - skill: "git-workflow"
        task: "pre-work"
        description: "Load only pre-work task (~80 lines)"
      - skill: "git-workflow"
        task: "pr-creation"
        description: "Load only PR creation task (~80 lines)"
  - rationale: "Reduces context window pollution by loading only relevant workflow phases"
  - usage: "/skill <skill-name> --task <task-name> for sub-task invocation"
  - overview: "/skill <skill-name> (no --task) for skill overview only"

integration_points:
  - skill: "approval-gate"
    guideline: "010-approval-gate.md"
    note: "Spec + authorization workflow"
    
  - skill: "git-workflow"
    guidelines:
      - "000-critical-rules.md"
      - "115-branch-naming.md"
    note: "Git operations, branch management, PR creation"

  - skill: "systematic-debugging"
    guideline: "050-scope-autonomy.md"
    note: "No vibe debugging, root cause analysis required"

  - skill: "finishing-a-development-branch"
    guideline: "000-critical-rules.md"
    note: "Branch completion checklist before PR"

  - skill: "test-driven-development"
    guideline: "070-environment.md"
    note: "TDD red-green-refactor workflow"

  - skill: "receiving-code-review"
    guideline: "050-scope-autonomy.md"
    note: "Address review feedback without scope creep"

  - skill: "requesting-code-review"
    guideline: "080-code-standards.md"
    note: "PR description template and review preparation"
