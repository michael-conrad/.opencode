<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Design Mockup Template</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      font-family: sans-serif;
      color: #333;
      background: #fff;
    }
    .container {
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 240px 1fr 240px;
      grid-template-areas:
        "header header header"
        "sidebar main aside"
        "footer footer footer";
      min-height: 100vh;
    }
    .header {
      grid-area: header;
      background: #f0f0f0;
      padding: 16px 24px;
      border-bottom: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .nav {
      grid-area: sidebar;
      background: #e8e8e8;
      padding: 16px;
      border-right: 1px solid #ccc;
    }
    .nav ul {
      list-style: none;
    }
    .nav li {
      padding: 8px 0;
      border-bottom: 1px solid #ddd;
    }
    .main {
      grid-area: main;
      padding: 24px;
    }
    .main h2 {
      font-size: 16px;
      margin-bottom: 16px;
    }
    .aside {
      grid-area: aside;
      background: #f8f8f8;
      padding: 16px;
      border-left: 1px solid #ccc;
    }
    .footer {
      grid-area: footer;
      background: #f0f0f0;
      padding: 12px 24px;
      border-top: 1px solid #ccc;
      text-align: center;
      font-size: 12px;
    }
    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        grid-template-areas:
          "header"
          "main"
          "sidebar"
          "aside"
          "footer";
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>App Title</h1>
      <div>Header Actions</div>
    </header>
    <nav class="nav">
      <ul>
        <li>Nav Item 1</li>
        <li>Nav Item 2</li>
        <li>Nav Item 3</li>
      </ul>
    </nav>
    <main class="main">
      <h2>Main Content</h2>
      <p>Content area placeholder.</p>
    </main>
    <aside class="aside">
      <p>Supplementary content.</p>
    </aside>
    <footer class="footer">
      <p>Footer content</p>
    </footer>
  </div>
</body>
</html>
